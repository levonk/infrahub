---
## This is the file intended to be incldued by ALL other compose files, It includes references to the volumes from docker-compose.shared.yml
## Networks are defined in docker-compose.shared.yml and referenced here as external

## If you're having a problem with networks or volumes not existing, did you run `make up`?

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

services:
  # Base service that can be extended by other containers
  common-base:
    image: localnet-base-alpine:latest
    command: >
      sh -c 'echo "Intended to be inherited from in other services, shutting down. Use docker exec -it localnet-base-alpine /bin/bash to get an interactive shell"'
    logging: *default-logging
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 9.9.9.9
    environment:
      TZ: UTC
      PUID: 1000
      PGID: 1000

volumes:
  # Base volumes
  nix-cache:
    name: localnet-base-nix-cache-volume
    external: true
  nix-config:
    name: localnet-base-nix-config-volume
    external: true
  nix-store:
    name: localnet-base-nix-store-volume
    external: true

  # DNS Services
  dns-adguard-conf:
    name: localnet-dns-adguard-conf
    external: true

  dns-adguard-work:
    name: localnet-dns-adguard-work
    external: true

  dns-cache:
