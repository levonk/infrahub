---
# Plex Docker Compose Configuration
# Generated secure docker-compose configuration for plex

services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: localnet-media-plex-standalone
    restart: unless-stopped
    ports:
      - "32400:32400"
    environment:
      - PUID=${_PUID:-1000}
      - PGID=${_PGID:-1000}
      - TZ=${_TZ:-America/Los_Angeles}
      - VERSION=docker
      - PLEX_CLAIM=${_PLEX_CLAIM}
    volumes:
      - ./mounts/config:/config
      - ./mounts/tv:/tv
      - ./mounts/movies:/movies
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - plex-network

networks:
  plex-network:
    driver: bridge

