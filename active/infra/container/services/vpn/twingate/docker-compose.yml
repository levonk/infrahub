---
# Twingate VPN Docker Compose Configuration
# Generated secure docker-compose configuration for Twingate Connector Service

services:
  twingate-vpn:
    image: twingate/connector:latest
    container_name: twingate-vpn
    restart: unless-stopped
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    environment:
      - TENANT_URL=${TWINGATE_TENANT_URL}
      - ACCESS_TOKEN=${TWINGATE_ACCESS_TOKEN}
      - REFRESH_TOKEN=${TWINGATE_REFRESH_TOKEN}
      - TWINGATE_LABEL_HOSTNAME=${TWINGATE_LABEL_HOSTNAME:-localnet-connector}
      - SERVICE_NAME=twingate-vpn
    # Twingate connector manages its own health, but we can check if process is running
    healthcheck:
      test: ["CMD-SHELL", "pgrep twingate-connector || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - twingate-vpn-network

networks:
  twingate-vpn-network:
    driver: bridge
