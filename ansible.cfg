[defaults]
inventory = shared/active/02-config/ansible/inventories/localnet.yml
roles_path = shared/active/02-config/ansible/roles
collections_paths = shared/active/02-config/ansible/collections
host_key_checking = False
retry_files_enabled = False
forks = 10

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
