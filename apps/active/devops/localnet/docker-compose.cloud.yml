---
# https://www.oracle.com/cloud/free/ - Oracle has a generous free tier

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

services:
  # Cloudflare DDNS
  cloudflare-ddns:
    image: oznu/docker-cloudflare-ddns@latest
    container_name: localnet-cloudflare-ddns
    logging: *default-logging
    restart: always
    volumes:
      - ./cloudflare-ddns/mounts/etc/cloudflare-ddns:/etc/cloudflare-ddns
    network_mode: host
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command: "-c /etc/cloudflare-ddns/cloudflare-ddns.toml"

  frps: # https://github.com/fatedier/frp
    # Alternatives: Pangolin
    image: fatedier/frps:v0.65.0
    container_name: localnet-proxy-frps
    logging: *default-logging
    restart: always
    volumes:
      - ./frps/mounts/etc/frps:/etc/frps
    network_mode: host
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command: "-c /etc/frps/frps.toml"

