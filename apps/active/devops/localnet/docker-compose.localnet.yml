# Home Lab In-a-Box - Docker Compose Configuration
# Complete infrastructure stack with transparent proxying, monitoring, and artifact repositories

# Default logging configuration - use json-file with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"
    labels: "service"

networks:
  localnet:
    driver: bridge
    external: false
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16
          gateway: ${DOCKER_NETWORK_GATEWAY:-172.21.0.1}
          # Reserve high IP range (*.255.x) for DNS infrastructure per ADR
          # These auxiliary addresses prevent DHCP from assigning IPs in this range
  #          aux_addresses:
  #            dns-coredns: ${DNS_COREDNS_MAIN_IP:-172.21.255.51}
  #            dns-dnscrypt-odoh: ${DNS_DNSCRYPT_ODOH_IP:-172.21.255.60}
  #            dns-dnscrypt-anon: ${DNS_DNSCRYPT_ANON_IP:-172.21.255.61}
  #            dns-dnscrypt-std: ${DNS_DNSCRYPT_STD_IP:-172.21.255.62}
  #            dns-dnscrypt-doh: ${DNS_DNSCRYPT_DOH_IP:-172.21.255.63}
  #            dns-dnscrypt-encrypted: ${DNS_DNSCRYPT_ENCRYPTED_IP:-172.21.255.64}
  #            dns-dnscrypt-plaintext: ${DNS_DNSCRYPT_PLAINTEXT_IP:-172.21.255.65}
  #            dns-dnscrypt-tor: ${DNS_DNSCRYPT_TOR_IP:-172.21.255.66}
  #            proxy-socks5-tor: ${PROXY_TOR_SOCKS5_IP:-172.21.255.70}

  wireguard:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

  claude-code:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/16

volumes:
  # DNS Services
  dns-cache:
    driver: local

  # NTP Services
  chronyd-data:
    driver: local

  # Web Proxy Services
  web-cache:
    driver: local

  # Artifact Repositories
  nexus-data:
    driver: local

  verdaccio-data:
    driver: local

  # WireGuard
  wireguard-direct-config:
    driver: local

  wireguard-transparent-config:
    driver: local

  # LocalStack
  localstack-data:
    driver: local

services: {}

# ============================================================================
# Proxy and gateway services are loaded via services/proxy/docker-compose.proxy.yml
# ============================================================================

include:
  ## you have to run the base before running localnet. running it again causes problems
  # - services/base/docker-compose.base.yml
  - services/artifact/docker-compose.artifact.yml
  - services/ntp/docker-compose.ntp.yml
  - services/dns/docker-compose.dns.yml
  - services/proxy/docker-compose.proxy.yml
  # - services/vpn/docker-compose.vpn.yml
  # - services/logging/docker-compose.logging.yml
  # - services/ai-codeassist/claude-code/claude-code/docker-compose.claude-code.yml
  - services/ai-services/docker-compose.ai.yml
  - services/home/docker-compose.home.yml
