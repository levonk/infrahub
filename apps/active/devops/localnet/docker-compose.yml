# Home Lab In-a-Box - Docker Compose Configuration
# Complete infrastructure stack with transparent proxying, monitoring, and artifact repositories

# Default logging configuration - use json-file with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"
    labels: "service"

networks:
  homelab:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}

  wireguard:
    driver: bridge
    ipam:
      config:
        - subnet: ${WIREGUARD_NETWORK_SUBNET:-172.21.0.0/16}

volumes:
  # DNS Services
  dns-cache:
    driver: local

  # NTP Services
  chronyd-data:
    driver: local

  # Web Proxy Services
  web-cache:
    driver: local

  # Artifact Repositories
  nexus-data:
    driver: local

  verdaccio-data:
    driver: local

  # Observability Services
  elasticsearch-data:
    driver: local

  prometheus-data:
    driver: local

  grafana-data:
    driver: local

  loki-data:
    driver: local

  # WireGuard
  wireguard-direct-config:
    driver: local

  wireguard-transparent-config:
    driver: local

  # LocalStack
  localstack-data:
    driver: local

services:
  # ============================================================================
  # Transparent Proxy Gateway (Container-based, no host modifications)
  # ============================================================================

  transparent-gateway:
    build:
      context: ./configs/transparent-gateway
      dockerfile: Dockerfile
    container_name: homelab-transparent-gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      homelab:
        ipv4_address: 172.20.0.254
    ports:
      - "9099:9099/tcp"  # Metrics endpoint
    environment:
      - DNS_SERVER=dnsdist
      - DNS_PORT=5353
      - NTP_SERVER=chronyd
      - NTP_PORT=123
      - WEB_PROXY=squid
      - WEB_PROXY_PORT=3128
      - GATEWAY_FAILURE_MODE=${GATEWAY_FAILURE_MODE:-fallback-direct}
      - GATEWAY_TIMEOUT=${GATEWAY_TIMEOUT:-30}
      - METRICS_PORT=9099
    healthcheck:
      test: ["CMD", "sh", "-c", "iptables -t nat -L -n && nc -zv localhost 9099"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  # ============================================================================
  # DNS Services
  # ============================================================================
  # NOTE: Static IPs required due to dnsdist 2.1 limitation:
  # - dnsdist parses config at startup and cannot resolve Docker hostnames
  # - Static IPs ensure dnsdist.conf can reference upstream servers by IP
  # - Using high IP range (172.20.255.x) to avoid conflicts with DHCP (starts from 172.20.0.2)
  # - depends_on ensures correct start order
  # - See: apps/active/devops/localnet/configs/dns/dnsdist.conf

  dnsdist:
    build:
      context: .
      dockerfile: Dockerfile.dnsdist
    image: homelab-dnsdist:latest
    container_name: homelab-dnsdist
    networks:
      - homelab
    ports:
      - "${DNS_TRANSPARENT_PORT:-5353}:53/udp"  # Transparent mode - map container 53 to host 5353
      - "${DNS_TRANSPARENT_PORT:-5353}:53/tcp"  # Transparent mode TCP
      - "${DNS_DIRECT_PORT:-15353}:5353/udp"    # Direct mode - map container 5353 to host 15353
      - "${DNS_DIRECT_PORT:-15353}:5353/tcp"    # Direct mode TCP
      - "8083:8083/tcp"                          # Metrics
    volumes:
      - ./configs/dns/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro
      - ./blocklists/compiled:/etc/dnsdist/blocklists:ro
    environment:
      - HOST_IP=${HOST_IP}
      - TRANSPARENT_MODE=true
    depends_on:
      - coredns
      - dnscrypt-proxy
    healthcheck:
      test: ["CMD", "dig", "+short", "health.check.local", "@127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  coredns:
    image: coredns/coredns:latest
    container_name: homelab-coredns
    command: ["-conf", "/etc/coredns/Corefile"]
    networks:
      homelab:
        ipv4_address: 172.20.255.51  # Static IP in high range, reserved for DNS
    ports:
      - "9153:9153/tcp"  # Metrics
      - "8080:8080/tcp"  # Health
    volumes:
      - ./configs/dns/coredns/Corefile:/etc/coredns/Corefile:ro
      - dns-cache:/var/lib/coredns
    healthcheck:
      test: ["CMD-SHELL", "pgrep coredns || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dnscrypt-proxy:
    build:
      context: .
      dockerfile: Dockerfile.dnscrypt-proxy
    image: homelab-dnscrypt-proxy:2.1.5
    container_name: homelab-dnscrypt-proxy
    networks:
      homelab:
        ipv4_address: 172.20.255.50  # Static IP in high range, reserved for DNS
    ports:
      - "5300:5053/udp"  # Map container's default port 5053 to host port 5300 (UDP)
      - "5300:5053/tcp"  # Map container's default port 5053 to host port 5300 (TCP)
    volumes:
      - ./configs/dns/dnscrypt-proxy/dnscrypt-proxy.toml:/etc/dnscrypt-proxy/dnscrypt-proxy.toml:ro
    healthcheck:
      # Test actual DNS resolution with proper config path
      test: ["CMD", "dnscrypt-proxy", "-resolve", "cloudflare.com", "-config", "/etc/dnscrypt-proxy/dnscrypt-proxy.toml"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s  # Increased to allow server list download
    restart: unless-stopped
    logging: *default-logging

  # Blocklist Compiler - Builds and updates DNS/web blocklists
  blocklist-compiler:
    build:
      context: ./blocklists
      dockerfile: Dockerfile
    container_name: homelab-blocklist-compiler
    networks:
      - homelab
    volumes:
      - ./blocklists/sources:/blocklists/sources
      - ./blocklists/compiled:/blocklists/compiled
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp/blocklists:mode=1777,size=512m
    healthcheck:
      test: ["CMD", "test", "-f", "/blocklists/compiled/blocklist.cdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: "no"  # Run once on startup, use cron/systemd for updates
    logging: *default-logging

  # ============================================================================
  # NTP Services
  # ============================================================================

  chronyd:
    build:
      context: ./configs/ntp
      dockerfile: Dockerfile
    image: homelab-chronyd:latest
    container_name: homelab-chronyd
    networks:
      - homelab
    ports:
      - "${NTP_TRANSPARENT_PORT:-123}:123/udp"  # Transparent mode UDP
      - "${NTP_TRANSPARENT_PORT:-123}:123/tcp"  # Transparent mode TCP
      - "${NTP_DIRECT_PORT:-1123}:1123/udp"     # Direct mode UDP (mapped from container port 123)
      - "${NTP_DIRECT_PORT:-1123}:1123/tcp"     # Direct mode TCP (mapped from container port 123)
      - "4460:4460/tcp"                          # NTS-KE (Network Time Security Key Exchange)
      - "9123:9123/tcp"                          # Metrics (if exporter added later)
    volumes:
      - ./configs/ntp/chrony.conf:/etc/chrony/chrony.conf:ro  # Custom config (read-only)
      - chronyd-data:/var/lib/chrony                          # Persistent storage for drift file and NTS keys
    healthcheck:
      test: ["CMD", "chronyc", "tracking"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_TIME          # Required for chronyd to adjust system time
      - NET_BIND_SERVICE  # Required to bind to port 123
      - SETUID            # Required for chronyd to drop privileges
      - SETGID            # Required for chronyd to drop privileges

  # ============================================================================
  # Web Proxy Services
  # ============================================================================

  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: homelab-envoy
    networks:
      - homelab
    ports:
      - "${HTTP_TRANSPARENT_PORT:-10080}:80/tcp"    # Transparent HTTP (host 10080 → container 80)
      - "${HTTPS_TRANSPARENT_PORT:-10443}:443/tcp" # Transparent HTTPS (host 10443 → container 443)
      - "3129:3129/tcp"                            # Internal
      - "9901:9901/tcp"                            # Admin + Metrics
    volumes:
      - ./configs/web/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - squid
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9901/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  squid:
    image: ubuntu/squid:latest
    container_name: homelab-squid
    networks:
      - homelab
    ports:
      - "${PROXY_DIRECT_PORT:-3128}:3128/tcp"  # Direct mode
    volumes:
      - ./configs/web/squid.conf:/etc/squid/squid.conf:ro
      - web-cache:/var/spool/squid
    environment:
      - CACHE_SIZE_MB=${PROXY_CACHE_SIZE_MB:-10240}
    depends_on:
      - privoxy
    healthcheck:
      test: ["CMD", "squidclient", "-h", "localhost", "mgr:info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  privoxy:
    image: vimagick/privoxy:latest
    container_name: homelab-privoxy
    networks:
      - homelab
    volumes:
      - ./configs/web/privoxy/config:/etc/privoxy/config:ro
    depends_on:
      - tor
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "8118"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tor:
    image: dperson/torproxy:latest
    container_name: homelab-tor
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "9050"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # Artifact Repositories
  # ============================================================================

  nexus:
    image: sonatype/nexus3:latest
    container_name: homelab-nexus
    networks:
      - homelab
    ports:
      - "${NEXUS_WEB_PORT:-8081}:8081/tcp"      # Web UI
      - "${NEXUS_DOCKER_PORT:-8082}:8082/tcp"   # Docker registry
    volumes:
      - nexus-data:/nexus-data
      - ./configs/artifacts/nexus/nexus.properties:/nexus-data/etc/nexus.properties:ro
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms2g -Xmx2g -XX:MaxDirectMemorySize=2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  verdaccio:
    image: verdaccio/verdaccio:latest
    container_name: homelab-verdaccio
    networks:
      - homelab
    ports:
      - "4873:4873/tcp"
    volumes:
      - verdaccio-data:/verdaccio/storage
      - ./configs/artifacts/verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4873/-/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # Logging Services
  # ============================================================================

  vector:
    image: timberio/vector:latest-alpine
    container_name: homelab-vector
    networks:
      - homelab
    ports:
      - "9598:9598/tcp"  # Metrics
    volumes:
      - ./configs/logging/vector.toml:/etc/vector/vector.toml:ro
      # SECURITY: Docker socket removed - use syslog or journald driver instead
      # See: codeguard-0-devops-ci-cd-containers
      # TODO: Reconfigure to use Docker logging driver (syslog/journald)
    depends_on:
      - elasticsearch
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9598/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: homelab-elasticsearch
    networks:
      - homelab
    ports:
      - "9200:9200/tcp"  # API
      - "9300:9300/tcp"  # Cluster
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      # SECURITY: Enable xpack security per codeguard-0-data-storage
      - xpack.security.enabled=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      # SECURITY: Use environment variable for password per codeguard-0-data-storage
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme_PLEASE_SET_IN_ENV}
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "elastic:${ELASTICSEARCH_PASSWORD:-changeme_PLEASE_SET_IN_ENV}", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: homelab-loki
    networks:
      - homelab
    ports:
      - "3100:3100/tcp"
    volumes:
      - ./configs/logging/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: homelab-promtail
    networks:
      - homelab
    ports:
      - "9080:9080/tcp"  # Metrics
    volumes:
      - ./configs/logging/promtail.yaml:/etc/promtail/config.yml:ro
      # SECURITY: Docker socket removed - use syslog or journald driver instead
      # See: codeguard-0-devops-ci-cd-containers
      # TODO: Reconfigure to use Docker logging driver (syslog/journald)
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # Monitoring Services
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: homelab-prometheus
    networks:
      - homelab
    ports:
      - "19090:9090/tcp"
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-30}d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: homelab-grafana
    networks:
      - homelab
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./configs/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./configs/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://${HOST_IP}:3000
    depends_on:
      - prometheus
      - loki
      - elasticsearch
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: homelab-jaeger
    networks:
      - homelab
    ports:
      - "16686:16686/tcp"  # Web UI
      - "9411:9411/tcp"    # Zipkin API
      - "14268:14268/tcp"  # Collector
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - SAMPLING_STRATEGIES_FILE=/etc/jaeger/sampling.json
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: homelab-blackbox-exporter
    networks:
      - homelab
    ports:
      - "9115:9115/tcp"
    volumes:
      - ./configs/monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9115/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # VPN Services
  # ============================================================================

  # WireGuard Direct Mode (wg0) - Port 51820
  # VPN clients have direct internet access, optional homelab services
  wireguard-direct:
    image: linuxserver/wireguard:latest
    container_name: homelab-wireguard-direct
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - SERVERURL=${WIREGUARD_SERVERURL:-auto}
      - SERVERPORT=${WIREGUARD_DIRECT_PORT:-51820}
      - PEERS=${WIREGUARD_DIRECT_PEERS:-5}
      - PEERDNS=${HOST_IP}  # Optional DNS
      - INTERNAL_SUBNET=10.13.13.0  # wg0 subnet
      - ALLOWEDIPS=${WIREGUARD_DIRECT_ALLOWEDIPS:-172.20.0.0/16,${HOST_IP}/32}  # Split-tunnel
      - LOG_CONFS=true
    volumes:
      - wireguard-direct-config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WIREGUARD_DIRECT_PORT:-51820}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      wireguard:
        ipv4_address: 172.21.0.2
      homelab:
    dns:
      - ${HOST_IP}
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # WireGuard Transparent Mode (wg1) - Port 51821
  # VPN clients under observation, MUST use homelab services
  wireguard-transparent:
    image: linuxserver/wireguard:latest
    container_name: homelab-wireguard-transparent
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - SERVERURL=${WIREGUARD_SERVERURL:-auto}
      - SERVERPORT=${WIREGUARD_TRANSPARENT_PORT:-51821}
      - PEERS=${WIREGUARD_TRANSPARENT_PEERS:-3}
      - PEERDNS=172.20.0.254  # MUST use transparent gateway
      - INTERNAL_SUBNET=10.13.14.0  # wg1 subnet
      - ALLOWEDIPS=172.20.0.0/16  # Only homelab network (no internet)
      - LOG_CONFS=true
    volumes:
      - wireguard-transparent-config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WIREGUARD_TRANSPARENT_PORT:-51821}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      wireguard:
        ipv4_address: 172.21.0.3
      homelab:
    dns:
      - 172.20.0.254  # Transparent gateway IP (enforced interception)
    depends_on:
      - transparent-gateway
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
