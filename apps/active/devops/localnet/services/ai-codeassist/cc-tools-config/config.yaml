# Claude Code Configuration Template
# This file contains configuration for cc-tools integration

# Claude API Configuration
claude:
  api_key: "${CLAUDE_API_KEY}"
  model: "${CLAUDE_CODE_DEFAULT_MODEL:-claude-3-5-sonnet-20241022}"
  max_tokens: ${CLAUDE_CODE_MAX_TOKENS:-4096}
  temperature: 0.2

# MCP Tool Configuration
mcp:
  enabled: true
  server_url: "http://claude-code-mcp:8082"
  proxy_url: "http://pluggedin-mcp-proxy:8085"
  tools:
    - name: "file-system"
      enabled: true
    - name: "shell"
      enabled: true
    - name: "git"
      enabled: true

# Session Management
session:
  max_concurrent: 5
  timeout_hours: ${CLAUDE_CODE_SESSION_TIMEOUT_HOURS:-24}
  data_dir: "/app/data"

# Logging
logging:
  level: "${CLAUDE_CODE_DEBUG:-INFO}"
  format: "json"

# Security
security:
  rate_limit_rpm: ${CLAUDE_CODE_RATE_LIMIT_RPM:-100}
  rate_limit_rph: ${CLAUDE_CODE_RATE_LIMIT_RPH:-1000}
