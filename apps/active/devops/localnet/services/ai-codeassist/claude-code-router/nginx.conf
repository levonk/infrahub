events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream for Anthropic API
    upstream anthropic_api {
        server api.anthropic.com:443;
        keepalive 32;
    }

    # Health check endpoint
    server {
        listen 8084;
        server_name localhost;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Proxy requests to Anthropic API
        location / {
            # Only allow POST requests for API calls
            if ($request_method !~ ^(POST)$) {
                return 405;
            }

            # Set headers for Anthropic API
            proxy_set_header Host api.anthropic.com;
            proxy_set_header X-API-Key $ANTHROPIC_API_KEY;
            proxy_set_header Content-Type application/json;
            proxy_set_header Anthropic-Version 2023-06-01;
            proxy_set_header User-Agent "Claude-Code-Router/1.0";

            # SSL/TLS settings for external connection
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 2;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

            # Timeout settings
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Pass the request to Anthropic
            proxy_pass https://anthropic_api;
            proxy_ssl_server_name on;
        }
    }
}
