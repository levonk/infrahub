services:
  vibe-kanban:
    image: vibe-kanban:local
    build:
      context: ./vibe-kanban
      dockerfile: Dockerfile
    container_name: vibe-kanban
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Secrets placeholders
      - KANBAN_SESSION_SECRET=${KANBAN_SESSION_SECRET}
      - KANBAN_AUTH_PASSWORD=${KANBAN_AUTH_PASSWORD}
    networks:
      - localnet
    volumes:
      - /home/micro/p:/p  # Multi-repo mount
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vibe-kanban.rule=Host(`kanban.levonk.com`)"
      - "traefik.http.routers.vibe-kanban.entrypoints=websecure"
      - "traefik.http.routers.vibe-kanban.tls=true"
      - "traefik.http.services.vibe-kanban.loadbalancer.server.port=3000"
      - "traefik.http.routers.vibe-kanban.middlewares=authelia@file,local-ip-whitelist@file"
      - "com.dockerproxy.role=rw" # For dockerproxy access identification
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"] # Assuming /health exists, or just root
      interval: 30s
      timeout: 10s
      retries: 3
