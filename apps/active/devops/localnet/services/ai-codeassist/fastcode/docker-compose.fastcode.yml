# FastCode Service Configuration
# AI-powered code understanding and analysis service

services:
  fastcode:
    build:
      context: .
      dockerfile: Dockerfile.fastcode
      args:
        USERNAME: ${USERNAME:-fastcode}
        USER_UID: ${PUID:-1000}
        USER_GID: ${PGID:-1000}
    image: fastcode:latest
    container_name: fastcode
    restart: unless-stopped
    
    # Security settings
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENAI_API_KEY=${FASTCODE_OPENAI_API_KEY:-}
      - MODEL=${FASTCODE_MODEL:-gpt-4}
      - BASE_URL=${FASTCODE_BASE_URL:-https://api.openai.com/v1}
      - NANOBOT_MODEL=${FASTCODE_NANOBOT_MODEL:-minimax/minimax-m2.1}
      - USERNAME=${USERNAME:-fastcode}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    
    # Port mapping
    ports:
      - "${FASTCODE_HOST_PORT:-5000}:5000"
    
    # Volume mounts
    volumes:
      - fastcode_data:/app/data
      - fastcode_logs:/app/logs
      - fastcode_repos:/app/repositories
      - ${FASTCODE_REPO_MOUNT:-}:/app/mounted-repos:ro
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
      start_interval: 5s
    
    # Network
    networks:
      - localnet
    
    # Depends on base services
    depends_on:
      - nix-sidecar
    
    # Labels
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastcode.rule=Host(`fastcode.localnet`)"
      - "traefik.http.routers.fastcode.entrypoints=web"
      - "traefik.http.services.fastcode.loadbalancer.server.port=5000"
      - "com.docker.compose.service=fastcode"
      - "service.type=ai-codeassist"

volumes:
  fastcode_data:
    driver: local
    labels:
      - "com.docker.compose.volume=fastcode_data"
      - "service.type=ai-codeassist"
  
  fastcode_logs:
    driver: local
    labels:
      - "com.docker.compose.volume=fastcode_logs"
      - "service.type=ai-codeassist"
  
  fastcode_repos:
    driver: local
    labels:
      - "com.docker.compose.volume=fastcode_repos"
      - "service.type=ai-codeassist"

networks:
  localnet:
    external: true
    name: localnet
