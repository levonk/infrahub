# OpenFang Configuration Template
# This file contains default configuration for OpenFang Agent Operating System

[server]
# Server binding configuration
host = "0.0.0.0"
port = 4200

# Directory paths
data_dir = "/data/openfang"
config_dir = "/config/openfang"

[logging]
# Logging configuration
level = "info"  # debug, info, warn, error
file = "/data/openfang/openfang.log"
max_file_size = "10MB"
max_files = 5

[security]
# Security settings
enable_auth = false
api_key = ""
enable_cors = true
allowed_origins = ["*"]

[agents]
# Agent configuration
max_concurrent = 10
default_timeout = 300
enable_auto_restart = true

[llm]
# LLM Provider Configuration
# Default provider (can be: openai, anthropic, gemini, etc.)
default_provider = "openai"

# OpenAI Configuration
[llm.openai]
api_key = "${OPENAI_API_KEY:-}"
base_url = "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
model = "gpt-4"
max_tokens = 4096
temperature = 0.7

# Anthropic Configuration
[llm.anthropic]
api_key = "${ANTHROPIC_API_KEY:-}"
base_url = "${ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
model = "claude-3-sonnet-20240229"
max_tokens = 4096

# Google Gemini Configuration
[llm.gemini]
api_key = "${GEMINI_API_KEY:-}"
base_url = "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}"
model = "gemini-pro"
max_tokens = 4096

[database]
# Database configuration (if using external database)
type = "sqlite"  # sqlite, postgresql, mysql
connection_string = "sqlite:///data/openfang/openfang.db"
max_connections = 10

[storage]
# Storage configuration for agent data and knowledge graphs
type = "local"
base_path = "/data/openfang/storage"
max_storage_size = "1GB"

[network]
# Network configuration
timeout = 30
retry_attempts = 3
retry_delay = 1

[monitoring]
# Monitoring and metrics
enable_metrics = true
metrics_port = 9090
health_check_interval = 30

[features]
# Feature flags
enable_web_ui = true
enable_api = true
enable_agents = true
enable_scheduling = true
enable_knowledge_graph = true
