---
# OpenFang Agent Operating System Service
# Open-source Agent OS built in Rust with autonomous agents

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

include:
  - ../../../../docker-compose.include.yml

services:
  # OpenFang - Agent Operating System
  openfang:
    ## Name in Containers view
    container_name: localnet-openfang
    ## Name in Images view
    image: localnet-openfang:latest
    build:
      context: .
      dockerfile: ./Dockerfile.openfang
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
    logging: *default-logging
    restart: unless-stopped
    profiles: [agents, security, localnet, all]
    # Port mappings for web dashboard and API
    ports:
      - "${OPENFANG_HOST_PORT:-4200}:${OPENFANG_CONTAINER_PORT:-4200}"
    environment:
      # User and permissions
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - USERNAME=${USERNAME:-cuser}
      
      # OpenFang configuration
      - OPENFANG_DATA_DIR=${OPENFANG_DATA_DIR:-/data/openfang}
      - OPENFANG_CONFIG_DIR=${OPENFANG_CONFIG_DIR:-/config/openfang}
      - OPENFANG_HOST=${OPENFANG_HOST:-0.0.0.0}
      - OPENFANG_PORT=${OPENFANG_PORT:-4200}
      - OPENFANG_ENABLE_AUTH=${OPENFANG_ENABLE_AUTH:-false}
      - OPENFANG_API_KEY=${OPENFANG_API_KEY:-}
      - OPENFANG_MAX_AGENTS=${OPENFANG_MAX_AGENTS:-10}
      - OPENFANG_AGENT_TIMEOUT=${OPENFANG_AGENT_TIMEOUT:-300}
      - OPENFANG_HEALTH_TIMEOUT=${OPENFANG_HEALTH_TIMEOUT:-10}
      
      # LLM Provider configurations
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
      
      # Additional provider configurations
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - AI21_API_KEY=${AI21_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - SAMBANOVA_API_KEY=${SAMBAANOVA_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-}
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - QIANFAN_API_KEY=${QIANFAN_API_KEY:-}
      - BEDROCK_ACCESS_KEY=${BEDROCK_ACCESS_KEY:-}
      - BEDROCK_SECRET_KEY=${BEDROCK_SECRET_KEY:-}
      - BEDROCK_REGION=${BEDROCK_REGION:-us-east-1}
    volumes:
      # OpenFang data and configuration
      - openfang-data:/data/openfang
      - openfang-config:/config/openfang
      - openfang-storage:/data/openfang/storage
      - openfang-logs:/data/openfang/logs
      
      # User home directory for OpenFang
      - openfang-home:/home/openfang
      
      # Optional: Mount shared volumes from base services
      - nix-cache:/root/.cache/nix:ro
      - nix-config:/etc/nix:ro
    networks:
      - agent-network
    # Remove dependency on nix-sidecar since this is based on kalinix
    # Security options
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "/openfang/healthcheck-openfang.sh > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  # OpenFang persistent volumes
  openfang-data:
    name: localnet-openfang-data-volume
  openfang-config:
    name: localnet-openfang-config-volume
  openfang-storage:
    name: localnet-openfang-storage-volume
  openfang-logs:
    name: localnet-openfang-logs-volume
  openfang-home:
    name: localnet-openfang-home-volume

networks:
  agent-network:
    external: false
  dmz-network:
    external: false
