version: '3.8'

services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperclip
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100

      - DATABASE_URL=postgresql://paperclip:paperclip@postgres:5432/paperclip

      - PAPERCLIP_BIND=0.0.0.0
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - paperclip-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  postgres:
    image: postgres:15-alpine
    container_name: paperclip-postgres
    environment:
      - POSTGRES_DB=paperclip
      - POSTGRES_USER=paperclip
      - POSTGRES_PASSWORD=paperclip
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paperclip-network



volumes:
  postgres-data:
    driver: local

networks:
  paperclip-network:
    driver: bridge

