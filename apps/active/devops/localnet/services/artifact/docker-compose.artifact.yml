    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ncps-data:/data
    networks:
      - localnet
    logging: *default-logging
    profiles: ["broken", "all"]

  nix-snapshotter:
    image: nix-snapshotter:latest
    container_name: localnet-artifact-nix-snapshotter
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - nix-snapshotter-data:/var/lib/nix-snapshotter
      - /nix/store:/nix/store
    networks:
      - localnet
    logging: *default-logging
    profiles: ["broken", "all"]

  # Nix sidecar service - manages the Nix store and caching
  # Rust sidecar for Rust toolchain
  rust-sidecar:
    image: localnet-artifact-sidecar-rust:latest
    container_name: localnet-artifact-sidecar-rust
    build:
      context: ./rust-sidecar
      dockerfile: Dockerfile.rust-sidecar
    restart: unless-stopped
    depends_on:
      nix-sidecar:
        condition: service_healthy
    volumes:
      - rust-cargo-cache:/home/${USERNAME:-cuser}/.cargo/registry
      - rust-cargo-git-cache:/home/${USERNAME:-cuser}/.cargo/git
      - rust-rustup-cache:/home/${USERNAME:-cuser}/.rustup
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: ["CMD", "/rust-sidecar/healthcheck-rust.sh"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: sleep 30
    logging: *default-logging
    profiles: ["all"]

