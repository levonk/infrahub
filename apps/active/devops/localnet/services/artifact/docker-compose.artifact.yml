      retries: 3
      start_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: sleep 30
    logging: *default-logging
    profiles: ["all"]

  unity-sidecar:
    image: localnet-artifact-sidecar-unity:latest
    container_name: localnet-artifact-sidecar-unity
    build:
      context: ./unity-sidecar
      dockerfile: Dockerfile.unity-sidecar
    restart: unless-stopped
    depends_on:
      nix-sidecar:
        condition: service_healthy
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
      - unity-cache:/home/${USERNAME:-cuser}/.cache/unity
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: ["CMD", "/rust-sidecar/healthcheck-rust.sh"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: sleep 30
    logging: *default-logging
    profiles: ["all"]
