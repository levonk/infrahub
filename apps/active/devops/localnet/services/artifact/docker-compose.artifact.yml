---

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"


# Artifact repository services (Nexus & Verdaccio)
volumes:
  nexus-data:
    driver: local
  verdaccio-data:
    driver: local
  attic-data:
    driver: local
  nix-snapshotter-data:
    driver: local
  harmonia-data:
    driver: local
  ncps-data:
    driver: local

services:
  nexus:
    build:
      context: ./nexus/docker
      dockerfile: Dockerfile
    image: localnet-artifact-nexus:latest
    container_name: localnet-artifact-nexus
    logging: *default-logging
    networks:
      - localnet
    ports:
      - "${ARTIFACT_NEXUS_WEB_HOST_PORT:-8081}:8081/tcp"
      - "${ARTIFACT_NEXUS_DOCKER_HOST_PORT:-8082}:8082/tcp"
    volumes:
      - /mnt/d/p/personal/data/docker/volumes/hybrid/nexus-data:/nexus-data
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms2g -Xmx2g -XX:MaxDirectMemorySize=2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  verdaccio:
    image: localnet-artifact-verdaccio:latest
    container_name: localnet-artifact-verdaccio
    logging: *default-logging
    build:
      context: ./verdaccio
      dockerfile: docker/Dockerfile.verdaccio
    networks:
      - localnet
    user: "0:0"
    ports:
      - "${ARTIFACT_VERDACCIO_HOST_PORT:-4873}:${ARTIFACT_VERDACCIO_CONTAINER_PORT:-4873}/tcp"
    volumes:
      - ${ARTIFACT_VERDACCIO_HOST_DATA_PATH}:/verdaccio-data:rw
      - ./verdaccio/mounts/templates:/templates:ro
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4873/-/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nix-attic:
    image: attic-server:latest
    container_name: localnet-artifact-attic
    restart: unless-stopped
    ports:
      - "8083:8080"
    volumes:
      - ./nix-attic/mounts/config.toml:/data/config.toml
      - attic-data:/data
    command: ["-f", "/data/config.toml"]
    networks:
      - localnet
    logging: *default-logging

  nix-harmonia:
    image: harmonia:latest
    container_name: localnet-artifact-harmonia
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - HARMONIA_SIGN_KEY_PATH=/data/secret-key.sec
    volumes:
      - /nix/store:/nix/store:ro
      - harmonia-data:/data
    networks:
      - localnet
    logging: *default-logging

  nix-ncps:
    image: ncps:latest
    container_name: localnet-artifact-ncps
    restart: unless-stopped
    ports:
      - "5001:8080"
    volumes:
      - ncps-data:/data
    networks:
      - localnet
    logging: *default-logging

  nix-snapshotter:
    image: nix-snapshotter:latest
    container_name: localnet-artifact-nix-snapshotter
    restart: unless-stopped
    ports:
      - "8989:8989"
    volumes:
      - nix-snapshotter-data:/var/lib/nix-snapshotter
      - /nix/store:/nix/store
    networks:
      - localnet
    logging: *default-logging
