---
# {{ _service_name | title }} Docker Compose Configuration
# Generated secure docker-compose configuration for {{ _service_description | lower }}

services:
  nix-snapshotter:
    image: nix-snapshotter:latest
    container_name: nix-snapshotter
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=nix-snapshotter
      - SERVICE_PORT=8989
    # Healthcheck assumes curl is available.
    # NOTE: In the 'prod' image, curl might NOT be available if it's truly minimal.
    # You might need to use a different healthcheck strategy for prod (e.g., built-in language features)
    # or ensure the minimal image has a basic http client.
    # For now, we assume the user might want to use the debug image for initial testing.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989{{ _service_health_endpoint }} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nix-snapshotter-network

{% if _include_ui %}
  nix-snapshotter-ui:
    build:
      context: ./ui
      dockerfile: docker/Dockerfile
    container_name: nix-snapshotter-ui
    restart: unless-stopped
    ports:
      - "{{ _ui_port }}:{{ _ui_port }}"
    environment:
      - NODE_ENV=production
      - API_URL=http://nix-snapshotter:8989
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:{{ _ui_port }}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nix-snapshotter-network
{% endif %}

networks:
  nix-snapshotter-network:
    driver: bridge
