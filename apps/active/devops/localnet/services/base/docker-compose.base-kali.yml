---
# Base Kali Linux Services
# Security-focused base images for red team and security testing

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

include:
  - ../../docker-compose.include.yml

services:
  # Base Kali Linux - Security testing foundation
  base-kali:
    ## Name in Containers view
    container_name: localnet-base-kali
    ## Name in Images view
    image: localnet-base-kali:latest
    build:
      context: base-kali
      dockerfile: ./Dockerfile.base-kali
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
        - USERNAME=${USERNAME:-cuser}
    logging: *default-logging
    restart: unless-stopped
    profiles: [base01, localnet, all]
    environment:
      # User and permissions
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - USERNAME=${USERNAME:-cuser}
    volumes:
      # User home directory
      - base-kali-home:/home/${USERNAME:-cuser}
      # Optional: Mount shared volumes from base services
      - nix-cache:/root/.cache/nix:ro
      - nix-config:/etc/nix:ro
    networks:
      - localnet
    # Security options
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Base Kali with Nix - Security testing with Nix package management
  base-kalinix:
    ## Name in Containers view
    container_name: localnet-base-kalinix
    ## Name in Images view
    image: localnet-base-kalinix:latest
    build:
      context: base-kalinix
      dockerfile: ./Dockerfile.base-kalinix
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
        - USERNAME=${USERNAME:-cuser}
    logging: *default-logging
    restart: unless-stopped
    profiles: [base01, localnet, all]
    environment:
      # User and permissions
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - USERNAME=${USERNAME:-cuser}
    volumes:
      # User home directory
      - base-kalinix-home:/home/${USERNAME:-cuser}
      # Nix volumes
      - nix-cache:/root/.cache/nix
      - nix-config:/etc/nix
      - nix-store:/nix
    networks:
      - localnet
    depends_on:
      nix-sidecar:
        condition: service_healthy
    # Security options
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  # Base Kali volumes
  base-kali-home:
    name: localnet-base-kali-home-volume
    external: true
  base-kalinix-home:
    name: localnet-base-kalinix-home-volume
    external: true

networks:
  localnet:
    external: true
    name: localnet-network
