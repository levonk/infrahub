---
# /home/micro/p/gh/lrepo52/job-aide-wt01/apps/active/devops/localnet/services/base/docker-compose.base.yml

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

include:
  - ../../docker-compose.include.yml

# Base images for the localnet stack
services:
  base-alpine:
    image: localnet-base-alpine:latest
    container_name: base-alpine
    build:
      context: ./base-alpine
      dockerfile: ./Dockerfile.base-alpine
    networks:
      - null-network
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    restart: no
    logging: *default-logging
    profiles:
      - base01
      - base02
      - base03

  base-debian:
    image: localnet-base-debian:latest
    container_name: base-debian
    build:
      context: ./base-debian
      dockerfile: ./Dockerfile.base-debian
    networks:
      - null-network
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    restart: no
    logging: *default-logging
    profiles:
      - base01
      - base02
      - base03

  # Nix sidecar service - manages the Nix store and caching
  base-nix:
    ## Name in Containers view
    container_name: base-nix
    ## Name in Images view
    image: localnet-base-nix:latest
    build:
      context: ./base-nix
      dockerfile: ./Dockerfile.base-nix
    depends_on:
      nix-sidecar:
        condition: service_healthy
    networks:
      - null-network
    restart: no
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "nix", "develop", "/app#default", "--command", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    logging: *default-logging
    command: sleep 60
    profiles:
      - base02
      - base03

  # Nix sidecar service - manages the Nix store and caching
  nix-sidecar:
    ## Name in Containers view
    container_name: base-nix-sidecar
    ## Name in Images view
    image: localnet-base-nix-sidecar
    build:
      context: ./nix-sidecar
      dockerfile: ./Dockerfile.nix-sidecar
    networks:
      - null-network
    privileged: true
    restart: unless-stopped
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "/app/healthcheck.sh > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    profiles:
      - base01
      - base02
      - base03
      - all

  # base-sidecar - the other sidecars are based off of this image
  base-sidecar:
    container_name: base-sidecar
    image: localnet-base-sidecar:latest
    build:
      context: ./base-sidecar
      dockerfile: ./Dockerfile.base-sidecar
    networks:
      - null-network
    restart: no
    # Mount the shared named volumes.
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    # Ensure sidecars are started and healthy.
    depends_on:
      base-nix:
        condition: service_healthy
      nix-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nix", "develop", "/app#default", "--command", "/usr/local/bin/healthcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    logging: *default-logging
    command: sleep 60
    profiles:
      - base03

  # Dev-Base service - provides essential development tools and Nix environment
  base-dev:
    container_name: base-dev
    image: localnet-base-dev:latest
    build:
      context: ./dev-base
      dockerfile: ./Dockerfile.dev-base
    networks:
      - null-network
    restart: no
    # Mount the shared named volumes.
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    # Ensure sidecars are started and healthy.
    depends_on:
      nix-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nix", "develop", "/app#default", "--command", "/usr/local/bin/healthcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    command: sleep 60
    logging: *default-logging
    profiles:
      - base03
