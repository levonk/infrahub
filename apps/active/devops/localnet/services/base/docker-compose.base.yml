---
# /home/micro/p/gh/lrepo52/job-aide-wt01/apps/active/devops/localnet/services/base/docker-compose.base.yml

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

include:
  - ../../docker-compose.include.yml

# Base images for the localnet stack
services:
  base-alpine:
    image: localnet-base-alpine:latest
    container_name: localnet-base-alpine
    build:
      context: base-alpine
      dockerfile: ./Dockerfile.base-alpine
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
    networks:
      - null-network
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    depends_on:
      nix-sidecar:
        condition: service_healthy
    restart: no
    logging: *default-logging
    profiles:
      - base01
      - base02
      - base03

  base-debian:
    image: localnet-base-debian:latest
    container_name: localnet-base-debian
    build:
      context: base-debian
      dockerfile: ./Dockerfile.base-debian
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
    networks:
      - null-network
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    depends_on:
      nix-sidecar:
        condition: service_healthy
    restart: no
    logging: *default-logging
    profiles:
      - base01
      - base02
      - base03

  # Nix base image - for inheritance only
  base-nix:
    ## Name in Containers view
    container_name: localnet-base-nix
    ## Name in Images view
    image: localnet-base-nix:latest
    build:
      context: base-nix
      dockerfile: ./Dockerfile.base-nix
    networks:
      - null-network
    restart: no
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    depends_on:
      nix-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nix", "develop", "/base-app#default", "--command", "/base-app/healthcheck.sh"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    logging: *default-logging
    command: sleep 60
    profiles:
      - base02
      - base03

  # Nix sidecar service - manages the Nix store and caching
  nix-sidecar:
    ## Name in Containers view
    container_name: localnet-base-nix-sidecar
    ## Name in Images view
    image: localnet-base-nix-sidecar
    build:
      context: nix-sidecar
      dockerfile: ./Dockerfile.nix-sidecar
    networks:
      - null-network
    privileged: true
    restart: unless-stopped
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "/nix-sidecar/healthcheck-nix-sidecar.sh > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    profiles:
      - base01
      - base02
      - base03
      - all

  # base-sidecar - base image for sidecar services (inheritance only)
  base-sidecar:
    container_name: localnet-base-sidecar
    image: localnet-base-sidecar:latest
    build:
      context: base-sidecar
      dockerfile: ./Dockerfile.base-sidecar
    networks:
      - null-network
    restart: no
    # Mount the shared named volumes.
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    # Ensure sidecars are started and healthy.
    depends_on:
      nix-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nix", "develop", "/app#default", "--command", "/usr/local/bin/healthcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    logging: *default-logging
    command: sleep 60
    profiles:
      - base03

  # base-debnix service - provides Debian + Nix environment (inheritance only)
  base-debnix:
    container_name: localnet-base-debnix
    image: localnet-base-debnix:latest
    build:
      context: base-debnix
      dockerfile: ./Dockerfile.base-debnix
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
    networks:
      - null-network
    restart: no
    # Mount the shared named volumes.
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    depends_on:
      nix-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/base-dev/healthcheck-base-dev.sh"]
      interval: 60s
      timeout: 60s
      retries: 3
      start_period: 120s
    logging: *default-logging
    profiles:
      - base02

  # Dev-Base service - provides essential development tools and Nix environment (inheritance only)
  base-dev:
    container_name: localnet-base-dev
    image: localnet-base-dev:latest
    build:
      context: base-dev
      dockerfile: ./Dockerfile.base-dev
      args:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
    networks:
      - null-network
    restart: no
    # Mount the shared named volumes.
    volumes:
      - nix-store:/nix
      - nix-config:/etc/nix
      - asdf-cache:/home/${USERNAME:-cuser}/.asdf
      - bazel-cache:/home/${USERNAME:-cuser}/.cache/bazel
      - conda-cache:/home/${USERNAME:-cuser}/.conda
      - dart-cache:/home/${USERNAME:-cuser}/.dart-cache
      - dotnet-cache:/home/${USERNAME:-cuser}/.nuget/packages
      - elixir-cache:/home/${USERNAME:-cuser}/.mix/archives
      - go-cache:/home/${USERNAME:-cuser}/go/pkg/mod
      - go-build-cache:/home/${USERNAME:-cuser}/.cache/go-build
      - gradle-cache:/home/${USERNAME:-cuser}/.gradle
      - haskell-cabal-cache:/home/${USERNAME:-cuser}/.cabal
      - haskell-stack-cache:/home/${USERNAME:-cuser}/.stack
      - java-m2-cache:/home/${USERNAME:-cuser}/.m2
      - mise-cache:/home/${USERNAME:-cuser}/.local/share/mise
      - nvm-cache:/home/${USERNAME:-cuser}/.nvm
      - php-cache:/home/${USERNAME:-cuser}/.composer
      - poetry-cache:/home/${USERNAME:-cuser}/.cache/pypoetry
      - pnpm-store:/home/${USERNAME:-cuser}/.local/share/pnpm
      - pyenv-cache:/home/${USERNAME:-cuser}/.pyenv
      - python-cache:/home/${USERNAME:-cuser}/.cache/pip
      - ruby-cache:/home/${USERNAME:-cuser}/.gem
      - rust-cargo-cache:/home/${USERNAME:-cuser}/.cargo/registry
      - rust-cargo-git-cache:/home/${USERNAME:-cuser}/.cargo/git
      - rust-rustup-cache:/home/${USERNAME:-cuser}/.rustup
      - sdkman-cache:/home/${USERNAME:-cuser}/.sdkman/candidates
      - turbo-cache:/home/${USERNAME:-cuser}/.cache/turbo
      - unity-cache:/home/${USERNAME:-cuser}/.cache/unity
      - vscode-cache:/home/${USERNAME:-cuser}/.vscode-server/extensions
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    depends_on:
      nix-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/base-dev/healthcheck-base-dev.sh"]
      interval: 60s
      timeout: 60s
      retries: 3
      start_period: 120s
    logging: *default-logging
    profiles:
      - base03
