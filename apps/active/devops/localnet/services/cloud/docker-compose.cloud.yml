---
# Home services: Home Assistant + Mosquitto + ring-mqtt

# Default logging configuration - use json-file with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

volumes:
  localstack-config:

services:
  localstack:
    image: localstack/localstack
    container_name: localnet-localstack
    logging: *default-logging
    ports:
      - "4566:4566"            # LocalStack Gateway
    networks:
      - localnet
    environment:
      - SERVICES=${SERVICES:-}  # specific services or all
      - DEBUG=${DEBUG:-0}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PUID=${PUID:-1000}
      - GUID=${GUID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - "localstack-config:/var/lib/localstack"
    runtime: sysbox-runc
    restart: unless-stopped

networks:
  localnet:
    external: true
