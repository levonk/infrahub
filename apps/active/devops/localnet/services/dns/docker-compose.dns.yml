---
# DNS service stack for Local Network Infrastructure
# The 'localnet' network is defined in the parent docker-compose.yml with proper subnet configuration
services:
  dnsdist:
    build:
      context: ./dnsdist
      dockerfile: docker/Dockerfile.dnsdist
    image: localnet-dns-dnsdist:latest
    container_name: localnet-dns-dnsdist
    networks:
      - localnet
    ports:
      # Transparent mode: DNSDist listens on container port, forwarded to host port
      # WSL2 limitation: port 53 cannot be bound from containers (Windows reserves it)
      # Using port 5500 - completely clear of conflicts
      - "${DNS_TRANSPARENT_HOST_PORT:-5500}:${DNS_TRANSPARENT_CONTAINER_PORT:-5500}/udp"  # Transparent mode UDP
      - "${DNS_TRANSPARENT_HOST_PORT:-5500}:${DNS_TRANSPARENT_CONTAINER_PORT:-5500}/tcp"  # Transparent mode TCP
      # Direct mode: DNSDist's secondary listener on container port, forwarded to host port
      # Used for testing/debugging the DNSDist service directly
      - "${DNS_DIRECT_HOST_PORT:-5501}:${DNS_DIRECT_CONTAINER_PORT:-5501}/udp"    # Direct mode UDP
      - "${DNS_DIRECT_HOST_PORT:-5501}:${DNS_DIRECT_CONTAINER_PORT:-5501}/tcp"    # Direct mode TCP
      # Metrics endpoint for monitoring DNSDist performance
      - "${DNSDIST_METRICS_HOST_PORT:-8083}:${DNSDIST_METRICS_CONTAINER_PORT:-8083}/tcp"  # Metrics
    volumes:
      - ./dnsdist/configs/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro
      - ./dns-blocklists/mounts/blocklists/compiled:/etc/dnsdist/blocklists:ro
    environment:
      - HOST_IP=${HOST_IP}
      - TRANSPARENT_MODE=true
      - DNS_TRANSPARENT_CONTAINER_PORT=${DNS_TRANSPARENT_CONTAINER_PORT:-5353}
      - DNS_DIRECT_CONTAINER_PORT=${DNS_DIRECT_CONTAINER_PORT:-5353}
      - COREDNS_IP=${DNS_COREDNS_IP:-172.20.255.53}
      - COREDNS_DNS_CONTAINER_PORT=${COREDNS_DNS_CONTAINER_PORT:-15353}
      - DNSCRYPT_STD_IP=${DNS_DNSCRYPT_STD_IP:-172.20.255.50}
      - DNS_DNSCRYPT_STD_CONTAINER_PORT=${DNS_DNSCRYPT_STD_CONTAINER_PORT:-5055}
      - TEMPLATE_FILES=dnsdist
    depends_on:
      coredns:
        condition: service_healthy
      dnscrypt-proxy:
        condition: service_healthy
      dnscrypt-odoh:
        condition: service_started
      dnscrypt-anon:
        condition: service_started
      dnscrypt-doh:
        condition: service_started
      dnscrypt-encrypted:
        condition: service_started
      dnscrypt-plaintext:
        condition: service_started
      dnscrypt-tor:
        condition: service_started
    healthcheck:
      test: ["CMD", "dig", "+short", "example.com", "@127.0.0.1", "-p", "${DNS_DIRECT_CONTAINER_PORT:-5353}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  coredns:
    # CoreDNS: Primary DNS resolver with caching and DNSSEC validation
    # Role: Serves as the primary upstream resolver for DNSDist
    # Provides recursive DNS resolution, local zone support, and DNSSEC validation
    # Falls back to dnscrypt-proxy if CoreDNS becomes unavailable (via DNSDist fallback rules)
    build:
      context: ./coredns
      dockerfile: docker/Dockerfile.coredns
    image: localnet-dns-coredns:latest
    container_name: localnet-dns-coredns
    networks:
      localnet:
        aliases:
          - coredns
    ports:
      # Direct mode: CoreDNS listens on container :${COREDNS_DNS_CONTAINER_PORT}, forwarded to host
      # Primary DNS resolver with caching and DNSSEC validation
      # DNSDist forwards queries to this service as the primary upstream
      - "${COREDNS_DNS_HOST_PORT:-15354}:${COREDNS_DNS_CONTAINER_PORT:-15353}/udp"  # Direct mode UDP
      - "${COREDNS_DNS_HOST_PORT:-15354}:${COREDNS_DNS_CONTAINER_PORT:-15353}/tcp"  # Direct mode TCP
      # Metrics endpoint for monitoring CoreDNS performance
      - "${COREDNS_METRICS_HOST_PORT:-9153}:9153/tcp"  # Metrics
      # Health check endpoint (default host port: 27493)
      - "${COREDNS_HEALTH_HOST_PORT:-27493}:${COREDNS_HEALTH_CONTAINER_PORT:-18080}/tcp"   # Health
    environment:
      - COREDNS_HEALTH_PORT=${COREDNS_HEALTH_CONTAINER_PORT:-18080}
    volumes:
      - ./coredns/configs/Corefile:/etc/coredns/Corefile:ro
      - dns-cache:/var/lib/coredns
    depends_on:
      dnscrypt-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${COREDNS_HEALTH_CONTAINER_PORT:-18080}/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 10s
    restart: unless-stopped

  dnscrypt-odoh:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-odoh:latest
    container_name: localnet-dns-dnscrypt-odoh
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_ODOH_HOST_PORT:-5360}:${DNS_DNSCRYPT_ODOH_CONTAINER_PORT:-5053}/udp"
      - "${DNS_DNSCRYPT_ODOH_HOST_PORT:-5360}:${DNS_DNSCRYPT_ODOH_CONTAINER_PORT:-5053}/tcp"
    environment:
      - DNS_DNSCRYPT_ODOH_CONTAINER_PORT=${DNS_DNSCRYPT_ODOH_CONTAINER_PORT:-5053}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    # IMPORTANT: Pass ONLY the config name WITHOUT .toml extension to the entrypoint script.
    # The script prepends /etc/dnscrypt-proxy/ and appends .toml.template automatically.
    # Each service must specify its own config variant (odoh, anon, std, doh, encrypted, plaintext, tor)
    command: ["dnscrypt-proxy-odoh"]
    restart: unless-stopped

  dnscrypt-anon:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-anon:latest
    container_name: localnet-dns-dnscrypt-anon
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_ANON_HOST_PORT:-5361}:${DNS_DNSCRYPT_ANON_CONTAINER_PORT:-5054}/udp"
      - "${DNS_DNSCRYPT_ANON_HOST_PORT:-5361}:${DNS_DNSCRYPT_ANON_CONTAINER_PORT:-5054}/tcp"
    environment:
      - DNS_DNSCRYPT_ANON_CONTAINER_PORT=${DNS_DNSCRYPT_ANON_CONTAINER_PORT:-5054}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    command: ["dnscrypt-proxy-anon"]
    restart: unless-stopped

  dnscrypt-proxy:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-proxy:latest
    container_name: localnet-dns-dnscrypt-proxy
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_STD_HOST_PORT:-5362}:${DNS_DNSCRYPT_STD_CONTAINER_PORT:-5055}/udp"
      - "${DNS_DNSCRYPT_STD_HOST_PORT:-5362}:${DNS_DNSCRYPT_STD_CONTAINER_PORT:-5055}/tcp"
    environment:
      - DNS_DNSCRYPT_STD_CONTAINER_PORT=${DNS_DNSCRYPT_STD_CONTAINER_PORT:-5055}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    command: ["dnscrypt-proxy-std"]
    restart: unless-stopped

  dnscrypt-doh:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-doh:latest
    container_name: localnet-dns-dnscrypt-doh
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_DOH_HOST_PORT:-5363}:${DNS_DNSCRYPT_DOH_CONTAINER_PORT:-5056}/udp"
      - "${DNS_DNSCRYPT_DOH_HOST_PORT:-5363}:${DNS_DNSCRYPT_DOH_CONTAINER_PORT:-5056}/tcp"
    environment:
      - DNS_DNSCRYPT_DOH_CONTAINER_PORT=${DNS_DNSCRYPT_DOH_CONTAINER_PORT:-5056}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    command: ["dnscrypt-proxy-doh"]
    restart: unless-stopped

  dnscrypt-encrypted:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-encrypted:latest
    container_name: localnet-dns-dnscrypt-encrypted
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_ENCRYPTED_HOST_PORT:-5364}:${DNS_DNSCRYPT_ENCRYPTED_CONTAINER_PORT:-5057}/udp"
      - "${DNS_DNSCRYPT_ENCRYPTED_HOST_PORT:-5364}:${DNS_DNSCRYPT_ENCRYPTED_CONTAINER_PORT:-5057}/tcp"
    environment:
      - DNS_DNSCRYPT_ENCRYPTED_CONTAINER_PORT=${DNS_DNSCRYPT_ENCRYPTED_CONTAINER_PORT:-5057}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    command: ["dnscrypt-proxy-encrypted"]
    restart: unless-stopped

  dnscrypt-plaintext:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-plaintext:latest
    container_name: localnet-dns-dnscrypt-plaintext
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_PLAINTEXT_HOST_PORT:-5365}:${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}/udp"
      - "${DNS_DNSCRYPT_PLAINTEXT_HOST_PORT:-5365}:${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}/tcp"
    environment:
      - DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT=${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    command: ["dnscrypt-proxy-plaintext"]
    restart: unless-stopped

  dnscrypt-tor:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-tor:latest
    container_name: localnet-dns-dnscrypt-tor
    networks:
      - localnet
    ports:
      - "${DNS_DNSCRYPT_TOR_HOST_PORT:-5366}:${DNS_DNSCRYPT_TOR_CONTAINER_PORT:-5066}/udp"
      - "${DNS_DNSCRYPT_TOR_HOST_PORT:-5366}:${DNS_DNSCRYPT_TOR_CONTAINER_PORT:-5066}/tcp"
    environment:
      - DNS_DNSCRYPT_TOR_CONTAINER_PORT=${DNS_DNSCRYPT_TOR_CONTAINER_PORT:-5066}
      - PROXY_SOCKS5_TOR_IP=${PROXY_SOCKS5_TOR_IP:-172.20.255.70}
      - PROXY_SOCKS5_TOR_CONTAINER_PORT=${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}
    command: ["dnscrypt-proxy-tor"]
    depends_on:
      tor-proxy:
        condition: service_healthy
    restart: unless-stopped

  tor-proxy:
    build:
      context: ../proxy/tor
      dockerfile: docker/Dockerfile.tor
    image: localnet-proxy-tor:latest
    container_name: localnet-proxy-tor
    networks:
      - localnet
    ports:
      - "${PROXY_SOCKS5_TOR_HOST_PORT:-9050}:${PROXY_SOCKS5_TOR_CONTAINER_PORT:-9050}/tcp"
    restart: unless-stopped

  blocklist-compiler:
    build:
      context: ./dns-blocklists
      dockerfile: Dockerfile.blocklist-compiler
    container_name: localnet-dns-blocklist-compiler
    networks:
      - localnet
    volumes:
      - ./dns-blocklists/mounts/blocklists/sources:/blocklists/sources
      - ./dns-blocklists/mounts/blocklists/compiled:/blocklists/compiled
    read_only: true
    tmpfs:
      - /tmp/blocklists:mode=1777,size=512m
    healthcheck:
      test: ["CMD", "test", "-f", "/blocklists/compiled/blocklist.cdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: "no"  # Run once on startup, use cron/systemd for updates

volumes:
  dns-cache:
    driver: local
