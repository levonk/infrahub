---
# DNS service stack for Local Network Infrastructure
# The 'localnet' network is defined in the parent docker-compose.yml with proper subnet configuration
services:
  # First peer (not transparent) layer of DNS Services. Handles Blocklists.
  dnsdist:
    build:
      context: ./dnsdist
      dockerfile: docker/Dockerfile.dnsdist
    image: localnet-dns-dnsdist:latest
    container_name: localnet-dns-dnsdist
    networks:
      - localnet
    ports:
      # Transparent mode: DNSDist listens on container port, forwarded to host port
      # WSL2 limitation: port 53 cannot be bound from containers (Windows reserves it)
      # Using port 5500 - completely clear of conflicts
      - "${DNS_TRANSPARENT_HOST_PORT:-5500}:${DNS_TRANSPARENT_CONTAINER_PORT:-5500}/udp"  # Transparent mode UDP
      - "${DNS_TRANSPARENT_HOST_PORT:-5500}:${DNS_TRANSPARENT_CONTAINER_PORT:-5500}/tcp"  # Transparent mode TCP
      # Direct mode: DNSDist's secondary listener on container port, forwarded to host port
      # Used for testing/debugging the DNSDist service directly
      - "${DNS_DNSDIST_MAIN_HOST_PORT:-5501}:${DNS_DNSDIST_MAIN_CONTAINER_PORT:-5501}/udp"    # Direct mode UDP
      - "${DNS_DNSDIST_MAIN_HOST_PORT:-5501}:${DNS_DNSDIST_MAIN_CONTAINER_PORT:-5501}/tcp"    # Direct mode TCP
      # Metrics endpoint for monitoring DNSDist performance
      - "${DNS_DNSDIST_METRICS_HOST_PORT:-8083}:${DNS_DNSDIST_METRICS_CONTAINER_PORT:-8083}/tcp"  # Metrics
    volumes:
      - ./dnsdist/mounts/templates:/templates:ro
      - ./dns-blocklists/mounts/blocklists/compiled:/etc/dnsdist/blocklists:ro
    env_file:
      - ../../.env
    depends_on:
      coredns:
        condition: service_healthy
      blocklist-compiler:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "dig", "+short", "example.com", "@127.0.0.1", "-p", "${DNS_DNSDIST_MAIN_CONTAINER_PORT:-5353}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 170s
    restart: unless-stopped

  # second layer of DNS Services. Handles fallback, and normal caching
  coredns:
    # CoreDNS: Primary DNS resolver with caching and DNSSEC validation
    # Role: Serves as the primary upstream resolver for DNSDist
    # Provides recursive DNS resolution, local zone support, and DNSSEC validation
    # Falls back to dnscrypt-proxy if CoreDNS becomes unavailable (via DNSDist fallback rules)
    build:
      context: ./coredns
      dockerfile: docker/Dockerfile.coredns
    image: localnet-dns-coredns:latest
    container_name: localnet-dns-coredns
    networks:
      localnet:
        ipv4_address: ${DNS_COREDNS_MAIN_IP:-172.21.255.51}
        aliases:
          - coredns
    ports:
      # Direct mode: CoreDNS listens on container :${DNS_COREDNS_MAIN_CONTAINER_PORT}, forwarded to host
      # Primary DNS resolver with caching and DNSSEC validation
      # DNSDist forwards queries to this service as the primary upstream
      - "${DNS_COREDNS_MAIN_HOST_PORT:-15354}:${DNS_COREDNS_MAIN_CONTAINER_PORT:-15353}/udp"  # Direct mode UDP
      - "${DNS_COREDNS_MAIN_HOST_PORT:-15354}:${DNS_COREDNS_MAIN_CONTAINER_PORT:-15353}/tcp"  # Direct mode TCP
      # Metrics endpoint for monitoring CoreDNS performance
      - "${DNS_COREDNS_MAIN_METRICS_HOST_PORT:-9153}:9153/tcp"  # Metrics
      # Health check endpoint (default host port: 27493)
      - "${DNS_COREDNS_MAIN_HEALTH_HOST_PORT:-27493}:${DNS_COREDNS_MAIN_HEALTH_CONTAINER_PORT:-18080}/tcp"   # Health
    environment:
      - DNS_COREDNS_MAIN_IP=${DNS_COREDNS_MAIN_IP:-172.21.0.8}
      - DNS_COREDNS_MAIN_HOST_PORT=${DNS_COREDNS_MAIN_HOST_PORT:-15354}
      - DNS_COREDNS_MAIN_CONTAINER_PORT=${DNS_COREDNS_MAIN_CONTAINER_PORT:-15353}
      - DNS_COREDNS_MAIN_METRICS_HOST_PORT=${DNS_COREDNS_MAIN_METRICS_HOST_PORT:-9153}
      - DNS_COREDNS_MAIN_HEALTH_HOST_PORT=${DNS_COREDNS_MAIN_HEALTH_HOST_PORT:-27493}
      - DNS_COREDNS_MAIN_HEALTH_CONTAINER_PORT=${DNS_COREDNS_MAIN_HEALTH_CONTAINER_PORT:-18080}
      - DNS_DNSCRYPT_ODOH_IP=${DNS_DNSCRYPT_ODOH_IP:-5058}
      - DNS_DNSCRYPT_ANON_IP=${DNS_DNSCRYPT_ANON_IP:-5058}
      - DNS_DNSCRYPT_STD_IP=${DNS_DNSCRYPT_STD_IP:-5058}
      - DNS_DNSCRYPT_DOH_IP=${DNS_DNSCRYPT_DOH_IP:-5058}
      - DNS_DNSCRYPT_ENCRYPTED_IP=${DNS_DNSCRYPT_ENCRYPTED_IP:-5058}
      - DNS_DNSCRYPT_PLAINTEXT_IP=${DNS_DNSCRYPT_PLAINTEXT_IP:-5058}
      - DNS_DNSCRYPT_TOR_IP=${DNS_DNSCRYPT_TOR_IP:-5058}
      - DNS_DNSCRYPT_TOR_CONTAINER_PORT=${DNS_DNSCRYPT_TOR_CONTAINER_PORT:-5058}
      - DNS_DNSCRYPT_TOR_HOST_PORT=${DNS_DNSCRYPT_TOR_HOST_PORT:-5058}
      - DNS_DNSCRYPT_ODOH_CONTAINER_PORT=${DNS_DNSCRYPT_ODOH_CONTAINER_PORT:-5058}
      - DNS_DNSCRYPT_ANON_CONTAINER_PORT=${DNS_DNSCRYPT_ANON_CONTAINER_PORT:-5058}
      - DNS_DNSCRYPT_STD_CONTAINER_PORT=${DNS_DNSCRYPT_STD_CONTAINER_PORT:-5058}
      - DNS_DNSCRYPT_DOH_CONTAINER_PORT=${DNS_DNSCRYPT_DOH_CONTAINER_PORT:-5058}
      - DNS_DNSCRYPT_ENCRYPTED_CONTAINER_PORT=${DNS_DNSCRYPT_ENCRYPTED_CONTAINER_PORT:-5058}
      - DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT=${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}
    volumes:
      - ./coredns/mounts/templates:/templates:ro
      - ./coredns/mounts/coredns-cache:/var/lib/coredns
    depends_on:
      dnscrypt-plaintext:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${DNS_COREDNS_MAIN_HEALTH_CONTAINER_PORT:-18080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

