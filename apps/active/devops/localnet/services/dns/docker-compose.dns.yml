  # third layer of DNS Services. Handles DNS native outbound communication
  dnscrypt-plaintext:
    build:
      context: ./dnscrypt
      dockerfile: docker/Dockerfile.dnscrypt-proxy
    image: localnet-dns-dnscrypt-plaintext:latest
    container_name: localnet-dns-dnscrypt-plaintext
    networks:
      localnet:
        ipv4_address: ${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_IP:-172.21.255.65}
    volumes:
      - ./dnscrypt/mounts/templates:/templates:ro
    ports:
      - "${DNS_DNSCRYPT_PLAINTEXT_HOST_PORT:-5365}:${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}/udp"
      - "${DNS_DNSCRYPT_PLAINTEXT_HOST_PORT:-5365}:${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}/tcp"
    environment:
      - DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT=${DNS_DNSCRYPT_PLAINTEXT_CONTAINER_PORT:-5058}
    command: ["/usr/local/bin/entrypoint-dnscrypt.sh", "dnscrypt-proxy-plaintext"]
    restart: unless-stopped

