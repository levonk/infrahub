  # Foundational Tor proxy services, used by other network services
  tor-proxy:
    build:
      context: ../proxy/tor
      dockerfile: docker/Dockerfile.tor
    image: localnet-proxy-tor:latest
    container_name: localnet-proxy-tor
    networks:
      localnet:
        ipv4_address: 172.21.255.70
    ports:
      - "${PROXY_TOR_SOCKS5_HOST_PORT:-9050}:${PROXY_TOR_SOCKS5_CONTAINER_PORT:-9050}/tcp"
    environment:
      - PROXY_TOR_SOCKS5_CONTAINER_PORT=${PROXY_TOR_SOCKS5_CONTAINER_PORT:-9050}
    restart: unless-stopped

  # Job container that creates DNSDIST cdb based blocklists
  blocklist-compiler:
    build:
      context: ./dns-blocklists
      dockerfile: Dockerfile.blocklist-compiler
    container_name: localnet-dns-blocklist-compiler
    networks:
      - localnet
    volumes:
      - ./dns-blocklists/mounts/blocklists:/blocklists
    #read_only: true
    tmpfs:
      - /tmp:mode=1777,size=512m
    healthcheck:
      test: ["CMD", "test", "-f", "/blocklists/compiled/blocklist.cdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: "no"  # Run once on startup, use n8n/cron/systemd for updates
