---
# File Browser Docker Compose Configuration
# Service: File Manager
# Upstream: https://github.com/filebrowser/filebrowser

services:
  file-browser:
    image: filebrowser/filebrowser:v2.30.0
    container_name: localnet-file-xfer-file-browser
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - /mnt/d/p/gh/lrepo52/mrepo:/srv
      - ./filebrowser.db:/database/filebrowser.db
      - ./settings.json:/config/settings.json
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
      - FB_LOG=stdout
      - FB_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - localnet

networks:
  localnet:
    external: true
