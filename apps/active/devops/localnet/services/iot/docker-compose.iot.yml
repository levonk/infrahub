---

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"


services:
    iot-mosquitto:
        image: eclipse-mosquitto:2
        container_name: localnet-iot-mosquitto
    logging: *default-logging
        networks:
            - localnet
        ports:
            - "127.0.0.1:${IOT_MQTT_HOST_PORT:-1883}:${IOT_MQTT_CONTAINER_PORT:-1883}/tcp"
            - "127.0.0.1:${IOT_MQTT_WS_HOST_PORT:-9001}:${IOT_MQTT_WS_CONTAINER_PORT:-9001}/tcp"
        env_file:
            - ../../.env
        volumes:
            - ./mosquitto/mounts/config:/mosquitto/config:ro
            - ./mosquitto/mounts/data:/mosquitto/data:rw
            - ./mosquitto/mounts/log:/mosquitto/log:rw
        healthcheck:
            test:
                [
                    "CMD",
                    "sh",
                    "-c",
                    "mosquitto_sub -h 127.0.0.1 -p ${IOT_MQTT_CONTAINER_PORT:-1883} -t '$SYS/#' -C 1 -W 2 >/dev/null 2>&1",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s
        restart: unless-stopped
