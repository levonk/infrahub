---
# Jellyseerr Docker Compose Configuration
# Generated secure docker-compose configuration for jellyseerr

services:
  jellyfintv:
    image: fallenbagel/jellyseerr:latest
    container_name: localnet-media-jellyfintv-standalone
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      - PUID=${_PUID:-1000}
      - PGID=${_PGID:-1000}
      - TZ=${_TZ:-America/Los_Angeles}
      - LOG_LEVEL=info
    volumes:
      - ./mounts/config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jellyfintv-network

networks:
  jellyfintv-network:
    driver: bridge

