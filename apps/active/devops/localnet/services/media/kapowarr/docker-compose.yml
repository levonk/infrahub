---
# Kapowarr Docker Compose Configuration
# Generated secure docker-compose configuration for kapowarr

services:
  kapowarr:
    image: mrcas/kapowarr:latest
    container_name: localnet-media-kapowarr-standalone
    restart: unless-stopped
    ports:
      - "5656:5656"
    environment:
      - PUID=${_PUID:-1000}
      - PGID=${_PGID:-1000}
      - TZ=${_TZ:-America/Los_Angeles}
    volumes:
      - ./mounts/data:/app/db
      - ./mounts/comics:/comics
      - ./mounts/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5656"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - kapowarr-network

networks:
  kapowarr-network:
    driver: bridge

