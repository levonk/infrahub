---
# NTP service stack for Home Lab In-a-Box
services:
  chronyd:
    build:
      context: ./chronyd
      dockerfile: docker/Dockerfile.chronyd
    image: localnet-ntp-chronyd:latest
    container_name: localnet-ntp-chronyd
    networks:
      - localnet
    ports:
      - "${NTP_TRANSPARENT_HOST_PORT:-123}:${NTP_TRANSPARENT_CONTAINER_PORT:-123}/udp" # Transparent mode UDP
      - "${NTP_TRANSPARENT_HOST_PORT:-123}:${NTP_TRANSPARENT_CONTAINER_PORT:-123}/tcp" # Transparent mode TCP
      - "${NTP_DIRECT_HOST_PORT:-1123}:${NTP_DIRECT_CONTAINER_PORT:-1123}/udp" # Direct mode UDP (mapped from container port 123)
      - "${NTP_DIRECT_HOST_PORT:-1123}:${NTP_DIRECT_CONTAINER_PORT:-1123}/tcp" # Direct mode TCP (mapped from container port 123)
      - "${CHRONYD_NTS_HOST_PORT:-4460}:4460/tcp" # NTS-KE (Network Time Security Key Exchange)
      - "${CHRONYD_METRICS_HOST_PORT:-9123}:9123/tcp" # Metrics (if exporter added later)
    healthcheck:
      test: ["CMD", "chronyc", "tracking"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_TIME
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE # Needed for entrypoint to chmod /run/chrony at startup
