---
# NTP service stack for Home Lab In-a-Box
networks:
  homelab:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}

services:
  chronyd:
    build:
      context: ./services/ntp/chronyd/docker
      dockerfile: Dockerfile.chronyd
    image: homelab-chronyd:latest
    container_name: homelab-ntp-chronyd
    networks:
      - homelab
    ports:
      - "${NTP_TRANSPARENT_PORT:-123}:123/udp"  # Transparent mode UDP
      - "${NTP_TRANSPARENT_PORT:-123}:123/tcp"  # Transparent mode TCP
      - "${NTP_DIRECT_PORT:-1123}:1123/udp"     # Direct mode UDP (mapped from container port 123)
      - "${NTP_DIRECT_PORT:-1123}:1123/tcp"     # Direct mode TCP (mapped from container port 123)
      - "${CHRONYD_NTS_HOST_PORT:-4460}:4460/tcp"          # NTS-KE (Network Time Security Key Exchange)
      - "${CHRONYD_METRICS_HOST_PORT:-9123}:9123/tcp"      # Metrics (if exporter added later)
    volumes:
      - ./services/ntp/chronyd/config/chrony.conf:/etc/chrony/chrony.conf:ro
      - chronyd-data:/var/lib/chrony
    healthcheck:
      test: ["CMD", "chronyc", "tracking"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_TIME
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
