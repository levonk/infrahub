---
# Proxy chain stack for Home Lab In-a-Box
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"
    labels: "service"

services:
  transparent-gateway:
    build:
      context: ./configs/transparent-gateway
      dockerfile: Dockerfile.transparent-gateway
    container_name: homelab-proxy-transparent-gateway
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      homelab:
        ipv4_address: 172.20.0.254
    ports:
      - "${TRANSPARENT_GATEWAY_METRICS_HOST_PORT:-9099}:${TRANSPARENT_GATEWAY_METRICS_PORT:-9099}/tcp"  # Metrics endpoint
    environment:
      - DNS_SERVER=dnsdist
      - DNS_PORT=5353
      - NTP_SERVER=chronyd
      - NTP_PORT=123
      - WEB_PROXY=squid
      - WEB_PROXY_PORT=3128
      - GATEWAY_FAILURE_MODE=${GATEWAY_FAILURE_MODE:-fallback-direct}
      - GATEWAY_TIMEOUT=${GATEWAY_TIMEOUT:-30}
      - METRICS_PORT=${TRANSPARENT_GATEWAY_METRICS_PORT:-9099}
    healthcheck:
      test: ["CMD", "sh", "-c", "iptables -t nat -L -n && nc -zv localhost ${TRANSPARENT_GATEWAY_METRICS_PORT:-9099}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: homelab-proxy-envoy
    networks:
      - homelab
    ports:
      - "${HTTP_TRANSPARENT_PORT:-10080}:80/tcp"    # Transparent HTTP (host 10080 → container 80)
      - "${HTTPS_TRANSPARENT_PORT:-10443}:443/tcp" # Transparent HTTPS (host 10443 → container 443)
      - "${ENVOY_INTERNAL_HOST_PORT:-3129}:3129/tcp"  # Internal
      - "${ENVOY_ADMIN_HOST_PORT:-9901}:9901/tcp"     # Admin + Metrics
    volumes:
      - ./configs/web/envoy:/etc/envoy/conf.d:ro
    depends_on:
      - squid
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9901/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  squid:
    image: ubuntu/squid:latest
    container_name: homelab-proxy-squid
    networks:
      - homelab
    ports:
      - "${PROXY_DIRECT_PORT:-3128}:3128/tcp"  # Direct mode
    volumes:
      - ./configs/web/squid.conf:/etc/squid/conf.d/homelab.conf:ro
      - web-cache:/var/spool/squid
    environment:
      - CACHE_SIZE_MB=${PROXY_CACHE_SIZE_MB:-10240}
    depends_on:
      - privoxy
    healthcheck:
      test: ["CMD", "squidclient", "-h", "localhost", "mgr:info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  privoxy:
    image: vimagick/privoxy:latest
    container_name: homelab-proxy-privoxy
    networks:
      - homelab
    volumes:
      - ./configs/web/privoxy:/etc/privoxy:ro
    depends_on:
      - tor
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "8118"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tor:
    image: dperson/torproxy:latest
    container_name: homelab-proxy-tor
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "9050"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  web-cache:
    driver: local

networks:
  homelab:
    external: true
