  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: localnet-proxy-envoy
    build:
      context: ./proxy/envoy
      dockerfile: docker/Dockerfile.envoy
#    profiles:
#      - monitoring  # Only start with: docker-compose up --profile monitoring
    networks:
      - localnet
    ports:
      - "${HTTP_TRANSPARENT_PORT:-10080}:80/tcp"    # Transparent HTTP (host 10080 → container 80)
      - "${HTTPS_TRANSPARENT_PORT:-10443}:443/tcp" # Transparent HTTPS (host 10443 → container 443)
      - "${ENVOY_INTERNAL_HOST_PORT:-3129}:3129/tcp"  # Internal
      - "${ENVOY_ADMIN_HOST_PORT:-9901}:9901/tcp"     # Admin + Metrics
    volumes:
      - ./configs/web/envoy:/etc/envoy/conf.d:ro
    depends_on:
      - squid
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9901/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  squid:
    image: ubuntu/squid:latest
    container_name: localnet-proxy-squid
    build:
      context: ./proxy/squid
      dockerfile: docker/Dockerfile.squid
    networks:
      - localnet
    ports:
      - "${PROXY_DIRECT_PORT:-3128}:3128/tcp"  # Direct mode
    volumes:
      - ./configs/web/squid.conf:/etc/squid/conf.d/localnet.conf:ro
      - web-cache:/var/spool/squid
    environment:
      - CACHE_SIZE_MB=${PROXY_CACHE_SIZE_MB:-10240}
    depends_on:
      - privoxy
#    profiles:
#      - proxy  # Core proxy chain
    healthcheck:
      test: ["CMD", "squidclient", "-h", "localhost", "mgr:info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  privoxy:
    image: vimagick/privoxy:latest
    container_name: localnet-proxy-privoxy
    build:
      context: ./proxy/privoxy
      dockerfile: docker/Dockerfile.privoxy
    networks:
      - localnet
    volumes:
      - ./configs/web/privoxy:/etc/privoxy:ro
    depends_on:
      - proxy-tor
#    profiles:
#      - proxy  # Core proxy chain
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "8118"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

#  tor:
