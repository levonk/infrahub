version: "3.8"

services:
  # 1. The Firewall
  # Must be built first: nix build .# && docker load < result
  firewall:
    image: egress-firewall:latest
    container_name: demo-firewall
    cap_add:
      - NET_ADMIN
    environment:
      - DEBUG=true
      # Example: Allow access to httpbin.org on HTTPS, and Cloudflare DNS
      - ALLOW_DESTINATIONS=httpbin.org:443,1.1.1.1:53
      - ENABLE_DNS=true

  # 2. Protected App (Success Case)
  # Should be able to reach httpbin.org
  test-success:
    image: curlimages/curl:latest
    command: ["-v", "https://httpbin.org/get"]
    network_mode: service:firewall
    depends_on:
      - firewall
    profiles: ["test"]

  # 3. Protected App (Fail Case)
  # Should timeout/fail reaching google.com
  test-fail:
    image: curlimages/curl:latest
    command: ["--connect-timeout", "5", "-v", "https://google.com"]
    network_mode: service:firewall
    depends_on:
      - firewall
    profiles: ["test"]
