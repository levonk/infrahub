---
# Netbird VPN Docker Compose Configuration
# Generated secure docker-compose configuration for netbird vpn client

services:
  vpn-netbird:
    image: vpn-netbird:latest
    container_name: vpn-netbird
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=vpn-netbird
      - SERVICE_PORT=8084
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - vpn-netbird-network

networks:
  vpn-netbird-network:
    driver: bridge
