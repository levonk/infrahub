---
# Common Cross-Cutting Variables
# Location: levonk/active/02-config/ansible/group_vars/all.yml
# Purpose: Variables shared across all hosts in the levonk inventory.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# User & Identity
# ---------------------------------------------------------------------------
cuser_name: "cuser"
cuser_uid: 1000
cuser_gid: 1000

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------
timezone: "UTC"

# ---------------------------------------------------------------------------
# Ansible Connection Defaults
# ---------------------------------------------------------------------------
ansible_python_interpreter: "/usr/bin/python3"
ansible_become_method: "sudo"
# ansible_ssh_user: "{{ cuser_name }}"  # Temporarily disabled for bootstrap
