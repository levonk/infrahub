---
# Local Network Inventory
# Location: levonk/active/02-config/ansible/inventories/localnet.yml
# Purpose: Defines the localnet_hosts host group for local machines.
# All host-specific connection data is variable-driven; no hardcoded IPs.
# Uses levonk/active/02-config/ansible/group_vars/infrahub-levonk-all.vault.yml for shared Tailscale auth key.
# ---------------------------------------------------------------------------

all:
  children:
    localnet_hosts:
      hosts:
        kckinai:
          ansible_host: "{{ localnet_kckinai_ansible_host_ip }}"
          ansible_user: "{{ localnet_kckinai_ansible_user }}"
          ansible_ssh_private_key_file: "{{ localnet_kckinai_ssh_private_key_file }}"
          ansible_port: "{{ localnet_kckinai_ssh_host_port }}"
          ansible_python_interpreter: "/usr/bin/python3"
          ansible_become_method: "sudo"
      vars:
        localnet_stack_enabled: true

    vpn_tailscale_clients:
      children:
        localnet_hosts:
      vars:
        # Tailscale Client Configuration
        vpn_tailscale_enabled: true
        vpn_tailscale_auth_key: "{{ vault_tailscale_auth_key | default('') }}"
        vpn_tailscale_hostname: "kckinai"
        vpn_tailscale_run_exit_node: false
        vpn_tailscale_accept_routes: true
        vpn_tailscale_accept_dns: true
        
        # Service Directories
        localnet_services_dir: "/opt/localnet/services"
        shared_container_services_dir: "{{ playbook_dir }}../../../shared/active/03-container/services"
        localnet_tz: "UTC"
