---
# OCI Cloud Server Inventory
# Location: levonk/active/02-config/ansible/inventories/oci.yml
# Purpose: Defines the cloud_servers host group for the OCI cloud-server host.
# All host-specific connection data is variable-driven; no hardcoded IPs.
# ---------------------------------------------------------------------------

all:
  children:
    cloud_servers:
      hosts:
        oci-cloud-server:
          ansible_host: "100.90.22.85"
          ansible_user: "opc"
          ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/lzkmbp2016-micro-oracle"
          ansible_port: 22
          ansible_python_interpreter: "/usr/bin/python3"
          ansible_become_method: "sudo"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      vars:
        # CrowdSec Configuration
        security_crowdsec_enabled: true
        security_crowdsec_bouncer_api_key: "{{ vault_crowdsec_bouncer_api_key | default('change-me-in-vault') }}"
        security_crowdsec_traefik_container_name: "traefik"
        security_crowdsec_network_name: "traefik-network"
        # Traefik Configuration overrides
        proxy_traefik_geoblock_enabled: false
        proxy_traefik_crowdsec_enabled: false
        proxy_traefik_plugins_enabled: false
        proxy_traefik_acme_staging: false
        # Cloudflare credentials for ACME
        vault_cloudflare_api_token: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          31313461373738313562373761663766376534623234353033366164613932336237316338636265
          6634363936646638376339613864643130616162333863650a373763663232373162653565613330
          39336233633165646232353662633432396537313364393263643534303964303330613631393037
          3564306334623633360a393338646163343661326339626137663635376632663035646638383761
          63346661366533623438613933653931366166356138663934333737613630323538346166623135
          32383430343464383039336231333237393166613135373065333764333761303162343632373835
          383430306138386434323861353366646364
        # Authelia Configuration overrides
        proxy_authelia_rules:
          - domain: "search.levonk.com"
            policy: "one_factor"
          - domain: "*.example.com"
            policy: "one_factor"
          - domain: "localhost"
            policy: "bypass"
        proxy_authelia_session_domain: "levonk.com"
        proxy_authelia_url: "https://auth.levonk.com"
        proxy_authelia_container_ip: "172.31.0.6"
        # Template rendering fixed but plugins still fail to download
        # Traefik v3.0 cannot download plugins from GitHub (networking issue)
        # Using standalone CrowdSec container instead

    isolation_vms:
      hosts:
        isolation-vm:
          ansible_host: "{{ isolation_vm_ip_address }}"
          ansible_user: "cuser"
          ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/lzkmbp2016-micro-oracle"
          ansible_port: 22
          ansible_python_interpreter: "/usr/bin/python3"
          ansible_become_method: "sudo"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          ansible_ssh_proxy_command: "ssh -i {{ lookup('env', 'HOME') }}/.ssh/lzkmbp2016-micro-oracle -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null opc@100.90.22.85"
      vars:
        # Isolation VM SSH Configuration
        vault_isolation_vm_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEWRbHy2sWZLKET/74zvt0rZa4ET2zjes/SB+Y/3BmKp lzkmbp2016-micro-oracle"
        cloud_server_stack_enabled: true
        vault_nordvpn_openvpn_user: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          61323038613438393739366135326439643636613166323731393234316466333135333439353163
          6434643138336561363466313263333737333362663062660a396130666264396635646463613537
          64623334346436643534663335363965346130663032303633303161346339636165633062616364
