          65356262356461643334646536636337666430313332396633366462323032666362353138363735
          3634363065663634303237356439393461303931633031620a386334393237396266323831386234
          38333135636563303237323438303764333866353338613530666432626163313934366335313862
          3033343633373965650a346364636536353137663035353438333936646133353335636561323232
          30656438353331353466663732343964646535333962303033613735346166323563
        vault_tailscale_auth_key: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          63643933653333616362666166616233393561363965646364346663653136326337636437356536
          3265323466643438613134363034333336643436316435320a346237306262623232386262343863
          32353230313464383639356561353032653762653235663765363339323938653136303965353932
          6332373632643763640a666332626630386364313534613035623038373736613930653230633764
          64633963626533346662636264356331633466616661316432373830633338383033646531663465
          63356135363461356537656232613735616162353161353639633132393666656366643133613137
          303966326263363663373564363835376638
        # Authelia Configuration
        proxy_authelia_admin_user: "admin"
        proxy_authelia_admin_password: "{{ vault_authelia_admin_password }}"
        proxy_authelia_admin_display_name: "Administrator"
        proxy_authelia_admin_email: "admin@levonk.com"
        proxy_authelia_jwt_secret: "{{ vault_authelia_jwt_secret }}"
        proxy_authelia_session_secret: "{{ vault_authelia_session_secret }}"
        proxy_authelia_storage_encryption_key: "{{ vault_authelia_storage_encryption_key }}"
        proxy_authelia_postgres_password: "{{ vault_authelia_postgres_password }}"
        proxy_authelia_redis_password: "{{ vault_authelia_redis_password }}"

    vpn_proxy_servers:
      children:
        cloud_servers:
      vars:
        # VPN Services Configuration
        vpn_nordvpn_enabled: true
        vpn_nordvpn_openvpn_user: "{{ vault_nordvpn_openvpn_user | default('') }}"
        vpn_nordvpn_openvpn_pass: "{{ vault_nordvpn_openvpn_pass | default('') }}"
        vpn_nordvpn_country: "United States"
        
        # Tailscale Exit Node Configuration
        vpn_tailscale_enabled: true
        vpn_tailscale_auth_key: "{{ vault_tailscale_auth_key | default('') }}"
        vpn_tailscale_hostname: "oci-vpn-server"
        vpn_tailscale_run_exit_node: true
        vpn_tailscale_accept_routes: true
        
        # NordVPN Port Configuration (all ports as variables - use group_vars)
        vpn_nordvpn_wireguard_host_port: "{{ cloud_server_nordvpn_wireguard_host_port }}"
        vpn_nordvpn_wireguard_container_port: "{{ cloud_server_nordvpn_wireguard_container_port }}"
        vpn_nordvpn_socks_host_port: "{{ cloud_server_nordvpn_socks_host_port }}"
        vpn_nordvpn_socks_container_port: "{{ cloud_server_nordvpn_socks_container_port }}"
        
        vpn_netbird_enabled: false
        vpn_netbird_setup_key: "{{ vault_netbird_setup_key | default('') }}"
        vpn_netbird_management_url: "https://api.netbird.io"
        vpn_netbird_hostname: "oci-vpn-server"
        
        # Proxy Services Configuration
        proxy_tor_enabled: true
        proxy_tor_socks5_container_port: "9051"
        proxy_tor_socks5_host_port: "9051"
        
        # Service Directories
        localnet_services_dir: "/opt/localnet/services"
        shared_container_services_dir: "/Users/micro/p/gh/levonk/infrahub/shared/active/03-container/services"
        localnet_tz: "UTC"
        
        # Network Configuration
        localnet_network_name: "localnet-network"
        localnet_network_subnet: "172.31.0.0/16"
        localnet_network_gateway: "172.31.0.1"
        wireguard_network_name: "wireguard-network"
        wireguard_network_subnet: "172.32.0.0/16"
        codeassist_network_name: "codeassist-network"
        codeassist_network_subnet: "172.33.0.0/16"
        agent_network_name: "agent-network"
        agent_network_subnet: "172.34.0.0/16"
        agent_network_gateway: "172.34.0.1"
        dmz_network_name: "dmz-network"
        dmz_network_subnet: "172.36.0.0/16"
        dmz_network_gateway: "172.36.0.1"
