---
# OCI Cloud Server Inventory
# Location: levonk/active/02-config/ansible/inventories/oci.yml
# Purpose: Defines the cloud_servers host group for the OCI cloud-server host.
# All host-specific connection data is variable-driven; no hardcoded IPs.
# ---------------------------------------------------------------------------

all:
  children:
    cloud_servers:
      hosts:
        oci-cloud-server:
          ansible_host: "100.90.22.85"
          ansible_user: "opc"
          ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/lzkmbp2016-micro-oracle"
          ansible_port: 22
          ansible_python_interpreter: "/usr/bin/python3"
          ansible_become_method: "sudo"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      vars:
        # CrowdSec Configuration
        security_crowdsec_enabled: true
        security_crowdsec_bouncer_api_key: "{{ vault_crowdsec_bouncer_api_key | default('change-me-in-vault') }}"
        security_crowdsec_traefik_container_name: "traefik"
        security_crowdsec_network_name: "traefik-network"
        # Traefik Configuration overrides
        proxy_traefik_geoblock_enabled: false
        proxy_traefik_crowdsec_enabled: false
        proxy_traefik_plugins_enabled: false
        proxy_traefik_acme_staging: false
        # Cloudflare credentials for ACME
        vault_cloudflare_api_token: "{{ vault_cloudflare_api_token }}"
        # Authelia Configuration overrides
        proxy_authelia_rules:
          - domain: "search.levonk.com"
            policy: "one_factor"
          - domain: "*.example.com"
            policy: "one_factor"
          - domain: "localhost"
            policy: "bypass"
        proxy_authelia_session_domain: "levonk.com"
        proxy_authelia_url: "https://auth.levonk.com"
        proxy_authelia_container_ip: "172.31.0.6"
        # Template rendering fixed but plugins still fail to download
        # Traefik v3.0 cannot download plugins from GitHub (networking issue)
        # Using standalone CrowdSec container instead

    isolation_vms:
      hosts:
        isolation-vm:
          ansible_host: "{{ isolation_vm_ip_address }}"
          ansible_user: "cuser"
          ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/lzkmbp2016-micro-oracle"
          ansible_port: 22
          ansible_python_interpreter: "/usr/bin/python3"
          ansible_become_method: "sudo"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          ansible_ssh_proxy_command: "ssh -i {{ lookup('env', 'HOME') }}/.ssh/lzkmbp2016-micro-oracle -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null opc@100.90.22.85"
      vars:
        # Isolation VM SSH Configuration
        vault_isolation_vm_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEWRbHy2sWZLKET/74zvt0rZa4ET2zjes/SB+Y/3BmKp lzkmbp2016-micro-oracle"
        cloud_server_stack_enabled: true
        vault_nordvpn_openvpn_user: "{{ vault_nordvpn_openvpn_user }}"
        vault_nordvpn_openvpn_pass: "{{ vault_nordvpn_openvpn_pass }}"
        vault_tailscale_auth_key: "{{ vault_tailscale_auth_key }}"
        # Authelia Configuration
        proxy_authelia_admin_user: "admin"
        proxy_authelia_admin_password: "{{ vault_authelia_admin_password }}"
        proxy_authelia_admin_display_name: "Administrator"
        proxy_authelia_admin_email: "admin@levonk.com"
        proxy_authelia_jwt_secret: "{{ vault_authelia_jwt_secret }}"
        proxy_authelia_session_secret: "{{ vault_authelia_session_secret }}"
        proxy_authelia_storage_encryption_key: "{{ vault_authelia_storage_encryption_key }}"
        proxy_authelia_postgres_password: "{{ vault_authelia_postgres_password }}"
        proxy_authelia_redis_password: "{{ vault_authelia_redis_password }}"

    vpn_proxy_servers:
      children:
        cloud_servers:
      vars:
        # VPN Services Configuration
        vpn_nordvpn_enabled: true
        vpn_nordvpn_openvpn_user: "{{ vault_nordvpn_openvpn_user | default('') }}"
        vpn_nordvpn_openvpn_pass: "{{ vault_nordvpn_openvpn_pass | default('') }}"
        vpn_nordvpn_country: "United States"
        
        # Tailscale Exit Node Configuration
        vpn_tailscale_enabled: true
        vpn_tailscale_auth_key: "{{ vault_tailscale_auth_key | default('') }}"
        vpn_tailscale_hostname: "oci-vpn-server"
        vpn_tailscale_run_exit_node: true
        vpn_tailscale_accept_routes: true
        
        # NordVPN Port Configuration (all ports as variables - use group_vars)
        vpn_nordvpn_wireguard_host_port: "{{ cloud_server_nordvpn_wireguard_host_port }}"
        vpn_nordvpn_wireguard_container_port: "{{ cloud_server_nordvpn_wireguard_container_port }}"
        vpn_nordvpn_socks_host_port: "{{ cloud_server_nordvpn_socks_host_port }}"
        vpn_nordvpn_socks_container_port: "{{ cloud_server_nordvpn_socks_container_port }}"
        
        vpn_netbird_enabled: false
        vpn_netbird_setup_key: "{{ vault_netbird_setup_key | default('') }}"
        vpn_netbird_management_url: "https://api.netbird.io"
        vpn_netbird_hostname: "oci-vpn-server"
        
        # Proxy Services Configuration
        proxy_tor_enabled: true
        proxy_tor_socks5_container_port: "9051"
        proxy_tor_socks5_host_port: "9051"
        
        # Service Directories
        localnet_services_dir: "/opt/localnet/services"
        shared_container_services_dir: "/Users/micro/p/gh/levonk/infrahub/shared/active/03-container/services"
        localnet_tz: "UTC"
        
        # Network Configuration
        localnet_network_name: "localnet-network"
        localnet_network_subnet: "172.31.0.0/16"
        localnet_network_gateway: "172.31.0.1"
        wireguard_network_name: "wireguard-network"
        wireguard_network_subnet: "172.32.0.0/16"
        codeassist_network_name: "codeassist-network"
        codeassist_network_subnet: "172.33.0.0/16"
        agent_network_name: "agent-network"
        agent_network_subnet: "172.34.0.0/16"
        agent_network_gateway: "172.34.0.1"
        dmz_network_name: "dmz-network"
        dmz_network_subnet: "172.36.0.0/16"
        dmz_network_gateway: "172.36.0.1"
