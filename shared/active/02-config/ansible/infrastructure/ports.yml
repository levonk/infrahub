---
# Port Allocation Schema
# Location: shared/active/02-config/ansible/infrastructure/ports.yml
# Purpose: Shared port allocation schema with sensible defaults
# Client-specific values in levonk/active/02-config/ansible/infrastructure/ports.yml
# ---------------------------------------------------------------------------
# Variable Naming: infra_port_{SERVICE}_{CONTEXT}_{HOST|CONTAINER}_{PORT}
# Services: ssh, vpn, dns, proxy, ai, storage, kvm, monitoring
# Context: nordvpn, tailscale, netbird, wireguard, etc.
# Target: host (external) or container (internal)
# ---------------------------------------------------------------------------
# NOTE: All ports are strings to support YAML number/string compatibility
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# SSH Ports
# ---------------------------------------------------------------------------
infra_port_ssh_host: "22"
infra_port_ssh_container: "22"

# ---------------------------------------------------------------------------
# VPN Ports
# ---------------------------------------------------------------------------
