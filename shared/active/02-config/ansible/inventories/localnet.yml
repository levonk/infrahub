---
all:
  children:
    localnet_hosts:
      hosts:
        localnet-primary:
          ansible_connection: local
          ansible_host: 127.0.0.1
          # Override for remote deployment:
          # ansible_host: 192.168.1.100
          # ansible_user: admin
          # ansible_ssh_private_key_file: ~/.ssh/localnet
      vars:
        localnet_base_dir: "{{ ansible_env.HOME }}/localnet"
        localnet_container_dir: "{{ localnet_base_dir }}/active/infra/container"
        localnet_services_dir: "{{ localnet_container_dir }}/services"
        localnet_config_dir: "{{ localnet_base_dir }}/active/infra/config"
        docker_network_gateway: "172.26.0.1"
        docker_network_subnet: "172.26.0.0/16"
