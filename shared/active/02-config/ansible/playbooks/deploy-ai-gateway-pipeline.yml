---
# AI Gateway Pipeline Deployment Playbook
# Deploys LiteLLM (aigate) + OmniRoute (airoute) as the AI gateway layer.
#
# New Pipeline Architecture:
#   Omnigent -> Pi -> LiteLLM (aigate) -> Headroom -> OmniRoute (airoute) -> Forge -> Iron-Proxy -> NordVPN -> Internet
#                     (auth, keys,     (compress)  (tier fallback,          (tool repair) (egress firewall) (privacy)
#                      PII, spend,                  9-factor scoring)
#                      Langfuse)
#
# LiteLLM is the entry point: handles auth, virtual keys, spend tracking,
# PII guardrail (Presidio), and Langfuse logging. Routes to Headroom for
# compression, then to OmniRoute for provider fanout.
#
# This playbook uses Ansible roles with community.docker modules — NEVER docker compose.
#
# Usage:
#   ansible-playbook -i levonk/active/02-config/ansible/inventories/oci.yml \
#     shared/active/02-config/ansible/playbooks/deploy-ai-gateway-pipeline.yml \
#     --vault-password-file ~/.ansible/vault_password
#   ansible-playbook -i levonk/active/02-config/ansible/inventories/oci.yml \
#     shared/active/02-config/ansible/playbooks/deploy-ai-gateway-pipeline.yml \
#     --check --diff --vault-password-file ~/.ansible/vault_password

- name: "Deploy AI Gateway Pipeline (LiteLLM + OmniRoute)"
  hosts: cloud_servers
  become: true
  gather_facts: true
  vars:
    cloud_server_admin_user: "{{ ansible_user }}"

  pre_tasks:
    - name: "Load shared infrastructure defaults (ports, networks, domains, storage)"
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../infrastructure/{{ item }}"
      loop:
        - ports.yml
        - networks.yml
        - domains.yml
        - storage.yml
      tags: ["always"]

    - name: "Load client infrastructure overrides (levonk)"
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../../../../levonk/active/02-config/ansible/infrastructure/{{ item }}"
      loop:
        - ports.yml
        - networks.yml
        - domains.yml
        - storage.yml
      tags: ["always"]

    - name: "Display deployment start information"
      ansible.builtin.debug:
        msg: |
          ========================================
          AI Gateway Pipeline Deployment Started
          ========================================
          Target: {{ inventory_hostname }}
          User: {{ ansible_user_id }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_facts['architecture'] }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          ========================================
          Pipeline: Omnigent -> Pi -> LiteLLM (aigate) -> Headroom -> OmniRoute (airoute) -> Forge -> Iron-Proxy -> NordVPN
          ========================================
      tags: ["always", "info"]

    - name: "Validate required variables are defined"
      ansible.builtin.assert:
        that:
          - localnet_services_dir is defined
          - shared_container_services_dir is defined
          - vault_litellm_master_key is defined
          - vault_litellm_database_password is defined
        fail_msg: >-
          Missing required variables. Check inventory vars and vault for
          localnet_services_dir, shared_container_services_dir, vault_litellm_*.
        success_msg: "All required AI gateway variables are defined."
      tags: ["always", "validate"]

  tasks:
    # ===========================================================================
    # Stage 1: LiteLLM (AI Gateway — entry point)
    # Provides: auth, virtual keys, spend tracking, PII guardrail, Langfuse logging
    # Domain: aigate.levonk.com
    # ===========================================================================
    - name: "Deploy LiteLLM via role"
      ansible.builtin.include_role:
        name: ai-litellm
      tags: ["deploy", "litellm"]

    # ===========================================================================
    # Stage 2: Headroom (Context Compression)
    # Compresses LLM context before routing to OmniRoute
    # Upstream from: LiteLLM
    # Downstream to: OmniRoute
    # ===========================================================================
    - name: "Deploy headroom via role"
      ansible.builtin.include_role:
        name: proxy-headroom
      tags: ["deploy", "headroom"]

    # ===========================================================================
    # Stage 3: OmniRoute (AI Gateway — provider fanout)
    # Tier-based fallback, 9-factor auto-combo scoring, free-tier draining
    # Domain: airoute.levonk.com
    # Upstream from: Headroom
    # Downstream to: Forge (then Iron-Proxy, NordVPN)
    # ===========================================================================
    - name: "Deploy omniroute via role"
      ansible.builtin.include_role:
        name: omniroute
      tags: ["deploy", "omniroute"]

    # ===========================================================================
    # Verification — read-only container status checks
    # ===========================================================================
    - name: "Verify litellm container is running"
      ansible.builtin.command:
        cmd: "docker inspect --format='{% raw %}{{.State.Status}}{% endraw %}' {{ ai_litellm_container_name }}"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: litellm_status
      changed_when: false
      ignore_errors: true
      tags: ["verify", "litellm"]

    - name: "Verify litellm-postgres container is running"
      ansible.builtin.command:
        cmd: "docker inspect --format='{% raw %}{{.State.Status}}{% endraw %}' {{ ai_litellm_postgres_container_name }}"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: litellm_postgres_status
      changed_when: false
      ignore_errors: true
      tags: ["verify", "litellm-postgres"]

    - name: "Verify headroom container is running"
      ansible.builtin.command:
        cmd: "docker inspect --format='{% raw %}{{.State.Status}}{% endraw %}' headroom"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: headroom_status
      changed_when: false
      ignore_errors: true
      tags: ["verify", "headroom"]

    - name: "Verify omniroute container is running"
      ansible.builtin.command:
        cmd: "docker inspect --format='{% raw %}{{.State.Status}}{% endraw %}' {{ ai_omniroute_container_name }}"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: omniroute_status
      changed_when: false
      ignore_errors: true
      tags: ["verify", "omniroute"]

    - name: "Display container status summary"
      ansible.builtin.debug:
        msg: |
          Container Status Summary:
            litellm:          {{ litellm_status.stdout | default('NOT FOUND') }}
            litellm-postgres: {{ litellm_postgres_status.stdout | default('NOT FOUND') }}
            headroom:         {{ headroom_status.stdout | default('NOT FOUND') }}
            omniroute:        {{ omniroute_status.stdout | default('NOT FOUND') }}
      tags: ["verify", "summary"]

  post_tasks:
    - name: "Display deployment summary"
      ansible.builtin.debug:
        msg: |
          ========================================
          AI Gateway Pipeline Deployment Complete
          ========================================
          Target: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          ----------------------------------------
          Deployed via Ansible roles (community.docker):
          - LiteLLM: AI gateway entry point (aigate.levonk.com, proxy-chain 172.29.0.18)
            - Auth, virtual keys, spend tracking, PII guardrail (Presidio), Langfuse logging
            - Postgres database for keys/spend/teams
          - Headroom: context compression (proxy-chain 172.29.0.13)
          - OmniRoute: provider fanout (airoute.levonk.com, proxy-chain 172.29.0.14)
            - Tier-based fallback, 9-factor auto-combo scoring, free-tier draining
          ----------------------------------------
          Pipeline Flow:
          Omnigent -> Pi -> LiteLLM (aigate) -> Headroom -> OmniRoute (airoute) -> Forge -> Iron-Proxy -> NordVPN
          ----------------------------------------
          Access Points:
          - LiteLLM Admin UI: https://aigate.levonk.com
          - LiteLLM API: https://aigate.levonk.com/v1 (or http://localhost:4000)
          - OmniRoute Dashboard: https://airoute.levonk.com
          - OmniRoute API: https://airoute.levonk.com/v1 (or http://localhost:20128)
          ========================================
      tags: ["always", "summary"]
