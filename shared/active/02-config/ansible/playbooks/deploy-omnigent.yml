---
# Omnigent + Pi Deployment Playbook
# Deploys the Omnigent server (AI agent framework & meta-harness) and Pi (coding
# agent harness, RPC mode) to cloud servers. Omnigent orchestrates; Pi executes
# coding loops. Pi's LLM requests route through the AI analytics pipeline.
#
# Stack: Omnigent (server + Postgres) + Pi (RPC mode, HTTP-to-stdin bridge)
# Pipeline: Omnigent → Pi → AI Dashboard Proxy 1 → ... → Internet
#
# Usage:
#   ansible-playbook -i levonk/active/02-config/ansible/inventories/oci.yml \
#     shared/active/02-config/ansible/playbooks/deploy-omnigent.yml \
#     --vault-password-file ~/.ansible/vault_password
#   ansible-playbook -i levonk/active/02-config/ansible/inventories/oci.yml \
#     shared/active/02-config/ansible/playbooks/deploy-omnigent.yml \
#     --check --diff --vault-password-file ~/.ansible/vault_password

- name: "Deploy Omnigent + Pi Agent Stack"
  hosts: cloud_servers
  become: true
  gather_facts: true
  vars:
    cloud_server_admin_user: "{{ ansible_user }}"

  pre_tasks:
    - name: "Display deployment start information"
      ansible.builtin.debug:
        msg: |
          ========================================
          Omnigent + Pi Deployment Started
          ========================================
          Target: {{ inventory_hostname }}
          User: {{ ansible_user_id }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_facts['architecture'] }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          ========================================
      tags: ["always", "info"]

    - name: "Validate required variables are defined"
      ansible.builtin.assert:
        that:
          - localnet_services_dir is defined
          - shared_container_services_dir is defined
          - omnigent_db_password is defined
          - pi_api_key is defined
        fail_msg: >-
          Missing required variables. Check
          levonk/active/02-config/ansible/inventories/group_vars/cloud_servers.yml,
          group_vars/all.yml, and the client vault
          (infrahub-levonk-all.vault.yml) for omnigent_db_password and pi_api_key.
        success_msg: "All required variables are defined."
      tags: ["always", "validate"]

    - name: "Create omnigent services directory"
      ansible.builtin.file:
        path: "{{ localnet_services_dir }}/omnigent"
        state: directory
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0755'
      tags: ["always", "setup"]

  tasks:
    # ── Copy Omnigent compose file ──────────────────────────
    - name: "Copy Omnigent docker-compose file"
      ansible.builtin.copy:
        src: "{{ shared_container_services_dir }}/ai-codeassist/omnigent/docker-compose.yml"
        dest: "{{ localnet_services_dir }}/omnigent/docker-compose.omnigent.yml"
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0644'
      tags: ["config", "docker-compose"]

    # ── Copy Pi service files (compose, Dockerfile, bridge, models.json) ──
    - name: "Copy Pi docker-compose file"
      ansible.builtin.copy:
        src: "{{ shared_container_services_dir }}/ai-codeassist/pi/docker-compose.yml"
        dest: "{{ localnet_services_dir }}/omnigent/docker-compose.pi.yml"
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0644'
      tags: ["config", "docker-compose"]

    - name: "Create Pi build directory"
      ansible.builtin.file:
        path: "{{ localnet_services_dir }}/omnigent/pi-build"
        state: directory
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0755'
      tags: ["config", "setup"]

    - name: "Copy Pi Dockerfile"
      ansible.builtin.copy:
        src: "{{ shared_container_services_dir }}/ai-codeassist/pi/Dockerfile"
        dest: "{{ localnet_services_dir }}/omnigent/pi-build/Dockerfile"
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0644'
      tags: ["config", "dockerfile"]

    - name: "Copy Pi RPC bridge script"
      ansible.builtin.copy:
        src: "{{ shared_container_services_dir }}/ai-codeassist/pi/rpc-bridge.py"
        dest: "{{ localnet_services_dir }}/omnigent/pi-build/rpc-bridge.py"
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0755'
      tags: ["config", "bridge"]

    - name: "Copy Pi models.json (custom pipeline provider config)"
      ansible.builtin.copy:
        src: "{{ shared_container_services_dir }}/ai-codeassist/pi/models.json"
        dest: "{{ localnet_services_dir }}/omnigent/pi-build/models.json"
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0644'
      tags: ["config", "models"]

    # ── Generate env file from Jinja2 template (vault secrets + infra vars) ──
    - name: "Generate Omnigent + Pi environment file from template"
      ansible.builtin.template:
        src: "{{ shared_container_services_dir }}/ai-codeassist/omnigent/.env.omnigent.j2"
        dest: "{{ localnet_services_dir }}/omnigent/.env.omnigent"
        owner: "{{ cloud_server_admin_user }}"
        group: "{{ cloud_server_admin_user }}"
        mode: '0600'
      tags: ["config", "environment"]
      no_log: true

    # ── Build Pi Docker image ───────────────────────────────
    - name: "Build Pi Docker image"
      ansible.builtin.shell:
        cmd: "docker build -t localnet-pi:latest -t localnet-pi:{{ pi_version | default('0.80.2') }} ."
        chdir: "{{ localnet_services_dir }}/omnigent/pi-build"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      tags: ["build", "pi"]

    # ── Network setup ───────────────────────────────────────
    - name: "Network setup - Create omnigent-network"
      ansible.builtin.shell:
        cmd: "docker network create omnigent-network --driver bridge --subnet 172.36.0.0/16 --gateway 172.36.0.1 || echo 'Network already exists'"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      ignore_errors: true
      tags: ["network", "setup"]

    - name: "Network setup - Ensure ai-dashboard-network exists"
      ansible.builtin.shell:
        cmd: "docker network inspect ai-dashboard-network >/dev/null 2>&1 || docker network create ai-dashboard-network --driver bridge --subnet 172.35.0.0/16"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      ignore_errors: true
      tags: ["network", "setup"]

    - name: "Network setup - Ensure proxy-chain-network exists"
      ansible.builtin.shell:
        cmd: "docker network inspect proxy-chain-network >/dev/null 2>&1 || docker network create proxy-chain-network --driver bridge --subnet 172.29.0.0/16 --gateway 172.29.0.1"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      ignore_errors: true
      tags: ["network", "setup"]

    - name: "Network setup - Ensure traefik-network exists"
      ansible.builtin.shell:
        cmd: "docker network inspect traefik-network >/dev/null 2>&1 || echo 'traefik-network not found - deploy traefik first'"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      ignore_errors: true
      tags: ["network", "setup"]

    # ── Deploy: stop existing, start new ────────────────────
    - name: "Stop existing Omnigent containers if present"
      ansible.builtin.shell:
        cmd: "docker compose -f docker-compose.omnigent.yml -f docker-compose.pi.yml --env-file .env.omnigent --profile omnigent down"
        chdir: "{{ localnet_services_dir }}/omnigent"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      ignore_errors: true
      tags: ["cleanup", "docker"]

    - name: "Deploy Omnigent + Pi containers"
      ansible.builtin.shell:
        cmd: "docker compose -f docker-compose.omnigent.yml -f docker-compose.pi.yml --env-file .env.omnigent --profile omnigent up -d"
        chdir: "{{ localnet_services_dir }}/omnigent"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      tags: ["deploy", "docker"]

    # ── Verification ────────────────────────────────────────
    - name: "Wait for Omnigent Postgres to be ready"
      ansible.builtin.shell:
        cmd: "docker exec omnigent-postgres pg_isready -U {{ omnigent_db_user | default('omnigent') }} -d {{ omnigent_db_name | default('omnigent') }}"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: omnigent_db_ready
      until: omnigent_db_ready.rc == 0
      retries: 10
      delay: 5
      tags: ["verify", "database"]

    - name: "Wait for Omnigent server to be running"
      ansible.builtin.shell:
        cmd: "docker inspect omnigent --format '{% raw %}{{.State.Running}}{% endraw %}'"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: omnigent_health
      until: omnigent_health.stdout == "true"
      retries: 10
      delay: 5
      tags: ["verify", "health"]

    - name: "Wait for Pi to be running"
      ansible.builtin.shell:
        cmd: "docker inspect pi --format '{% raw %}{{.State.Running}}{% endraw %}'"
      become: true
      become_user: "{{ cloud_server_admin_user }}"
      register: pi_health
      until: pi_health.stdout == "true"
      retries: 10
      delay: 5
      tags: ["verify", "health"]

    - name: "Verify Omnigent + Pi containers are running"
      ansible.builtin.shell:
        cmd: "docker inspect {{ item }} --format '{% raw %}{{.State.Status}}{% endraw %}'"
      register: omnigent_container_status
      loop:
        - omnigent
        - omnigent-postgres
        - pi
      changed_when: false
      tags: ["verify", "containers"]

    - name: "Display container status"
      ansible.builtin.debug:
        msg: "Container {{ item.item }} is {{ item.stdout }}"
      loop: "{{ omnigent_container_status.results }}"
      tags: ["verify", "containers"]

    - name: "Check Omnigent server logs for errors"
      ansible.builtin.shell:
        cmd: "docker logs omnigent --tail=50 2>&1 | grep -i error || echo 'No errors found'"
      register: omnigent_logs
      changed_when: false
      failed_when: "'error' in omnigent_logs.stdout.lower() and 'No errors found' not in omnigent_logs.stdout"
      tags: ["verify", "logs"]

    - name: "Check Pi logs for errors"
      ansible.builtin.shell:
        cmd: "docker logs pi --tail=50 2>&1 | grep -i error || echo 'No errors found'"
      register: pi_logs
      changed_when: false
      failed_when: "'error' in pi_logs.stdout.lower() and 'No errors found' not in pi_logs.stdout"
      tags: ["verify", "logs"]

  post_tasks:
    - name: "Display deployment summary"
      ansible.builtin.debug:
        msg: |
          ========================================
          Omnigent + Pi Deployment Complete
          ========================================
          Target: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          ----------------------------------------
          Deployed Services:
          - Omnigent Server: http://172.36.0.10:8000 (API + web UI)
          - Omnigent Postgres: postgresql://omnigent@172.36.0.20:5432/omnigent
          - Pi (RPC bridge): http://172.36.0.30:8090 (coding agent harness)
          ----------------------------------------
          Pipeline Flow:
          Omnigent → Pi → AI Dashboard Proxy 1 → Privacy Orchestrator → Headroom → OmniRoute → Forge → AI Dashboard Proxy 2 → Iron-Proxy → NordVPN → Internet
          ----------------------------------------
          Public Access:
          - Web UI: https://{{ infra_domain_ai_omnigent | default('omnigent.levonk.com') }}
          ----------------------------------------
          Next Steps:
          1. Verify containers: docker ps | grep -E "omnigent|pi"
          2. Create admin account: open web UI or check docker logs omnigent for auto-generated password
          3. Register a runner: omni login https://{{ infra_domain_ai_omnigent | default('omnigent.levonk.com') }} && omni host https://{{ infra_domain_ai_omnigent | default('omnigent.levonk.com') }}
          4. Verify Pi RPC bridge: curl http://localhost:8090/health
          ========================================
      tags: ["always", "summary"]

    - name: "Log deployment completion to system"
      ansible.builtin.shell:
        cmd: >-
          echo 'Omnigent + Pi deployment completed at
          {{ ansible_date_time.iso8601 }}' >> /var/log/omnigent-deploy.log
      changed_when: false
      failed_when: false
      tags: ["always", "logging"]
