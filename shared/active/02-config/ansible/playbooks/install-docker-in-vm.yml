---
# Playbook to install Docker inside the Isolation VM
# This playbook uses the isolation-vm-docker role to install Docker

- name: Install Docker in Isolation VM
  hosts: isolation_vms
  become: true
  gather_facts: true

  vars:
    # Docker configuration variables
    isolation_vm_docker_user: "cuser"
    isolation_vm_docker_group: "docker"
    isolation_vm_docker_install_method: "repo"
    isolation_vm_docker_verify_install: true
    
    # Docker daemon configuration
    isolation_vm_docker_log_driver: "json-file"
    isolation_vm_docker_log_opts:
      max-size: "10m"
      max-file: "3"
    isolation_vm_docker_live_restore: true
    isolation_vm_docker_storage_driver: "overlay2"

  roles:
    - role: isolation-vm-docker
