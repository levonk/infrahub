---
# Playbook to provision Isolation VM for AI agent isolation
# This playbook creates and configures the Debian minimal VM

- name: Provision Isolation VM
  hosts: cloud_servers
  become: true
  gather_facts: true

  vars:
    # Default variables from isolation-vm role
    isolation_vm_enabled: true
    isolation_vm_name: "isolation-vm"
    isolation_vm_memory_mb: 4096
    isolation_vm_vcpus: 2
    isolation_vm_disk_gb: 20
    isolation_vm_ip_address: "192.168.100.147"
    isolation_vm_gateway_ip: "192.168.100.1"
    isolation_vm_mac_address: "52:54:00:36:e0:0d"
    isolation_vm_nat_bridge: "kvm-nat-br0"
    isolation_vm_routed_bridge: "kvm-route-br0"
    isolation_vm_debian_version: "bookworm"
    isolation_vm_debian_arch: "arm64"
    isolation_vm_image_url: "https://cloud.debian.org/images/cloud/bookworm/daily/latest/debian-12-generic-arm64-daily.qcow2"
    isolation_vm_osinfo: "debian12"
    kvm_storage_pool_path: "/var/lib/libvirt/images"
    kvm_cpu_mode: "qemu"
    # User configuration
    isolation_vm_user: "cuser"
    isolation_vm_user_uid: 1000
    isolation_vm_user_gid: 1000
    isolation_vm_user_shell: "/bin/bash"
    isolation_vm_user_home: "/home/cuser"
    isolation_vm_sudo_groups: "sudo"
    isolation_vm_sudo_enabled: true
    isolation_vm_sudo_password_required: false
    # SSH configuration
    isolation_vm_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEWRbHy2sWZLKET/74zvt0rZa4ET2zjes/SB+Y/3BmKp lzkmbp2016-micro-oracle"
    isolation_vm_ssh_password_auth: false
    isolation_vm_ssh_permit_root_login: "no"
    isolation_vm_ssh_port: 22

  roles:
    - role: isolation-vm