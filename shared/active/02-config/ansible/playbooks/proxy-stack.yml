---
# LocalNet Proxy / Web Stack Playbook
# Deploys: Traefik, Envoy, Squid, Privoxy, Authelia, CrowdSec, Tor proxy
# Usage: ansible-playbook -i inventories/localnet.yml playbooks/proxy-stack.yml

- name: "Deploy LocalNet Proxy Stack"
  hosts: localnet_hosts
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: ["always", "common"]

    - role: proxy
      tags: ["proxy"]
