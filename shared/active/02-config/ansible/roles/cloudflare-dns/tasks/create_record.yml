---
# Create or update DNS record in Cloudflare (idempotent)
# Uses Cloudflare API v4. Handles create-if-missing and update-if-changed
# in a single pass. Also handles type migration (e.g. A → CNAME) by
# deleting the old record of a different type before creating the new one.

- name: "Check if DNS record {{ cloudflare_dns_record_name }} already exists (any type)"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ cloudflare_dns_record_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    return_content: true
    status_code: [200, 401, 403, 404]
  register: existing_records_all
  no_log: true

- name: "Fail with clear message if Cloudflare API authentication failed"
  ansible.builtin.fail:
    msg: >-
      Cloudflare API returned {{ existing_records_all.status }} for
      {{ cloudflare_dns_record_name }}. Check vault_cloudflare_api_token
      and vault_cloudflare_zone_id in the client vault.
      Response: {{ existing_records_all.content | default('no content') }}
  when: existing_records_all.status not in [200]

- name: "Set facts for existing record check"
  ansible.builtin.set_fact:
    all_existing_records: "{{ existing_records_all.json.result }}"
    # Find a record matching the desired type
    matching_records: "{{ existing_records_all.json.result | selectattr('type', 'equalto', cloudflare_dns_record_type) | list }}"
    # Find records of a DIFFERENT type with the same name (type conflict)
    conflicting_records: "{{ existing_records_all.json.result | rejectattr('type', 'equalto', cloudflare_dns_record_type) | list }}"

- name: "Set facts for matching record"
  ansible.builtin.set_fact:
    record_exists: "{{ matching_records | length > 0 }}"
    existing_record_id: "{{ matching_records | map(attribute='id') | first | default('') }}"
    existing_record_content: "{{ matching_records | map(attribute='content') | first | default('') }}"

- name: "Delete conflicting records of different type (A → CNAME migration)"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ item.id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    return_content: true
    status_code: [200]
  register: conflict_delete_result
  loop: "{{ conflicting_records }}"
  no_log: true
  when: conflicting_records | length > 0

- name: "Log conflicting record deletion"
  ansible.builtin.debug:
    msg: "Deleted conflicting {{ item.type }} record for {{ cloudflare_dns_record_name }} (migrating to {{ cloudflare_dns_record_type }})"
  loop: "{{ conflicting_records }}"
  when: conflicting_records | length > 0

- name: "Reset record_exists after type migration"
  ansible.builtin.set_fact:
    record_exists: false
    existing_record_content: ""
  when: conflicting_records | length > 0

- name: "Create DNS record {{ cloudflare_dns_record_name }} if it doesn't exist"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: "{{ cloudflare_dns_record_type }}"
      name: "{{ cloudflare_dns_record_name }}"
      content: "{{ cloudflare_dns_record_content }}"
      ttl: "{{ cloudflare_dns_ttl | default(300) }}"
      proxied: "{{ cloudflare_dns_proxied | default(false) }}"
    body_format: json
    return_content: true
    status_code: [200, 201]
  register: create_result
  when: not record_exists
  no_log: true

- name: "Update DNS record {{ cloudflare_dns_record_name }} if content differs"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ existing_record_id }}"
    method: PATCH
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body:
      type: "{{ cloudflare_dns_record_type }}"
      name: "{{ cloudflare_dns_record_name }}"
      content: "{{ cloudflare_dns_record_content }}"
      ttl: "{{ cloudflare_dns_ttl | default(300) }}"
      proxied: "{{ cloudflare_dns_proxied | default(false) }}"
    body_format: json
    return_content: true
    status_code: [200]
  register: update_result
  when: record_exists and existing_record_content != cloudflare_dns_record_content
  no_log: true

- name: "Log DNS record creation"
  ansible.builtin.debug:
    msg: "DNS record {{ cloudflare_dns_record_name }} ({{ cloudflare_dns_record_type }}) created → {{ cloudflare_dns_record_content }}"
  when: not record_exists and create_result is succeeded

- name: "Log DNS record update"
  ansible.builtin.debug:
    msg: "DNS record {{ cloudflare_dns_record_name }} ({{ cloudflare_dns_record_type }}) updated → {{ cloudflare_dns_record_content }} (was {{ existing_record_content }})"
  when: record_exists and existing_record_content != cloudflare_dns_record_content and update_result is succeeded

- name: "Skip record (already correct)"
  ansible.builtin.debug:
    msg: "DNS record {{ cloudflare_dns_record_name }} ({{ cloudflare_dns_record_type }}) already correct → {{ cloudflare_dns_record_content }} (idempotent)"
  when: record_exists and existing_record_content == cloudflare_dns_record_content
