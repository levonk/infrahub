---
# KVM/libvirt/QEMU Configuration Variables

# Target user to add to libvirt/kvm groups
kvm_target_user: "{{ ansible_user | default('ubuntu') }}"

# CPU mode configuration (will be set based on nested virtualization support)
# Options: host-model, host-passthrough, custom, qemu (for non-KVM)
kvm_cpu_mode: "qemu"

# Default disk format for VM images
kvm_disk_format: "qcow2"

# Default disk size for VM images (in GB)
kvm_disk_size_gb: 20

# Default memory size for VMs (in MB)
kvm_memory_mb: 2048

# Default CPU count for VMs
kvm_cpu_count: 2

# Default network type
kvm_network_type: "bridge"

# Default storage pool path
kvm_storage_pool_path: "/var/lib/libvirt/images"

# Enable libvirt logging
kvm_enable_logging: true

# Libvirt log level
kvm_log_level: 1

# NAT Bridge Network Configuration
common_kvm_nat_bridge_name: "kvm-nat-br0"
common_kvm_nat_bridge_subnet: "192.168.100.0/24"
common_kvm_nat_bridge_gateway: "192.168.100.1"
common_kvm_nat_bridge_dhcp_start: "192.168.100.128"
common_kvm_nat_bridge_dhcp_end: "192.168.100.254"

# Routed Bridge Network Configuration
common_kvm_routed_bridge_name: "kvm-route-br0"
common_kvm_routed_bridge_subnet: "192.168.101.0/24"
common_kvm_routed_bridge_gateway: "192.168.101.1"
common_kvm_routed_bridge_dhcp_start: "192.168.101.128"
common_kvm_routed_bridge_dhcp_end: "192.168.101.254"
common_kvm_routed_bridge_interface: "{{ ansible_facts['default_ipv4']['interface'] | default('eth0') }}"
