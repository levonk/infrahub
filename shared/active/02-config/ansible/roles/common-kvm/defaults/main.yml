---
# defaults file for common-kvm
# Neutral, overridable defaults. No localnet-specific paths.

# ---------------------------------------------------------------------------
# Virtualization Support
# ---------------------------------------------------------------------------
common_kvm_skip_virtualization_check: false

# ---------------------------------------------------------------------------
# KVM/QEMU Packages
# ---------------------------------------------------------------------------
common_kvm_packages:
  - qemu-kvm
  - libvirt-daemon
  - virt-install
  - virt-manager
  - bridge-utils
  - qemu-img
  - libguestfs-tools

# ---------------------------------------------------------------------------
# Libvirtd Service
# ---------------------------------------------------------------------------
common_kvm_libvirtd_service_name: "libvirtd"
common_kvm_libvirtd_socket_name: "libvirtd.socket"

# ---------------------------------------------------------------------------
# Bridge Networks (subnets must be overridden in client group_vars)
# ---------------------------------------------------------------------------
common_kvm_nat_bridge_name: "kvm-nat-br0"
common_kvm_nat_bridge_subnet: "{{ kvm_nat_bridge_subnet | default('192.168.100.0/24') }}"
common_kvm_nat_bridge_gateway: "{{ kvm_nat_bridge_gateway | default('192.168.100.1') }}"
common_kvm_nat_bridge_dhcp_start: "{{ kvm_nat_bridge_dhcp_start | default('192.168.100.100') }}"
common_kvm_nat_bridge_dhcp_end: "{{ kvm_nat_bridge_dhcp_end | default('192.168.100.200') }}"

common_kvm_routed_bridge_name: "kvm-route-br0"
common_kvm_routed_bridge_subnet: "{{ kvm_routed_bridge_subnet | default('192.168.101.0/24') }}"
common_kvm_routed_bridge_gateway: "{{ kvm_routed_bridge_gateway | default('192.168.101.1') }}"

# ---------------------------------------------------------------------------
# VM Storage Pool
# ---------------------------------------------------------------------------
common_kvm_storage_pool_name: "default"
common_kvm_storage_pool_path: "{{ kvm_storage_pool_path | default('/var/lib/libvirt/images') }}"
common_kvm_storage_pool_type: "dir"
common_kvm_storage_pool_mode: "0755"

# ---------------------------------------------------------------------------
# VM Defaults
# ---------------------------------------------------------------------------
common_kvm_vm_default_memory_mb: 2048
common_kvm_vm_default_vcpus: 2
common_kvm_vm_default_disk_gb: 20

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
common_kvm_verify_install: true
common_kvm_verify_timeout_seconds: 30
