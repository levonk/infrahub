---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: Install KVM/libvirt/QEMU packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - qemu-kvm
      - libvirt-daemon-system
      - libvirt-clients
      - virtinst
      - bridge-utils
      - cpu-checker
      - virt-manager
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: Install KVM/libvirt/QEMU packages (Red Hat family)
  ansible.builtin.dnf:
    name:
      - qemu-kvm
      - libvirt-daemon
      - libvirt-client
      - virt-install
      - bridge-utils
      - virt-manager
    state: present
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: Ensure libvirt group exists
  ansible.builtin.group:
    name: libvirt
    state: present
  become: true

- name: Ensure kvm group exists
  ansible.builtin.group:
    name: kvm
    state: present
  become: true

- name: Add target user to libvirt group
  ansible.builtin.user:
    name: "{{ kvm_target_user }}"
    groups: libvirt
    append: true
  become: true

- name: Add target user to kvm group
  ansible.builtin.user:
    name: "{{ kvm_target_user }}"
    groups: kvm
    append: true
  become: true

- name: Enable and start libvirtd service (Debian/Ubuntu)
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: true
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: Enable and start libvirtd service (Red Hat family)
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: true
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: Configure libvirt network defaults
  ansible.builtin.blockinfile:
    path: /etc/libvirt/libvirtd.conf
    block: |
      unix_sock_group = "libvirt"
      unix_sock_rw_perms = "0770"
      auth_unix_ro = "none"
      auth_unix_rw = "none"
    create: true
    backup: true
  become: true
  notify: restart libvirtd

- name: Configure libvirt QEMU defaults
  ansible.builtin.blockinfile:
    path: /etc/libvirt/qemu.conf
    block: |
      user = "root"
      group = "root"
      dynamic_ownership = 0
      cgroup_device_acl = [
          "/dev/null", "/dev/full", "/dev/zero",
          "/dev/random", "/dev/urandom",
          "/dev/ptmx", "/dev/kvm", "/dev/kqemu",
          "/dev/rtc", "/dev/hpet", "/dev/vfio/vfio"
      ]
    create: true
    backup: true
  become: true
  notify: restart libvirtd

- name: Wait for libvirtd to be ready
  ansible.builtin.wait_for:
    path: /var/run/libvirt/libvirt-sock
    timeout: 30
  become: true

- name: Test virsh connectivity
  ansible.builtin.command: virsh version
  register: virsh_version_output
  become: true
  changed_when: false
  failed_when: virsh_version_output.rc != 0

- name: Display virsh version
  ansible.builtin.debug:
    var: virsh_version_output.stdout_lines
