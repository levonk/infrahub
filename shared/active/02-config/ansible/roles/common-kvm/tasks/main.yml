---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: Install KVM/libvirt/QEMU packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - qemu-kvm
      - libvirt-daemon-system
      - libvirt-clients
      - virtinst
      - bridge-utils
      - cpu-checker
      - virt-manager
    state: present
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: Install KVM/libvirt/QEMU packages (Red Hat family)
  ansible.builtin.dnf:
    name:
      - qemu-kvm
      - libvirt-daemon
      - libvirt-client
      - virt-install
      - bridge-utils
      - virt-manager
    state: present
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: Ensure libvirt group exists
  ansible.builtin.group:
    name: libvirt
    state: present
  become: true

- name: Ensure kvm group exists
  ansible.builtin.group:
    name: kvm
    state: present
  become: true

- name: Add target user to libvirt group
  ansible.builtin.user:
    name: "{{ kvm_target_user }}"
    groups: libvirt
    append: true
  become: true

- name: Add target user to kvm group
  ansible.builtin.user:
    name: "{{ kvm_target_user }}"
    groups: kvm
    append: true
  become: true

- name: Enable and start libvirtd service (Debian/Ubuntu)
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: true
  when: ansible_facts['os_family'] == "Debian"
  become: true

- name: Enable and start libvirtd service (Red Hat family)
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: true
  when: ansible_facts['os_family'] == "RedHat"
  become: true

- name: Configure libvirt network defaults
  ansible.builtin.blockinfile:
    path: /etc/libvirt/libvirtd.conf
    block: |
      unix_sock_group = "libvirt"
      unix_sock_rw_perms = "0770"
      auth_unix_ro = "none"
      auth_unix_rw = "none"
    create: true
    backup: true
  become: true
  notify: restart libvirtd

- name: Configure libvirt QEMU defaults
  ansible.builtin.blockinfile:
    path: /etc/libvirt/qemu.conf
    block: |
      user = "root"
      group = "root"
      dynamic_ownership = 0
      cgroup_device_acl = [
          "/dev/null", "/dev/full", "/dev/zero",
          "/dev/random", "/dev/urandom",
          "/dev/ptmx", "/dev/kvm", "/dev/kqemu",
          "/dev/rtc", "/dev/hpet", "/dev/vfio/vfio"
      ]
    create: true
    backup: true
  become: true
  notify: restart libvirtd

- name: Wait for libvirtd to be ready
  ansible.builtin.wait_for:
    path: /var/run/libvirt/libvirt-sock
    timeout: 30
  become: true

- name: Test virsh connectivity
  ansible.builtin.command: virsh version
  register: virsh_version_output
  become: true
  changed_when: false
  failed_when: virsh_version_output.rc != 0

- name: Display virsh version
  ansible.builtin.debug:
    var: virsh_version_output.stdout_lines

- name: Deploy NAT bridge network definition
  ansible.builtin.template:
    src: network-nat.xml.j2
    dest: "/tmp/{{ common_kvm_nat_bridge_name }}.xml"
    mode: '0644'
  become: true

- name: Define NAT bridge network in libvirt
  ansible.builtin.command: "virsh net-define /tmp/{{ common_kvm_nat_bridge_name }}.xml"
  become: true
  register: nat_net_define
  failed_when: nat_net_define.rc != 0 and "already exists" not in nat_net_define.stderr
  changed_when: nat_net_define.rc == 0

- name: Start NAT bridge network
  ansible.builtin.command: "virsh net-start {{ common_kvm_nat_bridge_name }}"
  become: true
  register: nat_net_start
  failed_when: nat_net_start.rc != 0 and "already active" not in nat_net_start.stderr
  changed_when: nat_net_start.rc == 0

- name: Enable NAT bridge network autostart
  ansible.builtin.command: "virsh net-autostart {{ common_kvm_nat_bridge_name }}"
  become: true
  register: nat_net_autostart
  failed_when: nat_net_autostart.rc != 0 and "already marked" not in nat_net_autostart.stderr
  changed_when: nat_net_autostart.rc == 0

- name: Clean up temporary network definition file
  ansible.builtin.file:
    path: "/tmp/{{ common_kvm_nat_bridge_name }}.xml"
    state: absent
  become: true

- name: Verify NAT bridge network is active
  ansible.builtin.command: "virsh net-list --all"
  become: true
  register: net_list
  changed_when: false

- name: Display network list
  ansible.builtin.debug:
    var: net_list.stdout_lines

- name: Deploy routed bridge network definition
  ansible.builtin.template:
    src: network-routed.xml.j2
    dest: "/tmp/{{ common_kvm_routed_bridge_name }}.xml"
    mode: '0644'
  become: true

- name: Define routed bridge network in libvirt
  ansible.builtin.command: "virsh net-define /tmp/{{ common_kvm_routed_bridge_name }}.xml"
  become: true
  register: routed_net_define
  failed_when: routed_net_define.rc != 0 and "already exists" not in routed_net_define.stderr
  changed_when: routed_net_define.rc == 0

- name: Start routed bridge network
  ansible.builtin.command: "virsh net-start {{ common_kvm_routed_bridge_name }}"
  become: true
  register: routed_net_start
  failed_when: routed_net_start.rc != 0 and "already active" not in routed_net_start.stderr
  changed_when: routed_net_start.rc == 0

- name: Enable routed bridge network autostart
  ansible.builtin.command: "virsh net-autostart {{ common_kvm_routed_bridge_name }}"
  become: true
  register: routed_net_autostart
  failed_when: routed_net_autostart.rc != 0 and "already marked" not in routed_net_autostart.stderr
  changed_when: routed_net_autostart.rc == 0

- name: Clean up temporary network definition file
  ansible.builtin.file:
    path: "/tmp/{{ common_kvm_routed_bridge_name }}.xml"
    state: absent
  become: true

- name: Verify routed bridge network is active
  ansible.builtin.command: "virsh net-list --all"
  become: true
  register: routed_net_list
  changed_when: false

- name: Display routed network list
  ansible.builtin.debug:
    var: routed_net_list.stdout_lines

- name: Configure firewall rules for routed bridge (firewalld)
  ansible.posix.firewalld:
    zone: trusted
    interface: "{{ common_kvm_routed_bridge_name }}"
    permanent: true
    state: enabled
  when: ansible_facts['services']['firewalld'] is defined
  become: true
  ignore_errors: true

- name: Configure firewall rules for routed bridge (iptables - allow forwarding)
  ansible.builtin.iptables:
    table: filter
    chain: FORWARD
    in_interface: "{{ common_kvm_routed_bridge_name }}"
    jump: ACCEPT
    action: insert
  become: true
  when: ansible_facts['services']['firewalld'] is not defined
  ignore_errors: true

- name: Configure firewall rules for routed bridge (iptables - NAT masquerade)
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    out_interface: "{{ common_kvm_routed_bridge_interface }}"
    source: "{{ common_kvm_routed_bridge_subnet }}"
    jump: MASQUERADE
  become: true
  when: ansible_facts['services']['firewalld'] is not defined
  ignore_errors: true
