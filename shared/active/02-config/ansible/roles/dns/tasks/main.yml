---
# LocalNet DNS Stack Deployment - Direct Container Management
# Services: dnsdist, coredns, dnscrypt-plaintext, blocklist-compiler, tor-proxy, adguard

- name: Ensure DNS service directory exists on target
  ansible.builtin.file:
    path: "{{ localnet_services_dir }}/dns"
    state: directory
    mode: "0755"

# ============================================================================
# Volume Management
# ============================================================================
- name: Ensure DNS volumes exist
  community.docker.docker_volume:
    name: "{{ item }}"
    state: present
  loop:
    - localnet-dns-blocklist-archive-volume
    - localnet-dns-blocklist-cdbs-volume
    - localnet-dns-coredns-cache-volume
    - localnet-dns-adguard-conf-volume
    - localnet-dns-adguard-work-volume

# ============================================================================
# Service Deployment
# ============================================================================
- ansible.builtin.include_tasks: blocklist-compiler.yml
- ansible.builtin.include_tasks: tor-proxy.yml
- ansible.builtin.include_tasks: dnscrypt-plaintext.yml
- ansible.builtin.include_tasks: coredns.yml
- ansible.builtin.include_tasks: dnsdist.yml
- ansible.builtin.include_tasks: adguard.yml

# ============================================================================
# Status Report
# ============================================================================
- name: Report DNS stack status
  ansible.builtin.debug:
    msg: |
      DNS Stack deployed successfully:
        - DNSDist: localhost:{{ dns_transparent_host_port }} (transparent)
        - DNSDist: localhost:{{ dns_dnsdist_main_host_port }} (direct)
        - CoreDNS: localhost:{{ dns_coredns_main_host_port }} (direct)
        - dnscrypt-plaintext: localhost:{{ dns_dnscrypt_plaintext_host_port }}
        - AdGuard: http://localhost:{{ dns_adguard_web_host_port }} (web UI)
        - Tor SOCKS5: socks5://localhost:{{ proxy_tor_socks5_host_port }}
