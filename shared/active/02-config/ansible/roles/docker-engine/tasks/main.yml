---
# tasks file for docker-engine

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Ensure required packages are present
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
  become: true
  when: ansible_os_family == "Debian"

# ---------------------------------------------------------------------------
# Add Docker apt repository (Debian/Ubuntu)
# ---------------------------------------------------------------------------
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when:
    - ansible_os_family == "Debian"
    - docker_engine_install_method == "repo"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true
  when:
    - ansible_os_family == "Debian"
    - docker_engine_install_method == "repo"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable"
    filename: docker
    state: present
  become: true
  when:
    - ansible_os_family == "Debian"
    - docker_engine_install_method == "repo"

- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true
  become: true
  when:
    - ansible_os_family == "Debian"
    - docker_engine_install_method == "repo"

# ---------------------------------------------------------------------------
# Install Docker Engine and Compose plugin
# ---------------------------------------------------------------------------
- name: Install Docker packages
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  become: true

# ---------------------------------------------------------------------------
# Configure userns-remap
# ---------------------------------------------------------------------------
- name: Ensure dockremap group exists for userns-remap
  ansible.builtin.group:
    name: dockremap
    gid: 100000
    state: present
  become: true
  when: docker_engine_userns_remap | length > 0

- name: Ensure dockremap user exists for userns-remap
  ansible.builtin.user:
    name: dockremap
    uid: 100000
    group: dockremap
    home: /var/lib/dockremap
    create_home: true
    shell: /usr/sbin/nologin
    system: true
    state: present
  become: true
  when: docker_engine_userns_remap | length > 0

- name: Ensure userns-remap subordinate UID range exists
  ansible.builtin.lineinfile:
    path: /etc/subuid
    line: "dockremap:100000:65536"
    create: true
    mode: "0644"
  become: true
  when: docker_engine_userns_remap | length > 0

- name: Ensure userns-remap subordinate GID range exists
  ansible.builtin.lineinfile:
    path: /etc/subgid
    line: "dockremap:100000:65536"
    create: true
    mode: "0644"
  become: true
  when: docker_engine_userns_remap | length > 0

# ---------------------------------------------------------------------------
# Deploy hardened daemon.json
# ---------------------------------------------------------------------------
- name: Ensure Docker configuration directory exists
  ansible.builtin.file:
    path: "{{ docker_engine_daemon_config_path | dirname }}"
    state: directory
    owner: "{{ docker_engine_daemon_config_owner }}"
    group: "{{ docker_engine_daemon_config_group }}"
    mode: "0755"
  become: true

- name: Deploy daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: "{{ docker_engine_daemon_config_path }}"
    owner: "{{ docker_engine_daemon_config_owner }}"
    group: "{{ docker_engine_daemon_config_group }}"
    mode: "{{ docker_engine_daemon_config_mode }}"
  become: true
  notify:
    - restart docker

# ---------------------------------------------------------------------------
# Add admin user to docker group
# ---------------------------------------------------------------------------
- name: Ensure docker group exists
  ansible.builtin.group:
    name: "{{ docker_engine_group }}"
    gid: "{{ docker_engine_gid | int if docker_engine_gid | length > 0 else omit }}"
    state: present
  become: true

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ docker_engine_admin_user }}"
    groups: "{{ docker_engine_group }}"
    append: true
  become: true

# ---------------------------------------------------------------------------
# Enable and start Docker service
# ---------------------------------------------------------------------------
- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: "{{ docker_engine_service_name }}"
    state: started
    enabled: true
  become: true

# ---------------------------------------------------------------------------
# Verify Docker CLI works
# ---------------------------------------------------------------------------
- name: Verify docker --version returns expected output
  ansible.builtin.command:
    cmd: docker --version
  register: docker_engine_version_check
  changed_when: false
  become: true

- name: Log Docker version
  ansible.builtin.debug:
    msg: "Docker installed: {{ docker_engine_version_check.stdout }}"

- name: Verify docker compose plugin is available
  ansible.builtin.command:
    cmd: docker compose version
  register: docker_engine_compose_check
  changed_when: false
  become: true

- name: Log Docker Compose version
  ansible.builtin.debug:
    msg: "Docker Compose installed: {{ docker_engine_compose_check.stdout }}"
