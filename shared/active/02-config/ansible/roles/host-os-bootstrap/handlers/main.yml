---
# handlers file for host-os-bootstrap

- name: Restart ssh service (Debian/Ubuntu)
  ansible.builtin.systemd:
    name: ssh
    state: restarted
    enabled: true
  listen: restart ssh
  when: ansible_facts['os_family'] == "Debian"
  ignore_errors: true

- name: Restart sshd service (Red Hat family)
  ansible.builtin.systemd:
    name: sshd
    state: restarted
    enabled: true
  listen: restart sshd
  when: ansible_facts['os_family'] == "RedHat"
  ignore_errors: true
