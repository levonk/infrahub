---
# CLI tools installation tasks for Isolation VM
# Purpose: Install basic CLI tools and configure shell environment

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - tools

- name: Install basic CLI tools
  ansible.builtin.apt:
    name: "{{ isolation_vm_cli_tools }}"
    state: present
  tags:
    - tools

- name: Configure zsh as default shell for cuser
  ansible.builtin.user:
    name: "{{ isolation_vm_user }}"
    shell: "{{ isolation_vm_user_shell }}"
  tags:
    - tools

- name: Create .zshrc for cuser
  ansible.builtin.copy:
    content: |
      # Basic zsh configuration for Isolation VM
      # Auto-generated by Ansible - DO NOT EDIT MANUALLY
      
      # History settings
      HISTSIZE=1000
      SAVEHIST=1000
      HISTFILE=~/.zsh_history
      
      # Basic aliases
      alias ll='ls -la'
      alias la='ls -A'
      alias l='ls -CF'
      
      # Path
      export PATH=$HOME/bin:/usr/local/bin:$PATH
      
      # Prompt
      PROMPT='%n@%m:%~%# '
    dest: "{{ isolation_vm_user_home }}/.zshrc"
    mode: '0644'
    owner: "{{ isolation_vm_user }}"
    group: "{{ isolation_vm_user_gid }}"
  tags:
    - tools

- name: Set up basic tmux configuration
  ansible.builtin.copy:
    content: |
      # Basic tmux configuration for Isolation VM
      # Auto-generated by Ansible - DO NOT EDIT MANUALLY
      
      # Set prefix to Ctrl-a
      set -g prefix C-a
      unbind C-b
      bind C-a send-prefix
      
      # Enable mouse support
      set -g mouse on
      
      # Set base index to 1
      set -g base-index 1
      setw -g pane-base-index 1
      
      # Split panes using | and -
      bind | split-window -h
      bind - split-window -v
      
      # Reload config file
      bind r source-file ~/.tmux.conf \; display "Config reloaded!"
    dest: "{{ isolation_vm_user_home }}/.tmux.conf"
    mode: '0644'
    owner: "{{ isolation_vm_user }}"
    group: "{{ isolation_vm_user_gid }}"
  tags:
    - tools

- name: Test zsh functionality
  ansible.builtin.command:
    cmd: "su - {{ isolation_vm_user }} -c 'zsh --version'"
  register: zsh_test
  failed_when: false
  changed_when: false
  tags:
    - tools

- name: Test tmux functionality
  ansible.builtin.command:
    cmd: "su - {{ isolation_vm_user }} -c 'tmux -V'"
  register: tmux_test
  failed_when: false
  changed_when: false
  tags:
    - tools

- name: Display CLI tools verification
  ansible.builtin.debug:
    msg:
      - "zsh: {{ 'INSTALLED' if zsh_test.rc == 0 else 'FAILED' }}"
      - "tmux: {{ 'INSTALLED' if tmux_test.rc == 0 else 'FAILED' }}"
  tags:
    - tools
