---
# Hermes agent container deployment tasks
# Deploys hermes-agent with Docker socket access for container management

- name: Create hermes-agent volume directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ isolation_vm_user }}"
    group: "{{ isolation_vm_user }}"
  loop:
    - "{{ isolation_vm_hermes_agent_volume_path }}/data"
    - "{{ isolation_vm_hermes_agent_volume_path }}/config"
    - "{{ isolation_vm_hermes_agent_volume_path }}/ssh"
  become: true

- name: Configure SSH authorized keys for hermes-agent
  ansible.builtin.copy:
    content: "{{ isolation_vm_hermes_agent_ssh_public_key }}"
    dest: "{{ isolation_vm_hermes_agent_volume_path }}/ssh/authorized_keys"
    mode: '0600'
    owner: "{{ isolation_vm_user }}"
    group: "{{ isolation_vm_user }}"
  become: true
  when: isolation_vm_hermes_agent_ssh_public_key is defined

- name: Pull hermes-agent container image
  community.docker.docker_image:
    name: "{{ isolation_vm_hermes_agent_image_name }}"
    source: pull
    state: present
  become: true
  register: hermes_agent_build

- name: Create hermes-agent container
  community.docker.docker_container:
    name: "{{ isolation_vm_hermes_agent_container_name }}"
    image: "{{ isolation_vm_hermes_agent_image_name }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ isolation_vm_nix_sidecar_network_name }}"
    ports:
      - "{{ isolation_vm_hermes_agent_ssh_host_port }}:{{ isolation_vm_hermes_agent_ssh_container_port }}/tcp"
    volumes:
      - "{{ isolation_vm_hermes_agent_volume_path }}/data:{{ isolation_vm_hermes_agent_data_dir }}"
      - "{{ isolation_vm_hermes_agent_volume_path }}/config:{{ isolation_vm_hermes_agent_config_dir }}"
      - "{{ isolation_vm_hermes_agent_volume_path }}/ssh:/home/{{ isolation_vm_user }}/.ssh"
      - "{{ isolation_vm_nix_sidecar_volume_path }}/nix-store:/nix:ro"
      - "{{ isolation_vm_nix_sidecar_volume_path }}/nix-config:/etc/nix:ro"
      - "{{ isolation_vm_nix_sidecar_volume_path }}/nix-cache:/root/.cache/nix"
      - /var/run/docker.sock:/var/run/docker.sock
    env:
      PUID: "{{ isolation_vm_user_uid }}"
      PGID: "{{ isolation_vm_user_gid }}"
      TZ: "{{ isolation_vm_timezone }}"
      USERNAME: "{{ isolation_vm_user }}"
      HERMES_DATA_DIR: "{{ isolation_vm_hermes_agent_data_dir }}"
      HERMES_CONFIG_DIR: "{{ isolation_vm_hermes_agent_config_dir }}"
      SSH_PORT: "{{ isolation_vm_hermes_agent_ssh_container_port }}"
      TAILSCALE_AUTH_KEY: "{{ isolation_vm_hermes_agent_tailscale_auth_key | default('') }}"
      NETBIRD_SETUP_KEY: "{{ isolation_vm_hermes_agent_netbird_setup_key | default('') }}"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "/hermes-agent/healthcheck-hermes-agent.sh"]
      interval: "{{ isolation_vm_hermes_agent_healthcheck_interval }}"
      timeout: "{{ isolation_vm_hermes_agent_healthcheck_timeout }}"
      retries: "{{ isolation_vm_hermes_agent_healthcheck_retries }}"
      start_period: "{{ isolation_vm_hermes_agent_healthcheck_start_period }}"
    user: "{{ isolation_vm_user_uid }}:{{ isolation_vm_user_gid }}"
    mem_limit: "{{ isolation_vm_hermes_agent_mem_limit }}"
    cpus: "{{ isolation_vm_hermes_agent_cpu_limit }}"
  become: true
  register: hermes_agent_container

- name: Wait for hermes-agent to become healthy
  ansible.builtin.wait_for:
    timeout: "{{ isolation_vm_hermes_agent_startup_timeout }}"
  delegate_to: localhost
  when: hermes_agent_container.changed

- name: Verify hermes-agent container is running
  community.docker.docker_container_info:
    name: "{{ isolation_vm_hermes_agent_container_name }}"
  register: hermes_agent_info
  become: true

- name: Check hermes-agent health status
  ansible.builtin.assert:
    that:
      - hermes_agent_info.container.State.Status == "running"
      - hermes_agent_info.container.State.Health.Status == "healthy"
    fail_msg: "hermes-agent container is not healthy"
    success_msg: "hermes-agent container is running and healthy"
