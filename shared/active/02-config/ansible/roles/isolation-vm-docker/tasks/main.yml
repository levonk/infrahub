---
# tasks file for isolation-vm-docker
# Purpose: Install and configure Docker inside the Isolation VM

# ---------------------------------------------------------------------------
# Gather facts for OS detection
# ---------------------------------------------------------------------------
- name: Gather ansible_facts
  ansible.builtin.setup:
    gather_subset: ["all"]

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Ensure required packages are present
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
  become: true
  when: 
    - ansible_facts['os_family'] == "Debian"
    - not isolation_vm_docker_skip_installation | default(false) | bool

# ---------------------------------------------------------------------------
# Add Docker apt repository (Debian/Ubuntu)
# ---------------------------------------------------------------------------
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - isolation_vm_docker_install_method == "repo"
    - not isolation_vm_docker_skip_installation | default(false) | bool

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - isolation_vm_docker_install_method == "repo"
    - not isolation_vm_docker_skip_installation | default(false) | bool

- name: Add Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/debian
    suites: bookworm
    components: stable
    signed_by: /etc/apt/keyrings/docker.asc
    architecture: "{{ ansible_facts['architecture'] }}"
    state: present
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - isolation_vm_docker_install_method == "repo"
    - not isolation_vm_docker_skip_installation | default(false) | bool

- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true
  become: true
  when:
    - ansible_facts['os_family'] == "Debian"
    - isolation_vm_docker_install_method == "repo"
    - not isolation_vm_docker_skip_installation | default(false) | bool

# ---------------------------------------------------------------------------
# Install Docker Engine and Compose plugin
# ---------------------------------------------------------------------------
- name: Install Docker packages
  ansible.builtin.package:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

# ---------------------------------------------------------------------------
# Deploy daemon.json
# ---------------------------------------------------------------------------
- name: Ensure Docker configuration directory exists
  ansible.builtin.file:
    path: "{{ isolation_vm_docker_daemon_config_path | dirname }}"
    state: directory
    owner: "{{ isolation_vm_docker_daemon_config_owner }}"
    group: "{{ isolation_vm_docker_daemon_config_group }}"
    mode: "0755"
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

- name: Deploy daemon.json
  ansible.builtin.template:
    src: daemon.json.j2
    dest: "{{ isolation_vm_docker_daemon_config_path }}"
    owner: "{{ isolation_vm_docker_daemon_config_owner }}"
    group: "{{ isolation_vm_docker_daemon_config_group }}"
    mode: "{{ isolation_vm_docker_daemon_config_mode }}"
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool
  notify:
    - restart docker

# ---------------------------------------------------------------------------
# Add non-root user to docker group
# ---------------------------------------------------------------------------
- name: Ensure docker group exists
  ansible.builtin.group:
    name: "{{ isolation_vm_docker_group }}"
    gid: "{{ isolation_vm_docker_gid | int if isolation_vm_docker_gid | length > 0 else omit }}"
    state: present
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

- name: Add non-root user to docker group
  ansible.builtin.user:
    name: "{{ isolation_vm_docker_user }}"
    groups: "{{ isolation_vm_docker_group }}"
    append: true
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

# ---------------------------------------------------------------------------
# Configure Docker socket permissions
# ---------------------------------------------------------------------------
- name: Ensure Docker socket has correct permissions
  ansible.builtin.file:
    path: "{{ isolation_vm_docker_socket_path }}"
    owner: root
    group: "{{ isolation_vm_docker_socket_group }}"
    mode: "{{ isolation_vm_docker_socket_mode }}"
    state: file
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

# ---------------------------------------------------------------------------
# Enable and start Docker service
# ---------------------------------------------------------------------------
- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: "{{ isolation_vm_docker_service_name }}"
    state: started
    enabled: true
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

# ---------------------------------------------------------------------------
# Verify Docker installation
# ---------------------------------------------------------------------------
- name: Verify docker --version returns expected output
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version_check
  changed_when: false
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

- name: Log Docker version
  ansible.builtin.debug:
    msg: "Docker installed: {{ docker_version_check.stdout }}"

- name: Verify docker compose plugin is available
  ansible.builtin.command:
    cmd: docker compose version
  register: docker_compose_check
  changed_when: false
  become: true
  when: not isolation_vm_docker_skip_installation | default(false) | bool

- name: Log Docker Compose version
  ansible.builtin.debug:
    msg: "Docker Compose installed: {{ docker_compose_check.stdout }}"

# ---------------------------------------------------------------------------
# Test Docker with hello-world container
# ---------------------------------------------------------------------------
- name: Run hello-world container to test Docker
  ansible.builtin.command:
    cmd: docker run --rm hello-world
  register: hello_world_test
  changed_when: false
  become: true
  when: 
    - isolation_vm_docker_verify_install | default(true) | bool
    - not isolation_vm_docker_skip_installation | default(false) | bool
  ignore_errors: true

- name: Display hello-world test result
  ansible.builtin.debug:
    msg: "Hello-world test result: {{ hello_world_test.stdout if hello_world_test is succeeded else 'FAILED' }}"
  when: isolation_vm_docker_verify_install | default(true) | bool
