---
# NetBird Management Service default variables

# Container configuration
netbird_mgmt_container_name: localnet-netbird-mgmt
netbird_mgmt_image_name: netbirdio/management:latest
netbird_mgmt_volume_name: netbird-mgmt-data

# Port configuration (references cloud_server group_vars per AGENTS.md)
netbird_mgmt_host_port: "{{ cloud_server_netbird_mgmt_host_port | default('33073') }}"
netbird_mgmt_container_port: "{{ cloud_server_netbird_mgmt_container_port | default('33073') }}"

# Configuration
netbird_mgmt_log_level: info

# Healthcheck configuration
netbird_mgmt_healthcheck_interval: 30
netbird_mgmt_healthcheck_timeout: 10
netbird_mgmt_healthcheck_retries: 3
netbird_mgmt_healthcheck_start_period: 40
