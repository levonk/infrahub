---
# NetBird Signal Service default variables

# Container configuration
netbird_signal_container_name: localnet-netbird-signal
netbird_signal_image_name: netbirdio/signal:latest

# Port configuration (MUST BE DEFINED AS VARIABLES IN group_vars/all.yml)
netbird_signal_host_port: "{{ netbird_signal_host_port | default('33074') }}"
netbird_signal_container_port: "{{ netbird_signal_container_port | default('33074') }}"

# Configuration
netbird_signal_log_level: info

# Healthcheck configuration
netbird_signal_healthcheck_interval: 30
netbird_signal_healthcheck_timeout: 10
netbird_signal_healthcheck_retries: 3
netbird_signal_healthcheck_start_period: 40
