---
# defaults file for proxy-authelia
# Neutral, overridable defaults. No localnet-specific paths.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# SSO Service (Authelia)
# ---------------------------------------------------------------------------
proxy_authelia_enabled: true
proxy_authelia_version: "latest"
proxy_authelia_image: "authelia/authelia:{{ proxy_authelia_version }}"

proxy_authelia_web_host_port: "{{ cloud_server_authelia_web_host_port | default('9091') }}"
proxy_authelia_web_container_port: "{{ cloud_server_authelia_web_container_port | default('9091') }}"

proxy_authelia_redis_host_port: "{{ cloud_server_authelia_redis_host_port | default('6379') }}"
proxy_authelia_redis_container_port: "{{ cloud_server_authelia_redis_container_port | default('6379') }}"

# ---------------------------------------------------------------------------
# Authelia Configuration
# ---------------------------------------------------------------------------
# Note: These should be overridden in host_vars or vault
# Default secrets for testing (MUST be overridden in production)
proxy_authelia_jwt_secret: "default_jwt_secret_change_in_production_at_least_20_chars"
proxy_authelia_session_secret: "default_session_secret_change_in_production_at_least_20_chars"
proxy_authelia_storage_encryption_key: "default_encryption_key_change_in_production_at_least_20_chars"

# Session / Storage
proxy_authelia_session_name: "authelia_session"
proxy_authelia_session_expiration: "1h"
proxy_authelia_session_inactivity: "5m"
proxy_authelia_session_redis_enabled: true

# Storage backend (PostgreSQL for production)
proxy_authelia_storage_backend: "postgres"

# Notifications (using filesystem to avoid SMTP requirement for testing)
proxy_authelia_notifier_backend: "filesystem"
proxy_authelia_notifier_fs_path: "/config/notification.txt"

proxy_authelia_log_level: "info"
proxy_authelia_log_format: "json"
proxy_authelia_log_max_size: "10m"
proxy_authelia_log_max_file: "5"
proxy_authelia_theme: "light"

# Default admin user (password MUST be overridden via vault)
# Note: Password must be a hash generated with: docker run --rm authelia/authelia:latest authelia crypto hash generate argon2 --password 'yourpassword'
proxy_authelia_admin_user: "admin"
proxy_authelia_admin_password: "$argon2id$v=19$m=65536,t=3,p=4$s7tNXjVewNMPStiSd7IXcA$Y5YsedFEDkvnidKb70WNTM7y9B+e30y05g4wJRFgkEQ"
proxy_authelia_admin_display_name: "Administrator"
proxy_authelia_admin_email: "admin@example.com"

# Access Control — default one_factor, allow localhost for testing
proxy_authelia_default_policy: "one_factor"
proxy_authelia_rules:
  - domain: "*.example.com"
    policy: "one_factor"
  - domain: "localhost"
    policy: "bypass"

# ---------------------------------------------------------------------------
# PostgreSQL Database (for Authelia storage)
# ---------------------------------------------------------------------------
proxy_authelia_postgres_enabled: true
proxy_authelia_postgres_version: "15-alpine"
proxy_authelia_postgres_image: "postgres:{{ proxy_authelia_postgres_version }}"
proxy_authelia_postgres_host: "proxy-authelia-postgres"
proxy_authelia_postgres_port: "5432"
proxy_authelia_postgres_user: "authelia"
proxy_authelia_postgres_password: "change-me-in-vault"
proxy_authelia_postgres_database: "authelia"

# ---------------------------------------------------------------------------
# Redis Sidecar (for sessions)
# ---------------------------------------------------------------------------
proxy_authelia_redis_enabled: true
proxy_authelia_redis_version: "7-alpine"
proxy_authelia_redis_image: "redis:{{ proxy_authelia_redis_version }}"
proxy_authelia_redis_password: "change-me-in-vault"

# ---------------------------------------------------------------------------
# Docker Network & Volumes
# ---------------------------------------------------------------------------
proxy_authelia_docker_network_name: "{{ cloud_server_authelia_network_name | default('proxy-network') }}"
proxy_authelia_data_dir: "{{ cloud_server_authelia_data_dir | default('/opt/authelia') }}"

# ---------------------------------------------------------------------------
# Feature Flags
# ---------------------------------------------------------------------------
proxy_authelia_verify_health: true
proxy_authelia_verify_timeout_seconds: 30

# ---------------------------------------------------------------------------
# Metrics Configuration
# ---------------------------------------------------------------------------
proxy_authelia_metrics_enabled: true
proxy_authelia_metrics_port: "9092"
proxy_authelia_metrics_container_port: "9092"

# ---------------------------------------------------------------------------
# Log Retention Configuration
# ---------------------------------------------------------------------------
proxy_authelia_log_retention_days: 30
proxy_authelia_log_retention_compression: true
