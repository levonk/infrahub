---
# handlers file for proxy-authelia

- name: Restart proxy-authelia
  community.docker.docker_container:
    name: proxy-authelia
    state: started
    restart: true
  listen: restart proxy-authelia
  become: true

- name: Restart proxy-authelia-redis
  community.docker.docker_container:
    name: proxy-authelia-redis
    state: started
    restart: true
  listen: restart proxy-authelia-redis
  become: true

- name: Restart proxy-authelia-postgres
  community.docker.docker_container:
    name: proxy-authelia-postgres
    state: started
    restart: true
  listen: restart proxy-authelia-postgres
  become: true
