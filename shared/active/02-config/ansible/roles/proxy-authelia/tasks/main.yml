---
# tasks file for proxy-authelia
# Deploys Authelia SSO service and optional Redis session store as Docker containers.
# All ports are variable-driven per AGENTS.md rules.

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Ensure authelia data directory exists
  ansible.builtin.file:
    path: "{{ proxy_authelia_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure authelia configuration directories exist
  ansible.builtin.file:
    path: "{{ proxy_authelia_data_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - config

# ---------------------------------------------------------------------------
# Docker Volumes
# ---------------------------------------------------------------------------
- name: Ensure authelia Docker volumes exist
  community.docker.docker_volume:
    name: "{{ item }}"
    state: present
  become: true
  loop:
    - proxy-authelia-config
    - proxy-authelia-postgres
    - proxy-authelia-redis

# ---------------------------------------------------------------------------
# Configuration Templates
# ---------------------------------------------------------------------------
- name: Deploy Authelia configuration
  ansible.builtin.template:
    src: authelia/configuration.yml.j2
    dest: "{{ proxy_authelia_data_dir }}/config/configuration.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart proxy-authelia

- name: Deploy Authelia users database
  ansible.builtin.template:
    src: authelia/users_database.yml.j2
    dest: "{{ proxy_authelia_data_dir }}/config/users_database.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart proxy-authelia

- name: Deploy Traefik Authelia middleware configuration
  ansible.builtin.template:
    src: traefik/authelia_middleware.yml.j2
    dest: "{{ proxy_authelia_data_dir }}/config/traefik_authelia_middleware.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart proxy-authelia

- name: Create secret files for Authelia
  ansible.builtin.copy:
    content: "{{ item.value }}"
    dest: "{{ proxy_authelia_data_dir }}/config/{{ item.file }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  loop:
    - { file: "jwt_secret", value: "{{ proxy_authelia_jwt_secret }}" }
    - { file: "session_secret", value: "{{ proxy_authelia_session_secret }}" }
    - { file: "storage_encryption_key", value: "{{ proxy_authelia_storage_encryption_key }}" }
    - { file: "smtp_password", value: "{{ proxy_authelia_notifier_smtp_password | default('') }}" }
  notify: restart proxy-authelia

# ---------------------------------------------------------------------------
# PostgreSQL Database (for Authelia storage)
# ---------------------------------------------------------------------------
- name: Deploy Authelia PostgreSQL container
  community.docker.docker_container:
    name: proxy-authelia-postgres
    image: "{{ proxy_authelia_postgres_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ proxy_authelia_docker_network_name }}"
    env:
      POSTGRES_USER: "{{ proxy_authelia_postgres_user }}"
      POSTGRES_PASSWORD: "{{ proxy_authelia_postgres_password }}"
      POSTGRES_DB: "{{ proxy_authelia_postgres_database }}"
    volumes:
      - proxy-authelia-postgres:/var/lib/postgresql/data
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{ proxy_authelia_postgres_user }}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  become: true
  when: proxy_authelia_postgres_enabled | bool
  notify: restart proxy-authelia-postgres

- name: Wait for PostgreSQL to be ready
  ansible.builtin.command:
    cmd: "docker inspect --format='{{ '{{' }} .State.Health.Status {{ '}}' }}' proxy-authelia-postgres"
  become: true
  register: postgres_health
  until: postgres_health.stdout == "healthy"
  retries: 10
  delay: 5
  when:
    - proxy_authelia_postgres_enabled | bool
    - proxy_authelia_verify_health | bool

# ---------------------------------------------------------------------------
# Redis Session Store (Sidecar)
# ---------------------------------------------------------------------------
- name: Deploy Authelia Redis container
  community.docker.docker_container:
    name: proxy-authelia-redis
    image: "{{ proxy_authelia_redis_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ proxy_authelia_docker_network_name }}"
    ports:
      - "{{ proxy_authelia_redis_host_port }}:{{ proxy_authelia_redis_container_port }}/tcp"
    volumes:
      - proxy-authelia-redis:/data
    command:
      - redis-server
      - --requirepass
      - "{{ proxy_authelia_redis_password }}"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  become: true
  when: proxy_authelia_redis_enabled | bool
  notify: restart proxy-authelia-redis

# ---------------------------------------------------------------------------
# Authelia SSO Container
# ---------------------------------------------------------------------------
- name: Deploy Authelia container
  community.docker.docker_container:
    name: proxy-authelia
    image: "{{ proxy_authelia_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ proxy_authelia_docker_network_name }}"
    ports:
      - "{{ proxy_authelia_web_host_port }}:{{ proxy_authelia_web_container_port }}/tcp"
    volumes:
      - "{{ proxy_authelia_data_dir }}/config:/config"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:{{ proxy_authelia_web_container_port }}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  become: true
  when: proxy_authelia_enabled | bool

# ---------------------------------------------------------------------------
# Health Verification
# ---------------------------------------------------------------------------
- name: Wait for Authelia to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ proxy_authelia_web_host_port }}/api/health"
    status_code: 200
  register: authelia_health
  until: authelia_health.status == 200
  retries: 10
  delay: 5
  when:
    - proxy_authelia_enabled | bool
    - proxy_authelia_verify_health | bool

# ---------------------------------------------------------------------------
# Status Report
# ---------------------------------------------------------------------------
- name: Report authelia status
  ansible.builtin.debug:
    msg: |2
      Authelia SSO deployed successfully:
      - Web UI: https://{{ ansible_host | default('localhost') }}:{{ proxy_authelia_web_host_port }}
      - Redis: {{ proxy_authelia_redis_host_port }} (if enabled)
