---
# Test playbook for proxy-authelia role
# Run with: ansible-playbook -i localhost, -c local tests/test.yml --check --diff

- name: "Test proxy-authelia role"
  hosts: all
  become: true
  vars:
    proxy_authelia_verify_health: false
    proxy_authelia_redis_enabled: true
    cloud_server_authelia_web_host_port: "9091"
    cloud_server_authelia_web_container_port: "9091"
    cloud_server_authelia_redis_host_port: "6380"
    cloud_server_authelia_redis_container_port: "6379"
    cloud_server_authelia_admin_password: "test-password-not-for-production"
    cloud_server_authelia_jwt_secret: "test-jwt-secret"
    cloud_server_authelia_session_secret: "test-session-secret"
    cloud_server_authelia_storage_encryption_key: "test-storage-encryption-key"
    cloud_server_authelia_redis_password: "test-redis-password"
  roles:
    - role: ../proxy-authelia
