---
# tasks file for proxy-headroom
# Deploys headroom context compression layer for AI agents.
# All ports are variable-driven per AGENTS.md rules.

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Ensure headroom data directory exists
  ansible.builtin.file:
    path: "{{ proxy_headroom_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure headroom configuration directories exist
  ansible.builtin.file:
    path: "{{ proxy_headroom_data_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - mounts
    - mounts/data

# ---------------------------------------------------------------------------
# Docker Network
# ---------------------------------------------------------------------------
- name: Ensure proxy-chain Docker network exists
  community.docker.docker_network:
    name: "{{ proxy_headroom_docker_network_name }}"
    state: present
    driver: bridge
  become: true

# ---------------------------------------------------------------------------
# Docker Volumes
# ---------------------------------------------------------------------------
- name: Ensure headroom data volume exists
  community.docker.docker_volume:
    name: "{{ proxy_headroom_volume_name }}"
    state: present
  become: true

# ---------------------------------------------------------------------------
# Pull Image (built on Mac, pushed to registry — Invariant #2)
# ---------------------------------------------------------------------------
- name: Pull headroom image from local registry
  community.docker.docker_image:
    name: "{{ proxy_headroom_image }}"
    source: pull
    state: present
  become: true

# ---------------------------------------------------------------------------
# Headroom Container
# ---------------------------------------------------------------------------
- name: Deploy headroom container
  community.docker.docker_container:
    name: headroom
    image: "{{ proxy_headroom_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ proxy_headroom_docker_network_name }}"
        ipv4_address: "{{ infra_network_ip_headroom | default('172.29.0.13') }}"
      - name: "{{ infra_network_proxy_traefik_network_name | default('traefik-network') }}"
    ports:
      - "{{ proxy_headroom_host_ip }}:{{ proxy_headroom_host_port }}:{{ proxy_headroom_container_port }}/tcp"
    volumes:
      - "{{ proxy_headroom_volume_name }}:/data"
    env:
      PUID: "{{ proxy_headroom_puid }}"
      PGID: "{{ proxy_headroom_pgid }}"
      TZ: "{{ proxy_headroom_tz }}"
      HEADROOM_PORT: "{{ proxy_headroom_container_port }}"
      HEADROOM_HOST: "{{ proxy_headroom_container_ip }}"
      HEADROOM_DATA_DIR: "/data"
      UPSTREAM_PROXY: "{{ proxy_headroom_upstream_proxy }}"
      HEADROOM_OUTPUT_SHAPER: "{{ proxy_headroom_output_shaper }}"
    cap_drop:
      - ALL
    capabilities:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
    security_opts:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:{{ proxy_headroom_container_port }}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  become: true
  when: proxy_headroom_enabled | bool

# ---------------------------------------------------------------------------
# Health Verification
# ---------------------------------------------------------------------------
- name: Wait for headroom to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ proxy_headroom_host_port }}/health"
    status_code: 200
  register: headroom_health
  until: headroom_health.status == 200
  retries: 10
  delay: 5
  when:
    - proxy_headroom_enabled | bool
    - proxy_headroom_verify_health | bool

# ---------------------------------------------------------------------------
# Status Report
# ---------------------------------------------------------------------------
- name: Report headroom status
  ansible.builtin.debug:
    msg: |2
      headroom deployed successfully:
      - Proxy: http://{{ ansible_host | default('localhost') }}:{{ proxy_headroom_host_port }}
      - Upstream: {{ proxy_headroom_upstream_proxy }}
      - Output Shaper: {{ proxy_headroom_output_shaper }}
      - Data Directory: {{ proxy_headroom_data_dir }}
  when: proxy_headroom_enabled | bool