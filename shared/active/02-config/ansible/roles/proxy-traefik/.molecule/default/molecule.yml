---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: traefik-test
    image: debian:bookworm-slim
    pre_build_image: true
    privileged: true
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
provisioner:
  name: ansible
verifier:
  name: ansible
