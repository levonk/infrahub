---
# handlers file for proxy-traefik

- name: restart traefik
  community.docker.docker_container:
    name: "{{ proxy_traefik_container_name }}"
    state: started
    restart: true
  become: true

- name: reload traefik
  community.docker.docker_container:
    name: "{{ proxy_traefik_container_name }}"
    state: started
    signal: SIGHUP
  become: true
