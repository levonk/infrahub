---
# Traefik Proxy Deployment Tasks
# Deploys Traefik reverse proxy with ACME, plugins, and security middleware
# All ports are variable-driven per AGENTS.md rules.

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Ensure Traefik data directory exists
  ansible.builtin.file:
    path: "{{ proxy_traefik_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Ensure Traefik configuration directories exist
  ansible.builtin.file:
    path: "{{ proxy_traefik_data_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - config
    - config/static
    - config/dynamic
    - ssl

# ---------------------------------------------------------------------------
# Docker Networks
# ---------------------------------------------------------------------------
- name: Ensure Traefik Docker network exists
  community.docker.docker_network:
    name: "{{ proxy_traefik_network_name }}"
    state: present
    driver: bridge
    ipam_config:
      - subnet: "{{ proxy_traefik_network_subnet }}"
        gateway: "{{ proxy_traefik_network_gateway }}"
  become: true

# ---------------------------------------------------------------------------
# Docker Volumes
# ---------------------------------------------------------------------------
- name: Ensure Traefik SSL volume exists
  community.docker.docker_volume:
    name: "{{ proxy_traefik_ssl_volume }}"
    state: present
  become: true

- name: Ensure Traefik config volume exists
  community.docker.docker_volume:
    name: "{{ proxy_traefik_config_volume }}"
    state: present
  become: true

# ---------------------------------------------------------------------------
# Deploy Traefik Static Configuration
# ---------------------------------------------------------------------------
- name: Deploy traefik.yml static configuration
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart traefik

# ---------------------------------------------------------------------------
# Deploy Traefik Dynamic Configuration Templates
# ---------------------------------------------------------------------------
- name: Ensure dynamic configuration directory exists
  ansible.builtin.file:
    path: "{{ proxy_traefik_data_dir }}/config/dynamic"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy middleware configuration template
  ansible.builtin.template:
    src: dynamic/middlewares.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/middlewares.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik

- name: Deploy SearXNG dynamic configuration template
  ansible.builtin.template:
    src: dynamic/search-levonk-com.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/search-levonk-com.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik
  when: search_searxng_enabled | bool

- name: Deploy Authelia dynamic configuration template
  ansible.builtin.template:
    src: dynamic/auth-levonk-com.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/auth-levonk-com.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik
  when: proxy_authelia_enabled | bool

- name: Deploy agentmemory dynamic configuration template
  ansible.builtin.template:
    src: dynamic/agentmemory-levonk-com.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/agentmemory-levonk-com.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik
  when: agentmemory_enabled | default(false) | bool

- name: Deploy Traefik API dynamic configuration template
  ansible.builtin.template:
    src: dynamic/traefik-api.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/traefik-api.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik
  when: proxy_traefik_api_entrypoint_enabled | default(false) | bool

- name: Deploy Homepage (start) dynamic configuration template
  ansible.builtin.template:
    src: dynamic/start-levonk-com.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/start-levonk-com.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik
  when: dashboard_homepage_enabled | default(true) | bool

- name: Deploy TraLa (start2) dynamic configuration template
  ansible.builtin.template:
    src: dynamic/start2-levonk-com.yml.j2
    dest: "{{ proxy_traefik_data_dir }}/config/dynamic/start2-levonk-com.yml"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: reload traefik
  when: dashboard_trala_enabled | default(true) | bool

# ---------------------------------------------------------------------------
# Traefik Container
# ---------------------------------------------------------------------------
- name: Deploy Traefik container
  community.docker.docker_container:
    name: "{{ proxy_traefik_container_name }}"
    image: "{{ proxy_traefik_image }}:{{ proxy_traefik_image_tag }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ proxy_traefik_network_name }}"
    published_ports:
      - "{{ proxy_traefik_host_ip }}:{{ proxy_traefik_http_port }}:{{ proxy_traefik_http_container_port }}/tcp"
      - "{{ proxy_traefik_host_ip }}:{{ proxy_traefik_https_port }}:{{ proxy_traefik_https_container_port }}/tcp"
      - "127.0.0.1:{{ proxy_traefik_dashboard_port }}:{{ proxy_traefik_dashboard_container_port }}/tcp"
      - "{{ proxy_traefik_host_ip }}:{{ proxy_traefik_metrics_port }}:{{ proxy_traefik_metrics_container_port }}/tcp"
    volumes:
      - "{{ proxy_traefik_ssl_volume }}:/letsencrypt"
      - "{{ proxy_traefik_data_dir }}/config:/etc/traefik:ro"
    env:
      TZ: "{{ proxy_traefik_tz }}"
      CF_DNS_API_TOKEN: "{{ vault_cloudflare_api_token | default('change-me') }}"
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    log_driver: json-file
    log_opt:
      max-size: "{{ proxy_traefik_log_max_size }}"
      max-file: "{{ proxy_traefik_log_max_file }}"
    labels:
      traefik.enable: "false"
    groups:
      - "{{ docker_group_gid | default('0') }}"
  become: true
  when: proxy_traefik_enabled | bool

# ---------------------------------------------------------------------------
# Log Retention Configuration
# ---------------------------------------------------------------------------
- name: Deploy logrotate configuration for Traefik
  ansible.builtin.template:
    src: logrotate/traefik.j2
    dest: /etc/logrotate.d/traefik
    owner: root
    group: root
    mode: "0644"
  become: true
  when: proxy_traefik_enabled | bool

# ---------------------------------------------------------------------------
# Health Verification
# ---------------------------------------------------------------------------
- name: Wait for Traefik dashboard to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ proxy_traefik_dashboard_port }}{{ proxy_traefik_dashboard_endpoint }}"
    status_code: [200, 401]
    return_content: false
  register: traefik_health
  until: traefik_health.status in [200, 401]
  retries: 10
  delay: 5
  when:
    - proxy_traefik_enabled | bool
    - proxy_traefik_verify_health | bool

# ---------------------------------------------------------------------------
# Status Report
# ---------------------------------------------------------------------------
- name: Report Traefik status
  ansible.builtin.debug:
    msg: |2
      Traefik deployed successfully:
      - HTTP: http://{{ ansible_host | default('localhost') }}:{{ proxy_traefik_http_port }}
      - HTTPS: https://{{ ansible_host | default('localhost') }}:{{ proxy_traefik_https_port }}
      - Dashboard: http://{{ ansible_host | default('localhost') }}:{{ proxy_traefik_dashboard_port }}{{ proxy_traefik_dashboard_endpoint }}
      - Network: {{ proxy_traefik_network_name }}
      - ACME: {{ proxy_traefik_acme_enabled }}
      - Plugins: {{ proxy_traefik_plugins_enabled }}
  when: proxy_traefik_enabled | bool
