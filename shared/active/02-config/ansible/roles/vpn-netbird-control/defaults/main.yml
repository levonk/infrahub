---
# NetBird Control Plane default variables
# Consolidates management, signal, and TURN relay services.

# ---------------------------------------------------------------------------
# Container Images
# ---------------------------------------------------------------------------
netbird_control_mgmt_image_name: netbirdio/management:latest
netbird_control_signal_image_name: netbirdio/signal:latest
netbird_control_relay_image_name: netbirdio/relay:latest

# ---------------------------------------------------------------------------
# Container Names
# ---------------------------------------------------------------------------
netbird_control_mgmt_container_name: netbird-management
netbird_control_signal_container_name: netbird-signal
netbird_control_relay_container_name: netbird-relay

# ---------------------------------------------------------------------------
# Volume Names
# ---------------------------------------------------------------------------
netbird_control_mgmt_volume_name: netbird-mgmt-data

# ---------------------------------------------------------------------------
# Port Configuration (references cloud_server group_vars per AGENTS.md)
# ---------------------------------------------------------------------------
netbird_control_mgmt_host_port: "{{ cloud_server_netbird_mgmt_host_port | default('33073') }}"
netbird_control_mgmt_container_port: "{{ cloud_server_netbird_mgmt_container_port | default('33073') }}"

netbird_control_signal_host_port: "{{ cloud_server_netbird_signal_host_port | default('10000') }}"
netbird_control_signal_container_port: "{{ cloud_server_netbird_signal_container_port | default('10000') }}"

netbird_control_relay_host_port: "{{ cloud_server_netbird_turn_host_port | default('3478') }}"
netbird_control_relay_container_port: "{{ cloud_server_netbird_turn_container_port | default('3478') }}"

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
netbird_control_network_name: netbird-control

# ---------------------------------------------------------------------------
# Management Server Configuration
# ---------------------------------------------------------------------------
netbird_control_mgmt_log_level: info
netbird_control_mgmt_data_dir: "{{ localnet_services_dir }}/netbird/management"

# IdP / OIDC configuration (unset by default; user supplies via host_vars or vault)
netbird_control_mgmt_idp_provider: "none"
netbird_control_mgmt_idp_client_id: ""
netbird_control_mgmt_idp_client_secret: ""
netbird_control_mgmt_idp_authorization_endpoint: ""
netbird_control_mgmt_idp_token_endpoint: ""
netbird_control_mgmt_idp_jwks_uri: ""

# ---------------------------------------------------------------------------
# Internal URL helpers (used by management container env)
# ---------------------------------------------------------------------------
netbird_control_signal_url: >-
  http://{{ netbird_control_signal_container_name
  }}:{{ netbird_control_signal_container_port }}
netbird_control_relay_url: >-
  http://{{ netbird_control_relay_container_name
  }}:{{ netbird_control_relay_container_port }}

# ---------------------------------------------------------------------------
# Signal Server Configuration
# ---------------------------------------------------------------------------
netbird_control_signal_log_level: info

# ---------------------------------------------------------------------------
# Relay (TURN) Server Configuration
# ---------------------------------------------------------------------------
netbird_control_relay_log_level: info

# ---------------------------------------------------------------------------
# Healthcheck Configuration
# ---------------------------------------------------------------------------
netbird_control_healthcheck_interval: 30
netbird_control_healthcheck_timeout: 10
netbird_control_healthcheck_retries: 3
netbird_control_healthcheck_start_period: 40
