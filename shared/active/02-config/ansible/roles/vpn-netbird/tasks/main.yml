---
# tasks file for vpn-netbird
# Installs and configures Netbird as a host-level WireGuard mesh VPN daemon.
# Supports Debian, Kali, Oracle Linux, Alpine, and other distributions.

# ---------------------------------------------------------------------------
# OS & Init Detection
# ---------------------------------------------------------------------------
- name: Detect OS family and init system
  ansible.builtin.set_fact:
    _vpn_netbird_os_family: "{{ ansible_facts.os_family }}"
    _vpn_netbird_init_system: "{{ ansible_facts.service_mgr }}"

- name: Determine install method (auto-detect)
  ansible.builtin.set_fact:
    _vpn_netbird_install_method: >-
      {{ 'repo' if _vpn_netbird_os_family in ['Debian', 'RedHat'] else 'binary' }}
  when: vpn_netbird_install_method == 'auto'

- name: Use explicit install method
  ansible.builtin.set_fact:
    _vpn_netbird_install_method: "{{ vpn_netbird_install_method }}"
  when: vpn_netbird_install_method != 'auto'

# ---------------------------------------------------------------------------
# Installation (OS-specific)
# ---------------------------------------------------------------------------
- name: Install Netbird via apt repository (Debian family)
  ansible.builtin.include_tasks: install-repo-debian.yml
  when:
    - _vpn_netbird_install_method == 'repo'
    - _vpn_netbird_os_family == 'Debian'

- name: Install Netbird via yum/dnf repository (RedHat family)
  ansible.builtin.include_tasks: install-repo-redhat.yml
  when:
    - _vpn_netbird_install_method == 'repo'
    - _vpn_netbird_os_family == 'RedHat'

- name: Install Netbird from binary (Alpine / fallback)
  ansible.builtin.include_tasks: install-binary.yml
  when: _vpn_netbird_install_method == 'binary'

# ---------------------------------------------------------------------------
# Configuration
# ---------------------------------------------------------------------------
- name: Ensure Netbird state directory exists
  ansible.builtin.file:
    path: /var/lib/netbird
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# ---------------------------------------------------------------------------
# Authenticate and start Netbird
# ---------------------------------------------------------------------------
- name: Check Netbird authentication status
  ansible.builtin.command:
    cmd: netbird status
  become: true
  changed_when: false
  failed_when: false
  register: vpn_netbird_status_check

- name: Build netbird up arguments
  ansible.builtin.set_fact:
    _vpn_netbird_up_args:
      - --setup-key={{ vpn_netbird_setup_key }}
      - --management-url={{ vpn_netbird_management_url }}
      - --hostname={{ vpn_netbird_hostname }}
      - "{% if vpn_netbird_accept_dns %}--accept-dns{% else %}--accept-dns=false{% endif %}"
      - "{% if vpn_netbird_accept_routes %}--accept-routes{% else %}--accept-routes=false{% endif %}"
      - "{% if vpn_netbird_enable_ssh %}--ssh{% endif %}"
      - "{% if vpn_netbird_advertise_routes | length > 0 %}--advertise-routes={{ vpn_netbird_advertise_routes | join(',') }}{% endif %}"  # noqa: yaml[line-length]
  when: vpn_netbird_setup_key | length > 0

- name: Authenticate and start Netbird
  ansible.builtin.command:
    cmd: "netbird up {{ _vpn_netbird_up_args | select | join(' ') }}"
  become: true
  changed_when: true
  when:
    - vpn_netbird_setup_key | length > 0
    - vpn_netbird_status_check.rc != 0
  notify: restart netbird

# ---------------------------------------------------------------------------
# Service Management (init-system aware)
# ---------------------------------------------------------------------------
- name: Ensure Netbird systemd service is enabled and running
  ansible.builtin.include_tasks: install-service-systemd.yml
  when: _vpn_netbird_init_system == 'systemd'

- name: Ensure Netbird OpenRC service is enabled and running
  ansible.builtin.include_tasks: install-service-openrc.yml
  when: _vpn_netbird_init_system == 'openrc'

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
- name: Verify Netbird status
  ansible.builtin.command:
    cmd: netbird status
  become: true
  changed_when: false
  when: vpn_netbird_verify_connection | bool

- name: Verify Netbird IP
  ansible.builtin.command:
    cmd: netbird ip
  become: true
  changed_when: false
  register: vpn_netbird_ip
  when: vpn_netbird_verify_connection | bool

- name: Report Netbird connection info
  ansible.builtin.debug:
    msg: |
      Netbird is running:
      - Hostname: {{ vpn_netbird_hostname }}
      - Port: {{ vpn_netbird_port }}
      - IP: {{ vpn_netbird_ip.stdout | default('N/A') }}
  when: vpn_netbird_verify_connection | bool
