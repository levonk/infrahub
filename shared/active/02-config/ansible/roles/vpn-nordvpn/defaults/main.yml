---
# defaults file for vpn-nordvpn

# NordVPN Configuration
vpn_nordvpn_enabled: false
vpn_nordvpn_token: ""
vpn_nordvpn_country: "United_States"
vpn_nordvpn_openvpn_user: ""
vpn_nordvpn_openvpn_pass: ""

# Container Configuration
vpn_nordvpn_container_name: "nordvpn"
vpn_nordvpn_config_volume_name: "localnet-nordvpn-config-volume"
vpn_nordvpn_data_volume_name: "localnet-nordvpn-data-volume"

# Network Configuration
vpn_nordvpn_network_name: "{{ cloud_server_nordvpn_network_name | default('vpn-network') }}"
vpn_nordvpn_network_subnet: "{{ cloud_server_nordvpn_network_subnet | default('10.10.0.0/24') }}"
vpn_nordvpn_network_gateway: "{{ cloud_server_nordvpn_network_gateway | default('10.10.0.1') }}"

# Port Configuration (ALL ports must be variables - NO hardcoded ports)
vpn_nordvpn_wireguard_host_port: "{{ cloud_server_nordvpn_wireguard_host_port | default('51820') }}"
vpn_nordvpn_wireguard_container_port: "{{ cloud_server_nordvpn_wireguard_container_port | default('51820') }}"
vpn_nordvpn_socks_host_port: "{{ cloud_server_nordvpn_socks_host_port | default('1080') }}"
vpn_nordvpn_socks_container_port: "{{ cloud_server_nordvpn_socks_container_port | default('1080') }}"
vpn_nordvpn_http_host_port: "{{ cloud_server_nordvpn_http_host_port | default('8888') }}"
vpn_nordvpn_http_container_port: "{{ cloud_server_nordvpn_http_container_port | default('8888') }}"
vpn_nordvpn_https_host_port: "{{ cloud_server_nordvpn_https_host_port | default('8443') }}"
vpn_nordvpn_https_container_port: "{{ cloud_server_nordvpn_https_container_port | default('8443') }}"
vpn_nordvpn_shadowsocks_host_port: "{{ cloud_server_nordvpn_shadowsocks_host_port | default('8388') }}"
vpn_nordvpn_shadowsocks_container_port: "{{ cloud_server_nordvpn_shadowsocks_container_port | default('8388') }}"

# Service Directories
localnet_services_dir: "/opt/localnet/services"
localnet_tz: "UTC"
