---
# tasks file for vpn-tailscale
# Installs and configures Tailscale as a host-level daemon.

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Ensure required packages are present (Debian)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true
  when: ansible_facts.os_family == "Debian"

- name: Ensure required packages are present (RedHat)
  ansible.builtin.dnf:
    name:
      - ca-certificates
      - curl
      - gnupg2
    state: present
  become: true
  when: ansible_facts.os_family == "RedHat"

# ---------------------------------------------------------------------------
# Install Tailscale (official repository)
# ---------------------------------------------------------------------------
- name: Add Tailscale GPG key
  ansible.builtin.apt_key:
    url: https://pkgs.tailscale.com/{{ vpn_tailscale_channel }}/debian/bookworm.gpg
    keyring: /usr/share/keyrings/tailscale-archive-keyring.gpg
  become: true
  when: ansible_facts.os_family == "Debian"

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/{{ vpn_tailscale_channel }}/debian bookworm main
    filename: tailscale
    state: present
  become: true
  when: ansible_facts.os_family == "Debian"

- name: Install Tailscale
  ansible.builtin.apt:
    name: "tailscale{% if vpn_tailscale_version != 'latest' %}={{ vpn_tailscale_version }}{% endif %}"
    state: "{% if vpn_tailscale_version == 'latest' %}present{% else %}fixed{% endif %}"
    update_cache: true
  become: true
  notify: restart tailscale
  when: ansible_facts.os_family == "Debian"

# ---------------------------------------------------------------------------
# Install Tailscale (RedHat family)
# ---------------------------------------------------------------------------
- name: Download Tailscale installation script (RedHat)
  ansible.builtin.get_url:
    url: "https://tailscale.com/install.sh"
    dest: /tmp/tailscale-install.sh
    mode: "0755"
  become: true
  when: ansible_facts.os_family == "RedHat"

- name: Install Tailscale using official script (RedHat)
  ansible.builtin.command:
    cmd: /tmp/tailscale-install.sh
  become: true
  when: ansible_facts.os_family == "RedHat"
  notify: restart tailscale

# ---------------------------------------------------------------------------
# Configure Tailscale
# ---------------------------------------------------------------------------
- name: Ensure Tailscale state directory exists
  ansible.builtin.file:
    path: /var/lib/tailscale
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

# ---------------------------------------------------------------------------
# Check if NordVPN is running and get its network namespace
# ---------------------------------------------------------------------------
- name: Check if NordVPN container is running
  ansible.builtin.shell:
    cmd: docker ps | grep nordvpn
  register: nordvpn_running
  changed_when: false
  failed_when: false
  ignore_errors: true

- name: Set fact for NordVPN running status
  ansible.builtin.set_fact:
    nordvpn_is_running: "{{ nordvpn_running.rc == 0 }}"

# ---------------------------------------------------------------------------
# Service Management
# ---------------------------------------------------------------------------
- name: Check if Tailscale binary exists
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_binary
  become: true

- name: Keep host-level Tailscale running for dual exit node flexibility
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true
  become: true
  when:
    - tailscale_binary.stat.exists

# ---------------------------------------------------------------------------
# Authenticate and start Tailscale
# ---------------------------------------------------------------------------
- name: Check Tailscale authentication status
  ansible.builtin.command:
    cmd: tailscale status
  become: true
  changed_when: false
  failed_when: false
  register: vpn_tailscale_status_check

- name: Build tailscale up arguments
  ansible.builtin.set_fact:
    _vpn_tailscale_up_args:
      - --authkey={{ vpn_tailscale_auth_key }}
      - --hostname={{ vpn_tailscale_hostname }}
      - --port={{ vpn_tailscale_port }}
      - "{% if vpn_tailscale_accept_dns %}--accept-dns{% else %}--accept-dns=false{% endif %}"
      - "{% if vpn_tailscale_accept_routes %}--accept-routes{% else %}--accept-routes=false{% endif %}"
      - "{% if vpn_tailscale_enable_ssh %}--ssh{% endif %}"
      - "{% if vpn_tailscale_run_exit_node %}--advertise-exit-node{% endif %}"
      - >-
          {% if vpn_tailscale_advertise_routes | length > 0 %}
          --advertise-routes={{ vpn_tailscale_advertise_routes | join(',') }}
          {% endif %}
  when: vpn_tailscale_auth_key | length > 0

- name: Authenticate and start Tailscale
  ansible.builtin.command:
    cmd: "tailscale up {{ _vpn_tailscale_up_args | select | join(' ') }}"
  become: true
  changed_when: true
  when:
    - vpn_tailscale_auth_key | length > 0
    - vpn_tailscale_status_check.rc != 0
    - not nordvpn_is_running | bool
  notify: restart tailscale

# ---------------------------------------------------------------------------
# Deploy Tailscale container using dedicated VPN network with NordVPN as gateway
# ---------------------------------------------------------------------------
- name: "Remove existing Tailscale container if NordVPN is running"
  community.docker.docker_container:
    name: "tailscale-nordvpn"
    state: absent
    force_kill: true
  when:
    - nordvpn_is_running | bool
  ignore_errors: true

- name: "Deploy Tailscale container using dedicated VPN network"
  community.docker.docker_container:
    name: "tailscale-nordvpn"
    image: "tailscale/tailscale:latest"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ vpn_nordvpn_network_name }}"
    capabilities:
      - NET_ADMIN
    env:
      TS_AUTHKEY: "{{ vpn_tailscale_auth_key }}"
      TS_HOSTNAME: "{{ vpn_tailscale_hostname }}-nordvpn"
      TS_STATE_DIR: "/var/lib/tailscale"
      TS_EXTRA_ARGS: "--advertise-exit-node --accept-routes"
    volumes:
      - tailscale-nordvpn-state:/var/lib/tailscale
  when:
    - vpn_tailscale_enabled
    - vpn_tailscale_run_exit_node | bool
    - nordvpn_is_running | bool
  become: true

- name: "Get NordVPN container IP address"
  ansible.builtin.shell: docker inspect nordvpn --format '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}{% endraw %}'
  register: nordvpn_container_ip
  changed_when: false
  when:
    - vpn_tailscale_enabled
    - vpn_tailscale_run_exit_node | bool
    - nordvpn_is_running | bool

- name: "Configure NordVPN container as gateway for Tailscale traffic"
  ansible.builtin.shell: |
    docker exec tailscale-nordvpn ip route del default || true
    docker exec tailscale-nordvpn ip route add default via {{ nordvpn_container_ip.stdout }}
  when:
    - vpn_tailscale_enabled
    - vpn_tailscale_run_exit_node | bool
    - nordvpn_is_running | bool
  ignore_errors: true

- name: "Add NAT masquerading rules to NordVPN container"
  ansible.builtin.shell: |
    docker exec nordvpn iptables -t nat -A POSTROUTING -s 172.28.0.0/16 -j MASQUERADE || true
    docker exec nordvpn iptables -A FORWARD -i eth0 -o tun0 -j ACCEPT || true
    docker exec nordvpn iptables -A FORWARD -i tun0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT || true
  when:
    - vpn_tailscale_enabled
    - vpn_tailscale_run_exit_node | bool
    - nordvpn_is_running | bool
  ignore_errors: true

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
- name: Verify Tailscale status
  ansible.builtin.command:
    cmd: docker exec tailscale-nordvpn tailscale status
  become: true
  changed_when: false
  when:
    - vpn_tailscale_verify_connection | bool
    - nordvpn_is_running | bool

- name: Verify Tailscale status (host-level)
  ansible.builtin.command:
    cmd: tailscale status
  become: true
  changed_when: false
  when:
    - vpn_tailscale_verify_connection | bool
    - not nordvpn_is_running | bool

- name: Verify Tailscale IP
  ansible.builtin.command:
    cmd: docker exec tailscale-nordvpn tailscale ip -4
  become: true
  changed_when: false
  register: vpn_tailscale_ip
  when:
    - vpn_tailscale_verify_connection | bool
    - nordvpn_is_running | bool

- name: Verify Tailscale IP (host-level)
  ansible.builtin.command:
    cmd: tailscale ip -4
  become: true
  changed_when: false
  register: vpn_tailscale_ip
  when:
    - vpn_tailscale_verify_connection | bool
    - not nordvpn_is_running | bool

- name: Report Tailscale connection info
  ansible.builtin.debug:
    msg: >-
      Tailscale is running:
      - Hostname: {{ vpn_tailscale_hostname }}
      - Port: {{ vpn_tailscale_port }}
      - IPv4: {{ vpn_tailscale_ip.stdout | default('N/A') }}
  when: vpn_tailscale_verify_connection | bool
