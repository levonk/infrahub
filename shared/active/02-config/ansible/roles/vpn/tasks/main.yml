---
# LocalNet VPN Stack Deployment
# Services: Netbird, Tailscale, Gluetun, WireGuard (direct + transparent), Twingate

- name: Ensure VPN service directory exists on target
  ansible.builtin.file:
    path: "{{ localnet_services_dir }}/vpn"
    state: directory
    mode: "0755"

- name: Ensure VPN volumes exist
  community.docker.docker_volume:
    name: "{{ item }}"
    state: present
  loop:
    - localnet-wireguard-direct-config-volume
    - localnet-wireguard-transparent-config-volume

- name: Synchronize VPN service files from control node
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../../container/services/vpn/"
    dest: "{{ localnet_services_dir }}/vpn/"
    delete: false
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=*.log"
  delegate_to: "{{ inventory_hostname }}"
  become: false
  when: ansible_connection == "local"

- name: Ensure VPN Docker Compose file exists
  ansible.builtin.stat:
    path: "{{ localnet_services_dir }}/vpn/docker-compose.vpn.yml"
  register: vpn_compose_stat

- name: Deploy VPN stack via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ localnet_services_dir }}/vpn"
    files:
      - docker-compose.vpn.yml
    state: present
    build: always
  when: vpn_compose_stat.stat.exists
  register: vpn_deploy

- name: Wait for WireGuard direct to become healthy
  ansible.builtin.shell: |
    docker inspect --format='{{"{{"}}.State.Health.Status{{"}}"}}' localnet-vpn-direct
  register: wg_direct_health
  until: wg_direct_health.stdout == "healthy"
  retries: 10
  delay: 10
  ignore_errors: true
  when: vpn_deploy.changed

- name: Report VPN stack status
  ansible.builtin.debug:
    msg: |
      VPN Stack deployed successfully:
        - Netbird: http://localhost:{{ vpn_netbird_http_container_port }}
        - Tailscale: http://localhost:{{ vpn_tailscale_http_container_port }}
        - Gluetun: http://localhost:8888 (HTTP proxy)
        - WireGuard Direct: localhost:{{ wireguard_direct_port }}/udp
        - WireGuard Transparent: localhost:{{ wireguard_transparent_port }}/udp
        - Twingate: Connector running
