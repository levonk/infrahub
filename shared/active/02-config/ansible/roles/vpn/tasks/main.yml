---
# LocalNet VPN Stack Deployment - Direct Container Management
# Services: Netbird, Tailscale, Gluetun, WireGuard (direct + transparent), Twingate

- name: Ensure VPN service directory exists on target
  ansible.builtin.file:
    path: "{{ localnet_services_dir }}/vpn"
    state: directory
    mode: "0755"

# ============================================================================
# Volume Management
# ============================================================================
- name: Ensure VPN volumes exist
  community.docker.docker_volume:
    name: "{{ item }}"
    state: present
  loop:
    - localnet-wireguard-direct-config-volume
    - localnet-wireguard-transparent-config-volume

# ============================================================================
# Service Deployment
# ============================================================================
- ansible.builtin.include_tasks: gluetun.yml
- ansible.builtin.include_tasks: wireguard-direct.yml
- ansible.builtin.include_tasks: netbird.yml
- ansible.builtin.include_tasks: tailscale.yml
- ansible.builtin.include_tasks: twingate.yml
- ansible.builtin.include_tasks: wireguard-transparent.yml

# ============================================================================
# Status Report
# ============================================================================
- name: Report VPN stack status
  ansible.builtin.debug:
    msg: |
      VPN Stack deployed successfully:
        - Netbird: http://localhost:{{ vpn_netbird_http_container_port | default('8084') }}
        - Tailscale: http://localhost:{{ vpn_tailscale_http_container_port | default('8085') }}
        - Gluetun: http://localhost:8888 (HTTP proxy)
        - WireGuard Direct: localhost:{{ wireguard_direct_port | default('51820') }}/udp
        - WireGuard Transparent: localhost:{{ wireguard_transparent_port | default('51821') }}/udp
        - Twingate: Connector running
