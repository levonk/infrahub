# Home Lab In-a-Box - Grafana Dashboard Provisioning
# Purpose: Automatically load dashboards from the dashboards directory

apiVersion: 1

providers:
  - name: 'Homelab Dashboards'
    orgId: 1
    folder: 'Homelab'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
