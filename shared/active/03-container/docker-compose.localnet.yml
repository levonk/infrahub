# apps/active/devops/localnet/docker-compose.localnet.yml

# Home Lab In-a-Box - Docker Compose Configuration
# Complete infrastructure stack with transparent proxying, monitoring, and artifact repositories

# Default logging configuration - use json-file with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

# ============================================================================
# Proxy and gateway services are loaded via services/proxy/docker-compose.proxy.yml
# ============================================================================

include:
  - docker-compose.include.yml
  - services/base/docker-compose.base.yml
  - services/base/docker-compose.base-kali.yml
