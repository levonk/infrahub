---
# AI Analytics Pipeline - Docker Compose Configuration
# This file defines the core services for the analytics pipeline

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

networks:
  analytics:
    name: analytics-network
    driver: bridge
    external: false
    ipam:
      driver: default
      config:
        - subnet: 172.27.0.0/16

volumes:
  analytics-data:
    driver: local
  analytics-logs:
    driver: local

services:
  # Analytics Database (SQLite for single-tenant, PostgreSQL for multi-tenant)
  analytics-db:
    image: postgres:15-alpine
    container_name: analytics-db
    restart: unless-stopped
    networks:
      analytics:
        ipv4_address: ${ANALYTICS_DB_CONTAINER_IP:-172.27.0.10}
    environment:
      POSTGRES_DB: ${ANALYTICS_DB_NAME:-analytics}
      POSTGRES_USER: ${ANALYTICS_DB_USER:-analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_password}
    volumes:
      - analytics-data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER:-analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Queue (Redis for development, RabbitMQ for production)
  analytics-queue:
    image: redis:7-alpine
    container_name: analytics-queue
    restart: unless-stopped
    networks:
      analytics:
        ipv4_address: ${ANALYTICS_QUEUE_CONTAINER_IP:-172.27.0.20}
    command: redis-server --appendonly yes
    volumes:
      - analytics-logs:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Analytics Collector Service
  analytics-collector:
    build:
      context: ./collectors
      dockerfile: Dockerfile
    container_name: analytics-collector
    restart: unless-stopped
    networks:
      analytics:
        ipv4_address: ${ANALYTICS_COLLECTOR_CONTAINER_IP:-172.27.0.30}
    environment:
      - DATABASE_URL=postgresql://${ANALYTICS_DB_USER:-analytics}:${ANALYTICS_DB_PASSWORD:-analytics_password}@analytics-db:5432/${ANALYTICS_DB_NAME:-analytics}
      - REDIS_URL=redis://analytics-queue:6379
      - LOG_LEVEL=${ANALYTICS_LOG_LEVEL:-INFO}
    depends_on:
      analytics-db:
        condition: service_healthy
      analytics-queue:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Analytics Processor Service
  analytics-processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: analytics-processor
    restart: unless-stopped
    networks:
      analytics:
        ipv4_address: ${ANALYTICS_PROCESSOR_CONTAINER_IP:-172.27.0.40}
    environment:
      - DATABASE_URL=postgresql://${ANALYTICS_DB_USER:-analytics}:${ANALYTICS_DB_PASSWORD:-analytics_password}@analytics-db:5432/${ANALYTICS_DB_NAME:-analytics}
      - REDIS_URL=redis://analytics-queue:6379
      - LOG_LEVEL=${ANALYTICS_LOG_LEVEL:-INFO}
    depends_on:
      analytics-db:
        condition: service_healthy
      analytics-queue:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Analytics API Service
  analytics-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: analytics-api
    restart: unless-stopped
    networks:
      analytics:
        ipv4_address: ${ANALYTICS_API_CONTAINER_IP:-172.27.0.50}
    ports:
      - "${ANALYTICS_API_HOST_PORT:-8080}:${ANALYTICS_API_CONTAINER_PORT:-8080}/tcp"
    environment:
      - DATABASE_URL=postgresql://${ANALYTICS_DB_USER:-analytics}:${ANALYTICS_DB_PASSWORD:-analytics_password}@analytics-db:5432/${ANALYTICS_DB_NAME:-analytics}
      - REDIS_URL=redis://analytics-queue:6379
      - LOG_LEVEL=${ANALYTICS_LOG_LEVEL:-INFO}
      - API_SECRET_KEY=${ANALYTICS_API_SECRET_KEY:-change_me_in_production}
    depends_on:
      analytics-db:
        condition: service_healthy
      analytics-queue:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
