# HAPI Services Docker Compose
# Provides HAPI server and client containers for remote AI agent access
version: '3.8'

services:
  hapi-server:
    build:
      context: ./hapi-server
      dockerfile: Dockerfile
    image: localnet-hapi-server:latest
    container_name: localnet-hapi-server
    restart: unless-stopped
    environment:
      - CLI_API_TOKEN=${HAPI_CLI_API_TOKEN:-hapi-secret-token-$(date +%s)}
      - HAPI_LISTEN_HOST=0.0.0.0
      - HAPI_LISTEN_PORT=3006
      - HAPI_PUBLIC_URL=${HAPI_PUBLIC_URL:-}
      - TELEGRAM_BOT_TOKEN=${HAPI_TELEGRAM_BOT_TOKEN:-}
      - ELEVENLABS_API_KEY=${HAPI_ELEVENLABS_API_KEY:-}
      - ELEVENLABS_AGENT_ID=${HAPI_ELEVENLABS_AGENT_ID:-}
      - CORS_ORIGINS=${HAPI_CORS_ORIGINS:-*}
    ports:
      - "${HAPI_SERVER_HOST_PORT:-3006}:3006"
    volumes:
      - hapi-data:/root/.hapi
      - hapi-logs:/var/log/hapi
    networks:
      - localnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "localnet.service=hapi"
      - "localnet.role=server"

  hapi-client:
    build:
      context: ./hapi-client
      dockerfile: Dockerfile
    image: localnet-hapi-client:latest
    container_name: localnet-hapi-client
    restart: "no"  # Interactive container - don't auto-restart
    environment:
      - CLI_API_TOKEN=${HAPI_CLI_API_TOKEN:-hapi-secret-token-$(date +%s)}
      - HAPI_API_URL=http://hapi-server:3006
      - HAPI_PUBLIC_URL=${HAPI_PUBLIC_URL:-}
    depends_on:
      hapi-server:
        condition: service_healthy
    networks:
      - localnet
    stdin_open: true
    tty: true
    volumes:
      - hapi-client-workspace:/workspace
      - hapi-client-config:/home/cuser/.config
      - nix-cache:/root/.cache/nix
      - nix-config:/etc/nix
      - nix-store:/nix
    labels:
      - "localnet.service=hapi"
      - "localnet.role=client"
    profiles:
      - interactive  # Only start with --profile interactive

networks:
  localnet:
    name: localnet
    external: true

volumes:
  hapi-data:
    name: localnet-hapi-data
    driver: local
  hapi-logs:
    name: localnet-hapi-logs
    driver: local
  hapi-client-workspace:
    name: localnet-hapi-client-workspace
    driver: local
  hapi-client-config:
    name: localnet-hapi-client-config
    driver: local
