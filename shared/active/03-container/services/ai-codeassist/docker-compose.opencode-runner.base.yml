services:
  opencode-runner:
    image: opencode-runner:local
    build:
      context: ./opencode-runner
      dockerfile: Dockerfile
    container_name: opencode-runner
    environment:
      - PORT=8000
      # Secrets placeholders
      - OPENCODE_GITHUB_TOKEN=${OPENCODE_GITHUB_TOKEN}
      - AUTOCLAUDE_OPENAI_API_KEY=${AUTOCLAUDE_OPENAI_API_KEY}
      # Opencode might need OpenAI key if it acts as a router/agent itself
    networks:
      - localnet
    volumes:
      - /home/micro/p:/p  # Multi-repo mount
    # No public Traefik labels - internal API only
    labels:
      - "traefik.enable=true"
      # Internal routing for other containers to reach it if needed via Traefik, or just use container name
      - "traefik.http.routers.opencode-runner.rule=Host(`opencode-runner.local`)"
      - "traefik.http.services.opencode-runner.loadbalancer.server.port=8000"
      - "com.dockerproxy.role=rw"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
