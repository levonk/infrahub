---
# AI Dashboard - Docker Compose Configuration
# This service integrates the ai-dashboard project as external containers
# Reference: https://github.com/levonk/ai-dashboard
#
# Web Interface: https://ai-dashboard.levonk.com (via Traefik with Authelia)
# Proxy Services: Entry and pre-egress analytics collectors

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

networks:
  ai-dashboard:
    name: ai-dashboard-network
    driver: bridge
    external: false
  traefik-network:
    external: true
    name: traefik-network

volumes:
  ai-dashboard-data:
    driver: local

# Environment variables for AI Dashboard services
env_file:
  - .env.ai-dashboard

services:
  # AI Dashboard Proxy Service (Rust-based analytics proxy)
  ai-dashboard-proxy:
    build:
      context: /Users/micro/p/gh/levonk/ai-dashboard/apps/proxy
      dockerfile: Dockerfile
    image: ai-dashboard-proxy:latest
    command: ["ai-analytics-proxy", "serve", "--port", "8080"]
    container_name: ai-dashboard-proxy
    restart: unless-stopped
    networks:
      ai-dashboard:
        ipv4_address: ${AI_DASHBOARD_PROXY_CONTAINER_IP:-172.28.0.10}
    environment:
      - DATABASE_URL=${AI_DASHBOARD_DATABASE_URL:-postgresql://postgres:postgres@ai-dashboard-db:5432/analytics}
      - AI_ANALYTICS_PROXY_MODE=analytics
      - LOG_LEVEL=${AI_DASHBOARD_LOG_LEVEL:-INFO}
    ports:
      - "${AI_DASHBOARD_PROXY_HOST_PORT:-8080}:${AI_DASHBOARD_PROXY_CONTAINER_PORT:-8080}/tcp"
    volumes:
      - ai-dashboard-data:/var/lib/analytics
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AI Dashboard Web Service (Next.js web application)
  ai-dashboard-web:
    build:
      context: /Users/micro/p/gh/levonk/ai-dashboard/apps/web
      dockerfile: Dockerfile
    image: ai-dashboard-web:latest
    command: ["node", "server.js"]
    container_name: ai-dashboard-web
    restart: unless-stopped
    networks:
      ai-dashboard:
        ipv4_address: ${AI_DASHBOARD_WEB_CONTAINER_IP:-172.28.0.11}
      traefik-network:
        ipv4_address: ${AI_DASHBOARD_WEB_TRAEFIK_IP:-172.31.0.11}
    environment:
      - DATABASE_URL=${AI_DASHBOARD_DATABASE_URL:-postgresql://postgres:postgres@ai-dashboard-db:5432/analytics}
      - NEXT_PUBLIC_API_URL=http://ai-dashboard-proxy:8080
      - NODE_ENV=production
    ports:
      - "${AI_DASHBOARD_WEB_HOST_PORT:-3000}:3000/tcp"
    volumes:
      - ai-dashboard-data:/var/lib/analytics
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      # Traefik labels for automatic routing with security middleware chain
      - "traefik.enable=true"
      # HTTP router (redirects to HTTPS)
      - "traefik.http.routers.ai-dashboard-web-http.rule=Host(`ai-dashboard.levonk.com`)"
      - "traefik.http.routers.ai-dashboard-web-http.entryPoints=web"
      - "traefik.http.routers.ai-dashboard-web-http.middlewares=redirect-to-https"
      # HTTPS router with security middleware chain
      - "traefik.http.routers.ai-dashboard-web-https.rule=Host(`ai-dashboard.levonk.com`)"
      - "traefik.http.routers.ai-dashboard-web-https.entryPoints=websecure"
      - "traefik.http.routers.ai-dashboard-web-https.middlewares=geoblock,crowdsec-bouncer,authelia"
      - "traefik.http.routers.ai-dashboard-web-https.tls=true"
      - "traefik.http.routers.ai-dashboard-web-https.tls.certresolver=letsencrypt"
      # Service configuration
      - "traefik.http.services.ai-dashboard-web.loadbalancer.server.port=3000"
      # HTTPS redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    depends_on:
      ai-dashboard-proxy:
        condition: service_healthy
      ai-dashboard-db:
        condition: service_healthy

  # AI Dashboard Database (PostgreSQL)
  ai-dashboard-db:
    image: postgres:15-alpine
    container_name: ai-dashboard-db
    restart: unless-stopped
    networks:
      ai-dashboard:
        ipv4_address: ${AI_DASHBOARD_DB_CONTAINER_IP:-172.28.0.20}
    environment:
      POSTGRES_DB: ${AI_DASHBOARD_DB_NAME:-analytics}
      POSTGRES_USER: ${AI_DASHBOARD_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${AI_DASHBOARD_DB_PASSWORD:-postgres}
    volumes:
      - ai-dashboard-data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DASHBOARD_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
