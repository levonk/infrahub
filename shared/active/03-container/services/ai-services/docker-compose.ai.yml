---

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"


# AI Services stack
# Includes: Ollama (GPU), OpenWebUI, n8n, Postgres (pgvector), Neo4j, Langfuse, Airflow (K8s-ready)
networks:
  localnet:
    driver: bridge
  traefik-network:
    external: true
    name: traefik-network

volumes:
  ai-ollama-models:
    driver: local
  ai-openwebui-data:
    driver: local
  ai-n8n-data:
    driver: local
  ai-postgres-data:
    driver: local
  ai-neo4j-data:
    driver: local
  ai-langfuse-data:
    driver: local
  ai-omniroute-data:
    driver: local

services:
  ollama:
    image: ollama/ollama:latest
    container_name: localnet-ai-ollama
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
    ports:
      - "${AI_OLLAMA_HOST_PORT:-11434}:${AI_OLLAMA_CONTAINER_PORT:-11434}"
    environment:
      - OLLAMA_KEEP_ALIVE=${AI_OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${AI_OLLAMA_NUM_PARALLEL:-2}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    # Docker Compose v2+ supports the 'gpus' key directly
    gpus: "all"
    volumes:
      - ${AI_OLLAMA_HOST_MODELS_PATH:-/opt/localnet/volumes/cache/ollama/models}:/root/.ollama
      - ${AI_DATASETS_HOST_PATH:-/opt/localnet/volumes/cache/ai-datasets}:/opt/ai-datasets
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- http://localhost:${AI_OLLAMA_CONTAINER_PORT:-11434}/api/tags || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 10
    profiles: ["all"]

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: localnet-ai-openwebui
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - localnet
    environment:
      - OLLAMA_BASE_URL=http://ollama:${AI_OLLAMA_CONTAINER_PORT:-11434}
      - WEBUI_URL=https://${AI_SERVICES_OPENWEBUI_HOST_NAME:-openwebui.levonk.com}/
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - OAUTH_CLIENT_ID=open-webui
      - OAUTH_CLIENT_SECRET=${AI_SERVICES_OPENWEBUI_CLIENT_SECRET:-changeme} # Corresponds to 'client_secret' in configuration.yml
      - OPENID_PROVIDER_URL=https://${LOCALNET_AUTH_HOSTNAME:-auth.levonk.com}/.well-known/openid-configuration
      - OAUTH_PROVIDER_NAME=${LOCALNET_AUTH_PROVIDER_NAME:-Authelia}
      - OAUTH_SCOPES=openid email profile groups
      - ENABLE_OAUTH_ROLE_MANAGEMENT=true
      - OAUTH_ADMIN_ROLES=admins
      - OAUTH_ALLOWED_ROLES=admins,dev,family
      - OAUTH_ROLES_CLAIM=groups
    ports:
      - "${AI_OPENWEBUI_HOST_PORT:-30080}:8080"
    volumes:
      - ${AI_OPENWEBUI_DATA_PATH:-/opt/localnet/volumes/cache/openwebui}:/app/backend/data
    healthcheck:
      test:
        ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
    profiles: ["all"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=Host(`${AI_SERVICES_OPENWEBUI_HOST_NAME:-openwebui.levonk.com}`)"
      - "traefik.http.routers.open-webui.entryPoints=websecure"
      - "traefik.http.routers.open-webui.tls.certresolver=le"
      - "traefik.http.routers.open-webui.tls=true"
      - "traefik.http.routers.open-webui.middlewares=authelia@docker,geoblock@file"
      - "traefik.http.middlewares.authelia.forwardAuth.address=http://authelia:9091/api/verify?rd=https%3A%2F%2F${LOCALNET_AUTH_HOSTNAME}%2F"
      - "traefik.http.middlewares.authelia.fowardAuth.truestForwardHeader=true"
      - "traefik.http.middlewares.authelia.fowardAuth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
      - "traefik.http.middlewares.authelia-basic.forwardAuth.address=http://authelia:9091/api/verify?auth=basic"
      - "traefik.http.middlewares.authelia-basic.forwardAuth.trustForwardheader=true"
      - "traefik.http.middlewares.authelia-basic.fowardAuth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"


  n8n:
    image: n8nio/n8n:latest
    container_name: localnet-ai-n8n
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - OLLAMA_BASE_URL=http://ollama:${AI_OLLAMA_CONTAINER_PORT:-11434}
    ports:
      - "${AI_N8N_HOST_PORT:-5678}:${AI_N8N_CONTAINER_PORT:-5678}"
    volumes:
      - ${AI_N8N_DATA_PATH:-/opt/localnet/volumes/cache/n8n}:/home/node/.n8n
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- http://localhost:${AI_N8N_CONTAINER_PORT:-5678}/healthz || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 10
    profiles: ["all"]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: localnet-ai-postgres
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
    environment:
      - POSTGRES_USER=${AI_POSTGRES_USER:-ai}
      - POSTGRES_PASSWORD=${AI_POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${AI_POSTGRES_DB:-ai}
    ports:
      - "${AI_POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - ${AI_POSTGRES_DATA_PATH:-/opt/localnet/volumes/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AI_POSTGRES_USER:-ai}"]
      interval: 10s
      retries: 5
      start_period: 5s
    profiles: ["all"]

  neo4j:
    image: neo4j:5-community
    container_name: localnet-ai-neo4j
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
    environment:
      - NEO4J_AUTH=neo4j/${AI_NEO4J_PASSWORD:-changeme}
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1g
    ports:
      - "${AI_NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${AI_NEO4J_BOLT_HOST_PORT:-7687}:7687"
    volumes:
      - ${AI_NEO4J_DATA_PATH:-/opt/localnet/volumes/neo4j}:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 30s
      retries: 5
      start_period: 10s
    profiles: ["all"]

  langfuse:
    image: langfuse/langfuse:latest
    container_name: localnet-ai-langfuse
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://${AI_POSTGRES_USER:-ai}:${AI_POSTGRES_PASSWORD:-changeme}@postgres:5432/${AI_POSTGRES_DB:-ai}
      - NEXTAUTH_SECRET=${AI_LANGFUSE_NEXTAUTH_SECRET:-please_change}
      - ENCRYPTION_KEY=${AI_LANGFUSE_ENCRYPTION_KEY:-please_change}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    ports:
      - "${AI_LANGFUSE_HOST_PORT:-31000}:3000"
    volumes:
      - ${AI_LANGFUSE_DATA_PATH:-/opt/localnet/volumes/langfuse}:/data
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- http://localhost:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 20

  unstructured:
    image: quay.io/unstructured-io/unstructured-api:latest
    container_name: localnet-ai-unstructured
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
    environment:
      - UNSTRUCTURED_API_PORT=${AI_UNSTRUCTURED_CONTAINER_PORT:-8000}
      - UNSTRUCTURED_DOWNLOAD_MODELS=true
    ports:
      - "${AI_UNSTRUCTURED_HOST_PORT:-30081}:${AI_UNSTRUCTURED_CONTAINER_PORT:-8000}"
    volumes:
      - ${AI_UNSTRUCTURED_CACHE_PATH:-/opt/localnet/volumes/cache/unstructured}:/home/unstructured/.cache
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -qO- http://localhost:${AI_UNSTRUCTURED_CONTAINER_PORT:-8000}/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 20
    profiles: ["all"]

  omniroute:
    build:
      context: ./omniroute
      dockerfile: docker/Dockerfile.omniroute
    image: localnet-ai-omniroute:latest
    container_name: localnet-ai-omniroute
    logging: *default-logging
    restart: unless-stopped
    networks:
      - localnet
      - traefik-network
    environment:
      - PORT=${AI_OMNIROUTE_CONTAINER_PORT:-20128}
      - NODE_ENV=production
      - OMNIROUTE_COMPRESSION_ENABLED=false
      - OMNIROUTE_RTK_ENABLED=false
      - OMNIROUTE_CAVEMAN_ENABLED=false
    ports:
      - "${AI_OMNIROUTE_HOST_PORT:-20128}:${AI_OMNIROUTE_CONTAINER_PORT:-20128}"
    volumes:
      - ${AI_OMNIROUTE_DATA_PATH:-/opt/localnet/volumes/omniroute}:/app/data
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck-omniroute.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    labels:
      # Traefik labels for automatic routing with security middleware chain
      - "traefik.enable=true"
      # HTTP router (redirects to HTTPS)
      - "traefik.http.routers.omniroute-http.rule=Host(`ai-gateway.levonk.com`)"
      - "traefik.http.routers.omniroute-http.entryPoints=web"
      - "traefik.http.routers.omniroute-http.middlewares=redirect-to-https"
      # HTTPS router with security middleware chain
      - "traefik.http.routers.omniroute-https.rule=Host(`ai-gateway.levonk.com`)"
      - "traefik.http.routers.omniroute-https.entryPoints=websecure"
      - "traefik.http.routers.omniroute-https.middlewares=geoblock,crowdsec-bouncer,authelia"
      - "traefik.http.routers.omniroute-https.tls=true"
      - "traefik.http.routers.omniroute-https.tls.certresolver=letsencrypt"
      # Service configuration
      - "traefik.http.services.omniroute.loadbalancer.server.port=20128"
      # HTTPS redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    profiles: ["all"]
