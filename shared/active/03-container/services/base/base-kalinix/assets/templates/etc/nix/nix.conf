# Nix configuration for Kali+Nix environment

# Allow use of unfree packages (needed for some security tools)
unfree = true

# Use sandboxing for better security
sandbox = true

# Enable binary cache
build-use-sandbox = true
build-users-group = nixbld

# Experimental features for better performance
experimental-features = nix-command flakes

# Auto-optimise store paths
auto-optimise-store = true

# Keep outputs alive for garbage collection
keep-outputs = true
keep-derivations = true

# Maximum number of parallel build processes
max-jobs = auto

# Number of cores to use for builds
cores = 0

# Use substituters for faster builds
substituters = https://cache.nixos.org/

# Trusted public keys for binary cache
trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gNypCzIx7kz7Z7QGwJvd+YAMkqk=

# Build timeout (in seconds)
build-timeout = 3600

# Enable hard link copying when possible
build-use-chroot = true

# Allow root to build
build-allow-suid = true
