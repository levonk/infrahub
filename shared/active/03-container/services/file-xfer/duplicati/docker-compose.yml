---
# Duplicati Docker Compose Configuration
# Generated secure docker-compose configuration for Duplicati

services:
  duplicati:
    image: duplicati:latest
    container_name: localnet-file-xfer-duplicati
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - NODE_ENV=production
      - SERVICE_NAME=duplicati
      - SERVICE_PORT=8200
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./config:/config
      - ./backups:/backups
      - ./source:/source
    # Healthcheck assumes curl is available (added in flake.nix)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - localnet

networks:
  localnet:
    external: true
