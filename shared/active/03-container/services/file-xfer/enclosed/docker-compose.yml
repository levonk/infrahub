---
# Enclosed Docker Compose Configuration
# Service: File Transfer / Note Sharing
# Upstream: https://github.com/CorentinTh/enclosed

services:
  enclosed:
    image: corentinth/enclosed:v1.16.0
    container_name: localnet-file-xfer-enclosed
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - localnet

networks:
  localnet:
    external: true
