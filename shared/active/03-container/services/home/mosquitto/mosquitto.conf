# Minimal Mosquitto config for LocalNet internal use
persistence true
persistence_location /mosquitto/data/

# Listen only on container network; no host publish needed for HA
listener 1883 0.0.0.0
protocol mqtt

# For initial bring-up, allow anonymous; switch to password_file later
allow_anonymous true
# password_file /mosquitto/config/password_file
# acl_file /mosquitto/config/acl_file
