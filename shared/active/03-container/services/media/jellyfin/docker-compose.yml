---
#  Docker Compose Configuration
# Generated secure docker-compose configuration for Jellyfin

# Default logging configuration - use json-file with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"


services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: localnet-media-jellyfin-standalone
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8096:8096"
      - "7359:7359/udp"
    environment:
      - PUID=${_PUID:-1000}
      - PGID=${_PGID:-1000}
      - TZ=${_TZ:-America/Los_Angeles}
      - JELLYFIN_PublishedServerUrl=http://localhost:8096
    volumes:
      - ./mounts/config:/config
      - ./mounts/cache:/cache
      - ./mounts/media:/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jellyfin-network

networks:
  jellyfin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
