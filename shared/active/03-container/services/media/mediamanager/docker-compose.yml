---
# MediaManager Docker Compose Configuration
# Generated secure docker-compose configuration for mediamanager

services:
  mediamanager:
    image: lscr.io/linuxserver/tinymediamanager:latest
    container_name: localnet-media-mediamanager-standalone
    restart: unless-stopped
    ports:
      - "5800:5800"
      - "4000:4000"
    environment:
      - PUID=${_PUID:-1000}
      - PGID=${_PGID:-1000}
      - TZ=${_TZ:-America/Los_Angeles}
    volumes:
      - ./mounts/config:/config
      - ./mounts/media:/media # Remap these as needed in production or bind to actual media paths
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5800"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mediamanager-network

networks:
  mediamanager-network:
    driver: bridge

