  traefik: # https://github.com/traefik/traefik
    image: traefik:latest
    container_name: localnet-proxy-traefik
    logging: *default-logging
    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--global.sendAnonymousUsage=false"
      - "--global.checkNewVersion=true"
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--entrypoints.websecure=true"
      - "--entrypoints.websecure.address=:443"
      - "--entryPoints.websecure.proxyProtocol.trustedIPs=${DOCKER_NETWORK_GATEWAY}/32"
      - "--entrypoints.health=true"
      - "--entrypoints.health.address=:8882"
      - "--ping=true"
      - "--ping.entrypoint=health"
      - "--certificatesresolvers.le.acme.email=letsencrypt@levonk.com"
      - "--certificatesresolvers.le.acme.storage=./acme/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--accesslog=true"
      - "--accesslog.filePath=/var/log/traefik/access.log"
      - "--entryPoints.websecure.http.middlewares=crowdsec-bouncer@file"
      - "--experimental.plugins.geoblock.modulename=github.com/PascalMinder/geoblock"
      - "--experimental.plugins.geoblock.version=v0.3.3"
      - "--providers.docker.endpoint=unix:///socket/docker.sock"
    ports:
      - "80:80"
      - "443:443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.levonk.com`)"
      - "traefik.http.routers.api.entryPoints=websecure"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=le"
    networks:
      - localnet
    volumes:
      - ./traefik/mounts/etc/traefik:/etc/traefik:ro
      - traefik-acme:/acme
      - traefik-access-logs:/var/log/traefik/
      #- /var/run/docker.sock:/var/run/docker.sock
      - dockerproxy-ro:/socket/:ro
    depends_on:
      - authelia
      - dockerproxy-ro
    environment:
      # Traefik experimental plugin declarations (versions can be overridden via env)
      - TRAEFIK_EXPERIMENTAL_PLUGINS_GEOBLOCK_MODULENAME=github.com/PascalMinder/geoblock
      - TRAEFIK_EXPERIMENTAL_PLUGINS_GEOBLOCK_VERSION=${TRAEFIK_PLUGIN_GEO_VERSION:-v0.2.9}
      - TRAEFIK_EXPERIMENTAL_PLUGINS_CROWDSEC_MODULENAME=github.com/crowdsecurity/traefik-plugin-crowdsec
      - TRAEFIK_EXPERIMENTAL_PLUGINS_CROWDSEC_VERSION=${TRAEFIK_PLUGIN_CROWDSEC_VERSION:-v1.4.4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8882/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - all

  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: localnet-proxy-envoy
    logging: *default-logging
    build:
      context: ./proxy/envoy
      dockerfile: docker/Dockerfile.envoy
#    profiles:
#      - monitoring  # Only start with: docker-compose up --profile monitoring
    networks:
      - localnet
    ports:
      - "${HTTP_TRANSPARENT_PORT:-10080}:80/tcp"    # Transparent HTTP (host 10080 → container 80)
      - "${HTTPS_TRANSPARENT_PORT:-10443}:443/tcp" # Transparent HTTPS (host 10443 → container 443)
      - "${ENVOY_INTERNAL_HOST_PORT:-3129}:3129/tcp"  # Internal
      - "${ENVOY_ADMIN_HOST_PORT:-9901}:9901/tcp"     # Admin + Metrics
    volumes:
      - ./configs/web/envoy:/etc/envoy/conf.d:ro
    depends_on:
      - squid
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9901/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - all

  squid:
    image: ubuntu/squid:latest
    container_name: localnet-proxy-squid
    logging: *default-logging
    build:
      context: ./proxy/squid
      dockerfile: docker/Dockerfile.squid
    networks:
      - localnet
    ports:
      - "${PROXY_DIRECT_PORT:-3128}:3128/tcp"  # Direct mode
    volumes:
      - ./configs/web/squid.conf:/etc/squid/conf.d/localnet.conf:ro
      - web-cache:/var/spool/squid
    environment:
      - CACHE_SIZE_MB=${PROXY_CACHE_SIZE_MB:-10240}
    depends_on:
      - privoxy
#    profiles:
#      - proxy  # Core proxy chain
    healthcheck:
      test: ["CMD", "squidclient", "-h", "localhost", "mgr:info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - all

  privoxy:
    image: vimagick/privoxy:latest
    container_name: localnet-proxy-privoxy
    logging: *default-logging
    build:
      context: ./proxy/privoxy
      dockerfile: docker/Dockerfile.privoxy
    networks:
      - localnet
    volumes:
      - ./configs/web/privoxy:/etc/privoxy:ro
#    profiles:
#      - proxy  # Core proxy chain
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "8118"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - all

#  tor:
#    image: dperson/torproxy:latest
#    container_name: localnet-proxy-tor
#    networks:
#      - localnet
#    ports:
#      - "${PROXY_TOR_SOCKS_HOST_PORT:-9050}:9050/tcp"  # SOCKS5 proxy
#      - "${PROXY_TOR_CONTROL_HOST_PORT:-9051}:9051/tcp"  # Control port
#    profiles:
#      - proxy  # Core proxy chain
#    healthcheck:
#      test: ["CMD", "nc", "-zv", "localhost", "9050"]
#      interval: 30s
#      timeout: 5s
#      retries: 3
#      start_period: 30s
#    restart: unless-stopped
#    profiles:
#      - all

  9router:
    build:
      context: ./9router
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: localnet-proxy-9router
    logging: *default-logging
    hostname: 9router
    networks:
      - localnet
    ports:
      - "${PROXY_ROUTER_9ROUTER_HOST_PORT:-20128}:20128"
    volumes:
      - 9router-data:/app/data
      - 9router-config:/app/config
    environment:
      - NODE_ENV=production
      - PORT=${PROXY_ROUTER_9ROUTER_CONTAINER_PORT:-20128}
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - DATA_DIR=/app/data
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:20128/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    profiles:
      - all

volumes:
  web-cache:
    external: true
    name: localnet-web-cache-volume
  traefik-acme:
    driver: local
  9router-data:
    driver: local
  9router-config:
    driver: local
  crowdsec-data:
    external: true
    name: localnet-security-crowdsec-data-volume
  crowdsec-config:
    external: true
    name: localnet-security-crowdsec-config-volume
  crowdsec-db:
    external: true
    name: localnet-security-crowdsec-db-volume
  traefik-access-logs:
    external: true
    name: localnet-security-traefik-accesslog-volume
  dockerproxy-ro:
    external: true
    name: localnet-dockerproxy-ro-volume
  dockerproxy-rw:
    external: true
    name: localnet-dockerproxy-rw-volume
