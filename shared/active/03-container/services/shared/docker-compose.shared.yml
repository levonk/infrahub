---
# Home services: Home Assistant + Mosquitto + ring-mqtt

# Default logging configuration - use json-file with rotation
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"
    labels: "service"

services:
  folding:
    image: lscr.io/linuxserver/foldingathome:latest
    container_name: localnet-home-foldingathome
    user: 1000:1000 # default
    runtime: "nvidia"
    ports:
      - "7396:7396"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-UTC}
      - NVIDIA_VISIBLE_DEVICES=all
      - MACHINE_NAME=${HOME_FOLDINGATHOME_MACHINE_NAME:-levonk-localnet-foldingathome}
      - ACCOUNT_TOKEN=${HOME_FOLDINGATHOME_ACCOUNT_TOKEN:-levonk-localnet-foldingathome}
    restart: unless-stopped
