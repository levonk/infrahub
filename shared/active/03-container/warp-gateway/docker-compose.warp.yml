version: "3.8"

services:
  warp:
    build:
      context: ./warp
    container_name: warp-gateway
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - WARP_LICENSE_KEY=${WARP_LICENSE_KEY:-}
    networks:
      warp_net:
        ipv4_address: 172.22.0.10

  gost:
    build:
      context: ./gost
    container_name: socks-proxy
    restart: unless-stopped
    ports:
      - "1080:1080"
    depends_on:
      warp:
        condition: service_healthy
    networks:
      warp_net:
        ipv4_address: 172.22.0.20

networks:
  warp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
